name: SonarQube analysis

on:
  push:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze pushed revision
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_PROJECT_KEY: naslouby-salahe_datp-core
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-groups --all-extras --frozen

      - name: Run tests and collect coverage
        run: uv run pytest

      - name: Record previous SonarQube analysis
        id: previous-analysis
        run: |
          python - <<'PY'
          from __future__ import annotations

          import base64
          import json
          import os
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          query = urlencode({"project": os.environ["SONAR_PROJECT_KEY"], "ps": 1})
          url = f"{os.environ['SONAR_HOST_URL']}/api/project_analyses/search?{query}"
          credentials = base64.b64encode(f"{os.environ['SONAR_TOKEN']}:".encode()).decode()
          request = Request(url, headers={"Authorization": f"Basic {credentials}"})
          with urlopen(request) as response:
              analyses = json.load(response)["analyses"]

          latest = analyses[0] if analyses else {}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"key={latest.get('key', '')}\n")
          print(f"Previous SonarQube analysis date: {latest.get('date', 'none')}")
          PY

      - name: Run SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            -Dsonar.scm.revision=${{ github.sha }}

      - name: Verify SonarQube analysis is current
        if: always()
        env:
          PREVIOUS_ANALYSIS_KEY: ${{ steps.previous-analysis.outputs.key }}
          PUSHED_REVISION: ${{ github.sha }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import base64
          import json
          import os
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          query = urlencode({"project": os.environ["SONAR_PROJECT_KEY"], "ps": 1})
          url = f"{os.environ['SONAR_HOST_URL']}/api/project_analyses/search?{query}"
          credentials = base64.b64encode(f"{os.environ['SONAR_TOKEN']}:".encode()).decode()
          request = Request(url, headers={"Authorization": f"Basic {credentials}"})
          with urlopen(request) as response:
              analyses = json.load(response)["analyses"]

          if not analyses:
              raise SystemExit("SonarQube did not return an analysis for this project.")

          latest = analyses[0]
          if latest.get("key") == os.environ["PREVIOUS_ANALYSIS_KEY"]:
              raise SystemExit("SonarQube's latest analysis did not change.")
          if latest.get("revision") != os.environ["PUSHED_REVISION"]:
              raise SystemExit("SonarQube's latest analysis does not match the pushed revision.")

          print(f"SonarQube analysis date updated: {latest['date']}")
          PY
