name: SonarQube analysis

"on": [push]

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze pushed revision
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_PROJECT_KEY: naslouby-salahe_datp-core
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

      - name: Install dependencies
        run: uv sync --all-groups --all-extras --frozen

      - name: Run tests and collect coverage
        run: uv run pytest

      - name: Run SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2
        with:
          args: >
            -Dsonar.scm.revision=${{ github.sha }}
