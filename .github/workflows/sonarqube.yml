name: SonarQube analysis

"on": [push]

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze pushed revision
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_PROJECT_KEY: naslouby-salahe_datp-core
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

      - name: Install dependencies
        run: uv sync --all-groups --all-extras --frozen

      - name: Provision empty raw-data root
        run: mkdir -p data/raw

      # The two deselected groups below require infrastructure a generic CI runner cannot have:
      # real licensed multi-GB datasets (raw-source readiness) and a physical CUDA device
      # (end-to-end training/scoring). Both fail loudly by design (configs/runtime.yaml:
      # device_policy_rules, raw_source_policy) rather than silently downgrading -- they are
      # environment-readiness checks, not portable unit tests, and are exercised on real
      # developer/CI-GPU hardware instead.
      - name: Run tests and collect coverage
        run: |
          uv run pytest \
            --ignore=tests/integration/datasets/test_raw_source_contracts_are_ready.py \
            --deselect=tests/unit/application/test_model_training_stage_handler.py::test_model_training_produces_a_checkpoint_selected_by_the_anchor_convergence_rule \
            --deselect=tests/unit/application/test_model_training_stage_handler.py::test_model_training_reuses_a_frozen_checkpoint_without_retraining \
            --deselect=tests/unit/application/test_score_generation_stage_handler.py::test_calibration_scores_exclude_attack_rows_and_preserve_row_identity \
            --deselect=tests/unit/application/test_score_generation_stage_handler.py::test_test_scores_hand_verified_reconstruction_error_and_labels \
            --deselect=tests/unit/application/test_score_generation_stage_handler.py::test_score_generation_reuses_a_frozen_score_artifact \
            --cov=src/datp_core --cov-report=xml:coverage.xml --cov-report=term

      - name: Run SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2
        with:
          args: >
            -Dsonar.scm.revision=${{ github.sha }}
