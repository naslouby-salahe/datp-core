name: Tests

"on": [push]

permissions:
  contents: read

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

      - name: Install dependencies
        run: uv sync --all-groups --all-extras --frozen

      - name: Provision empty raw-data root
        run: mkdir -p data/raw

      # The raw-source readiness audit below requires infrastructure a generic CI runner cannot
      # have: real licensed multi-GB datasets. It fails loudly by design (configs/runtime.yaml:
      # raw_source_policy) rather than silently downgrading -- it is an environment-readiness
      # check, not a portable unit test, and is exercised on real developer hardware instead.
      # CUDA-required training/scoring tests self-skip via torch.cuda.is_available() when no
      # CUDA device is present, so they need no CI-side exclusion.
      - name: Run tests and collect coverage
        run: |
          uv run pytest \
            --ignore=tests/integration/configuration/test_raw_source_contracts_are_ready.py
