name: CodeScene analysis

on:
  push:

permissions:
  contents: read

jobs:
  analyze:
    name: CodeScene delta analysis
    runs-on: ubuntu-latest
    env:
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
      CS_PROJECT_ID: '82584'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install CodeScene CLI
        run: |
          curl -sS -L https://downloads.codescene.io/enterprise/cli/install-cs-tool.sh | sh -s -- -y
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate code health rules
        run: cs rules-config validate

      - name: Determine delta base revision
        id: delta-base
        run: |
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base" 2>/dev/null; then
            base="$(git rev-parse "${{ github.sha }}~1" 2>/dev/null || true)"
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Run CodeScene delta analysis
        env:
          DELTA_BASE: ${{ steps.delta-base.outputs.base }}
          PUSHED_REVISION: ${{ github.sha }}
        run: |
          if [[ -z "$DELTA_BASE" ]]; then
            echo "No previous revision to diff against; this push has no ancestor to analyze."
            exit 0
          fi

          echo "Running CodeScene delta analysis for $DELTA_BASE..$PUSHED_REVISION"
          set +e
          output="$(cs delta "$DELTA_BASE" "$PUSHED_REVISION" --error-on-warnings 2>&1)"
          status=$?
          set -e
          echo "$output"

          if grep -q "Personal Access Token" <<<"$output"; then
            echo "::error::CodeScene delta analysis did not actually run: CS_ACCESS_TOKEN is unset or invalid, so the CLI printed its Personal Access Token setup instructions instead of analyzing anything."
            exit 1
          fi

          if [[ $status -ne 0 ]]; then
            echo "::error::CodeScene delta analysis reported a code health finding (exit $status)."
            exit "$status"
          fi

          echo "CodeScene delta analysis completed for revision $PUSHED_REVISION."

      - name: Trigger CodeScene dashboard analysis
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header 'Content-Type: application/json' \
            --header "Authorization: Bearer $CS_ACCESS_TOKEN" \
            "https://api.codescene.io/v2/projects/$CS_PROJECT_ID/run-analysis"

      - name: Verify CodeScene dashboard analysis
        run: |
          expected_revision="$GITHUB_SHA"
          expected_repository="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          deadline=$((SECONDS + 600))

          while (( SECONDS < deadline )); do
            analysis="$(curl --fail-with-body --silent --show-error \
              --header 'Accept: application/json' \
              --header "Authorization: Bearer $CS_ACCESS_TOKEN" \
              "https://api.codescene.io/v2/projects/$CS_PROJECT_ID/analyses/latest")"
            analyzed_revision="$(python3 -c 'import json, sys; repository = sys.argv[1]; analysis = json.load(sys.stdin); print(next((entry["revision"] for entry in analysis["analysis_repo_revisions"] if entry["repo"] == repository), ""))' "$expected_repository" <<<"$analysis")"

            if [[ "$analyzed_revision" == "$expected_revision" ]]; then
              echo "CodeScene dashboard analysis completed for revision $analyzed_revision."
              exit 0
            fi

            sleep 15
          done

          echo "::error::CodeScene dashboard did not analyze revision $expected_revision within ten minutes."
          exit 1
