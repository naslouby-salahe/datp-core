schema_version: 1
architecture:
  hidden_dims: [80, 40, 20]
  activation: relu
reconstruction_objective: mse
optimizer:
  optimizer_type: adam
  learning_rate: 0.001
  scheduler: null
precision: fp32
determinism: strict
checkpoint_profiles:
  datp_core:
    rounds: [25, 50, 75, 100, 125, 150, 200]
  anchor_terminal:
    rounds: [150]
training_batch:
  micro_batch_size: 256
  gradient_accumulation_steps: 1
training_profiles:
  federated_averaging:
    kind: federated_averaging_training
    local_epochs: 1
    participation: full
    personalization: none
    checkpoint_selection:
      rule: lowest_federated_averaging_weighted_benign_validation_reconstruction_error
      tie_break: earliest_scheduled_round
      authorization: primary_selection_computed_once_on_regime_a
      aggregation: cross_locked_seed_cohort_mean_reconstruction_error_per_candidate_round
      scope: regime_a_only_fedavg_only_benign_validation_only
      forbidden: [per_policy_selection, per_experiment_selection, per_dataset_selection, test_driven_selection, attack_driven_selection, auroc_driven_selection, edge_iiotset_driven_selection]
  federated_averaging_personalized:
    kind: federated_averaging_training
    local_epochs: 1
    participation: full
    personalization: ditto
    personalization_proximal_weight: 1.0   # selected value; must be re-derived via personalization_parameter_selection before this literal may change
    personalization_parameter_grid: [0.001, 0.01, 0.1, 1.0]
    personalization_parameter_selection:
      rule: lowest_regime_a_benign_validation_reconstruction_error_at_locked_global_checkpoint
      candidates: personalization_parameter_grid
      tie_break: smallest_proximal_weight
      selected_before_external_validation: true
      forbidden_selectors: [cv_fpr, test_loss, attack_metrics, auroc, edge_iiotset_results]
    ditto_specification:
      global_model_state: shared_federated_averaging_parameters_sent_to_server_each_round
      persistent_client_personalized_state: per_client_local_parameters_retained_across_rounds_never_reset
      global_update_sent_to_server: client_local_gradient_step_on_shared_parameters_only
      personalized_state_never_aggregated: true
      proximal_personalized_objective: "min_v_k  L_k(v_k) + (proximal_weight / 2) * ||v_k - w_global||^2"
      evaluation_state: personalized_parameters_v_k_per_client_used_for_scoring_and_thresholding
      artifact_separation: { global_checkpoint: shared_scientific_checkpoint_artifact_reused_by_core_ladder, personalized_state: per_client_artifact_never_fused_with_global_checkpoint_or_federated_averaging_artifacts }
    checkpoint_selection:
      rule: lowest_federated_averaging_weighted_benign_validation_reconstruction_error
      tie_break: earliest_scheduled_round
      authorization: lookup_of_federated_averaging_regime_a_primary_selection
      note: reuses_the_round_already_authorized_by_federated_averaging_never_recomputed_independently
  federated_proximal:
    kind: federated_prox_training
    local_epochs: 1
    participation: full
    personalization: none
    checkpoint_selection:
      rule: lowest_federated_averaging_weighted_benign_validation_reconstruction_error
      tie_break: earliest_scheduled_round
      authorization: lookup_of_federated_averaging_regime_a_primary_selection
      note: reuses_the_round_already_authorized_by_federated_averaging_never_recomputed_independently
  centralized_pooled:
    kind: centralized_pooled_training
    checkpoint_selection:
      rule: lowest_pooled_benign_validation_reconstruction_error
      tie_break: earliest_scheduled_round
      authorization: independent_selection_own_non_federated_curve_b0_never_fused_with_federated_averaging_artifacts
