# Machine and operational execution profiles.
#
# This file owns nothing scientific. No threshold, quantile, seed, split ratio, metric, or
# sample count may appear here. `chunk_row_count` is an I/O streaming detail and never
# influences training batch size, model batch semantics, or any scientific sample count.
schema_version: 1

# Repository-relative roots. Concrete paths are runtime-resolved and never enter a scientific
# identity, artifact key, or fingerprint.
roots:
  raw_data: data/raw
  processed_data: data/processed
  manifests: data/manifests
  checkpoints: checkpoints
  outputs: outputs
  runtime_state: .runtime

# The raw root is an external mount reached through a symlink and is strictly read-only.
raw_source_policy:
  follow_symlink: true
  require_resolved_target_readable: true
  reject_broken_symlink: true
  reject_symlink_loop: true
  write_access: forbidden
  create_files_under_raw_root: forbidden

execution_profiles:
  scientific:
    device_policy: cuda_required
    determinism: strict
    resource_budget: { max_ram_gib: 10, max_vram_gib: 12 }
    concurrency:
      training_concurrency: 1
      scoring_concurrency: 1
      worker_count: 4
    data_loading: { chunk_row_count: 50000, streaming: true }
    process_start_method: spawn
    log_interval_rounds: 25
    atomic_write: true

  development:
    device_policy: cuda_required
    determinism: strict
    resource_budget: { max_ram_gib: 8, max_vram_gib: 8 }
    concurrency:
      training_concurrency: 1
      scoring_concurrency: 1
      worker_count: 2
    data_loading: { chunk_row_count: 10000, streaming: true }
    process_start_method: spawn
    log_interval_rounds: 5
    atomic_write: true

  smoke:
    device_policy: cuda_required
    determinism: strict
    resource_budget: { max_ram_gib: 6, max_vram_gib: 6 }
    concurrency:
      training_concurrency: 1
      scoring_concurrency: 1
      worker_count: 1
    data_loading: { chunk_row_count: 1000, streaming: true }
    process_start_method: spawn
    log_interval_rounds: 1
    atomic_write: true

  dataset_audit:
    device_policy: cpu_only
    determinism: strict
    resource_budget: { max_ram_gib: 8 }
    concurrency:
      audit_concurrency: 4
      worker_count: 4
    data_loading: { chunk_row_count: 50000, streaming: true }
    process_start_method: fork
    log_interval_rounds: 10
    atomic_write: true
    temporary_storage: operating_system_temporary_directory_outside_repository_and_raw_tree
    temporary_storage_cleanup: remove_on_success_and_on_failure

  test_smoke:
    device_policy: cpu_only
    determinism: strict
    resource_budget: { max_ram_gib: 4 }
    concurrency:
      worker_count: 1
    data_loading: { chunk_row_count: 1000, streaming: true }
    process_start_method: spawn
    log_interval_rounds: 1
    atomic_write: true
