schema_version: 1

roots:
  raw_data: data/raw
  processed_data: data/processed
  manifests: data/manifests
  checkpoints: checkpoints
  outputs: outputs
  runtime_state: .runtime

raw_source_policy:
  follow_symlink: true
  require_resolved_target_readable: true
  reject_broken_symlink: true
  reject_symlink_loop: true
  write_access: forbidden
  create_files_under_raw_root: forbidden

determinism_enforcement:
  strict:
    python_hash_seed: 0
    cublas_workspace_config: ":4096:8"
    torch_use_deterministic_algorithms: true
    torch_deterministic_algorithms_warn_only: false
    cudnn_deterministic: true
    cudnn_benchmark: false
    float32_matmul_precision: highest
    tensorfloat32_matmul: false
    tensorfloat32_cudnn: false
    dataloader_worker_seeding: required_from_the_protocol_worker_seed_namespace
    file_discovery_order: sorted_ascending_by_relative_path
    client_iteration_order: sorted_ascending_by_client_identifier
    nondeterministic_operation_policy: raise_never_silently_downgrade
    recorded_environment_fields:
      - operating_system
      - python_version
      - framework_version
      - cuda_version
      - driver_version
      - gpu_identity
      - dependency_lock_fingerprint
      - deterministic_flags
      - execution_profile
    unavailable_determinism_policy: record_and_quantify_the_limitation_never_claim_bitwise_reproducibility

device_policy_rules:
  cuda_required:
    cpu_fallback: forbidden
    missing_device_behavior: fail_execution_never_downgrade
  cpu_only:
    permitted_for: [dataset_audit, test_smoke]
    permitted_for_scientific_training_or_scoring: false

resource_pressure_policy:
  silent_reduction_of_batch_size: forbidden
  silent_reduction_of_rounds_seeds_clients_or_sample_counts: forbidden
  on_budget_exceeded: block_execution_and_report

execution_profiles:
  scientific:
    device_policy: cuda_required
    determinism: strict
    resource_budget: { max_ram_gib: 10, max_vram_gib: 12 }
    concurrency:
      training_concurrency: 1
      scoring_concurrency: 1
      worker_count: 4
    data_loading: { chunk_row_count: 50000, streaming: true }
    process_start_method: spawn
    log_interval_rounds: 25
    atomic_write: true

  development:
    device_policy: cuda_required
    determinism: strict
    resource_budget: { max_ram_gib: 8, max_vram_gib: 8 }
    concurrency:
      training_concurrency: 1
      scoring_concurrency: 1
      worker_count: 2
    data_loading: { chunk_row_count: 10000, streaming: true }
    process_start_method: spawn
    log_interval_rounds: 5
    atomic_write: true

  smoke:
    device_policy: cuda_required
    determinism: strict
    resource_budget: { max_ram_gib: 6, max_vram_gib: 6 }
    concurrency:
      training_concurrency: 1
      scoring_concurrency: 1
      worker_count: 1
    data_loading: { chunk_row_count: 1000, streaming: true }
    process_start_method: spawn
    log_interval_rounds: 1
    atomic_write: true

  dataset_audit:
    device_policy: cpu_only
    determinism: strict
    resource_budget: { max_ram_gib: 8 }
    concurrency:
      audit_concurrency: 4
      worker_count: 4
    data_loading: { chunk_row_count: 50000, streaming: true }
    process_start_method: fork
    log_interval_rounds: 10
    atomic_write: true
    temporary_storage: operating_system_temporary_directory_outside_repository_and_raw_tree
    temporary_storage_cleanup: remove_on_success_and_on_failure

  test_smoke:
    device_policy: cpu_only
    determinism: strict
    resource_budget: { max_ram_gib: 4 }
    concurrency:
      worker_count: 1
    data_loading: { chunk_row_count: 1000, streaming: true }
    process_start_method: spawn
    log_interval_rounds: 1
    atomic_write: true
