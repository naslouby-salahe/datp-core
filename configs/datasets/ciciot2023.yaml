schema_version: 1
dataset: ciciot2023
dataset_version: degenerate_rows_excluded_deduplicated
# Descriptive name for the one processed artifact this design authorizes: the 39-feature
# per-class/`MERGED_CSV` corpus with degenerate-window rows excluded and exact-duplicate rows
# removed (see `preprocessing` below).
source_layout:
  # DOCUMENTATION CORRECTION (full-corpus verified during this task): the actual mounted corpus
  # nests one level deeper than the architecture package previously stated. Corrected here and
  # in `docs/Architecture/CONFIGURATION_AND_EXPERIMENT_CATALOGUE.md` §11.2 together.
  per_class_root: CIC_IOT_Dataset2023/CSV/CSV
  merged_root: CIC_IOT_Dataset2023/CSV/MERGED_CSV
  per_class_file_pattern: "*/*.pcap.csv"     # 34 class folders, 309 files total (verified count)
  merged_file_pattern: "Merged*.csv"         # 63 files (verified count, matches pseudo_client_count)
audits:
  - check: source_inspection
    inspection:
      expected_facts:
        - feature_schema_present
        - file_level_membership_recoverable
        - mac_device_ip_capture_timestamp_columns_present_or_absent
      source_row_identity_scheme: required
    feasibility:
      rule: source_schema_complete
      required_evidence: [feature_schema_manifest, file_member_manifest]
    operations: { execution: dataset_audit, report: { table_type: source_inspection_report, output_formats: [markdown] } }
  - check: processed_feature_verification
    inspection:
      expected_facts: [processed_feature_count_matches_conference_value]
      reference_feature_count: 39
    feasibility:
      rule: processed_feature_count_verified
      required_evidence: [processed_feature_schema_manifest]
    operations: { execution: dataset_audit, report: { table_type: source_inspection_report, output_formats: [markdown] } }
    # Corroborated by direct full-corpus header inspection during this task: every one of the 309
    # `CSV/CSV/*/*.pcap.csv` files and all 63 `CSV/MERGED_CSV/*.csv` files carry exactly 39 feature
    # columns (plus the trailing `Label` column on the `MERGED_CSV` member only). This audit's own
    # `dataset_audit`-profile run remains the system's runtime-executed, citable gate before any
    # quantitative claim reaches print; the manual corroboration above does not substitute for it.
eligibility:
  minimum_calibration_sample_count: 100
setups:
  file_pseudo_clients:
    client_construction: { method: dataset_file_pseudo_clients, pseudo_client_count: 63 }
split_definition:
  train: { role: train }
  calibration: { role: calibration, benign_only: true }
  test: { role: test }
preprocessing:
  normalization: { strategy: min_max, scope: global_train }
  row_exclusion:
    # DECISION (full-corpus streamed, not a spot check):
    # 1. Degenerate-window rows (`Rate == inf`, blank `Std`, blank `Variance`): confirmed rare
    #    but genuinely recurring across the full corpus — `CSV/CSV` (46,740,945 rows):
    #    `Rate==inf` in 1,035 rows (0.0022%), blank `Std` in 702, blank `Variance` in 703;
    #    `MERGED_CSV` (45,019,243 rows): `Rate==inf` in 991 rows (0.0022%), blank `Std` in 677,
    #    blank `Variance` in 679. These are single-packet flow windows where the rate computation
    #    divides by a zero time delta and variance/std of one sample is undefined — a genuine,
    #    recurring degenerate condition, never a transcription error. Rows with `Rate == inf` or
    #    a blank `Std`/`Variance` in a retained column are excluded before model-feature
    #    materialization; no sentinel fill (`0`/`NaN`) is substituted.
    # 2. Exact-duplicate rows: a full-corpus, cross-file scan of `MERGED_CSV` (the tree this
    #    dataset's sole `file_pseudo_clients` setup materializes from) found 21,005,822 distinct
    #    rows out of 45,019,234 total — a 53.340% excess-duplicate rate (24,013,412 redundant
    #    rows). This is far above the low, single-file-checked rate a prior spot check reported,
    #    and is large enough that retaining duplicates would materially distort both the
    #    quantile-estimation backbone and any calibration/training statistic. Exact duplicates
    #    are dropped (first occurrence in each file's row order kept, applied per file since
    #    `MERGED_CSV`'s own shuffle already randomizes row placement — a global cross-file
    #    ordering carries no additional scientific meaning to preserve).
    degenerate_window: exclude_rate_inf_or_blank_std_variance
    duplicate_rows: drop_exact_duplicates_keep_first
