schema_version: 1
dataset: ciciot2023
display_name: CICIoT2023
schema_id: ciciot2023_flow_39
source_layout:
  root: CIC_IOT_Dataset2023/CSV
  per_class_root: CIC_IOT_Dataset2023/CSV/CSV
  merged_root: CIC_IOT_Dataset2023/CSV/MERGED_CSV
  per_class_file_pattern: "*/*.pcap.csv"
  merged_file_pattern: "Merged*.csv"
field_schema:
  source_column_count: { per_class: 39, merged: 40 }
  identity_scheme:
    row_identity:
      components: [source_file_path, source_row_index]
      index_scope: within_source_file
      preserved_through_materializations: true
    client_identity: { source: file, derived_from: merged_file_name }
    label_identity: { source: column, column: Label, present_in: merged_only }
    timestamp_field: none
    device_mac_ip_field: none
    provenance_fields: [source_file_name]
  label_fields:
    multiclass_label: { column: Label, type: categorical_string }
    binary_label: { derivation: label_equals_benign, benign_value: BENIGN }
  model_features:
    role: model_feature
    type: numeric_float
    order:
      - Header_Length
      - "Protocol Type"
      - Time_To_Live
      - Rate
      - fin_flag_number
      - syn_flag_number
      - rst_flag_number
      - psh_flag_number
      - ack_flag_number
      - ece_flag_number
      - cwr_flag_number
      - ack_count
      - syn_count
      - fin_count
      - rst_count
      - HTTP
      - HTTPS
      - DNS
      - Telnet
      - SMTP
      - SSH
      - IRC
      - TCP
      - UDP
      - DHCP
      - ARP
      - ICMP
      - IGMP
      - IPv
      - LLC
      - "Tot sum"
      - Min
      - Max
      - AVG
      - Std
      - "Tot size"
      - IAT
      - Number
      - Variance
  post_encoding_feature_order: same_as_model_features
  categorical_encoding: none
  leakage_exclusions: [Label]
  fingerprint_inputs:
    source: [source_layout.merged_root, field_schema.source_column_count]
    schema: [schema_id, field_schema.model_features.order]
observed_facts:
  pseudo_client_count: 63
  per_class_file_count: 309
  model_feature_count: 39
  merged_column_count: 40
  merged_excess_duplicate_rate: 0.53340
  degenerate_window_rate: 0.000022
  merged_files_are_shuffled_mixture_of_all_classes: true
  device_mac_ip_capture_timestamp_columns_present: false
readiness:
  source_schema_complete: true
  processed_feature_count_verified: true
audits:
  - check: source_inspection
    inspection:
      expected_facts:
        - feature_schema_present
        - file_level_membership_recoverable
        - mac_device_ip_capture_timestamp_columns_present_or_absent
      source_row_identity_scheme: required
    feasibility:
      rule: source_schema_complete
      required_evidence: [feature_schema_manifest, file_member_manifest]
    operations: { execution: dataset_audit, report: { table_type: source_inspection_report, output_formats: [markdown] } }
  - check: processed_feature_verification
    inspection:
      expected_facts: [processed_feature_count_matches_conference_value]
      reference_feature_count: 39
    feasibility:
      rule: processed_feature_count_verified
      required_evidence: [processed_feature_schema_manifest]
    operations: { execution: dataset_audit, report: { table_type: source_inspection_report, output_formats: [markdown] } }
eligibility:
  minimum_calibration_sample_count: 100
materializations:
  datp_core:
    materialization_id: ciciot2023_datp_core
    normalization: { strategy: min_max, scope: global_train }
    preprocessing_sequence: [exclude_degenerate_window_rows, drop_exact_duplicate_rows_per_file, random_fractional_split, min_max_normalization_fit_on_train]
    row_exclusion:
      degenerate_window: exclude_rate_inf_or_blank_std_variance
      within_file_duplicate_policy: drop_exact_duplicates_keep_first_per_file
      cross_file_duplicate_policy: retain_across_pseudo_clients
    split:
      method: random_fractional
      calibration_benign_only: true
      split_seed: 0
      ratios: { train: 0.70, calibration: 0.15, test: 0.15 }
setups:
  file_pseudo_clients:
    materialization: datp_core
    client_construction: { method: dataset_file_pseudo_clients, pseudo_client_count: 63 }
