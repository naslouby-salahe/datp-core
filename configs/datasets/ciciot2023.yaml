# Declarative only: measured counts and audit verdicts are generated evidence and must never
# be added here.
#
# No device, MAC, IP, or capture-timestamp column survives, so clients are file-defined only
# and can never be read as device identities.
schema_version: 1
dataset: ciciot2023
display_name: CICIoT2023
schema_id: ciciot2023_flow_39

source_layout:
  root: CIC_IOT_Dataset2023/CSV

  # The merged tree is not a reorganization of the per-class tree; the two are independent
  # populations and nothing executable depends on their equivalence.
  executable_source: merged
  sources:
    merged:
      role: executable
      root: CIC_IOT_Dataset2023/CSV/MERGED_CSV
      file_pattern: "Merged*.csv"
      owns:
        - pseudo_client_construction
        - row_identity
        - label_access
        - benign_only_training_selection
        - benign_only_calibration_selection
        - attack_inclusive_testing
        - duplicate_equivalence_class_computation
        - split_assignment
        - normalization
        - feature_materialization
    per_class:
      role: reference_only
      root: CIC_IOT_Dataset2023/CSV/CSV
      file_pattern: "*/*.pcap.csv"
      permitted_uses:
        - source_layout_verification
        - per_class_schema_verification
        - class_directory_and_file_inventory
        - taxonomy_reference_inspection
        - corpus_integrity_diagnostics
      contributes_rows_to_executable_materializations: false
      defines_pseudo_clients: false

  cross_source_relationship:
    row_count_equality_required: false
    row_level_one_to_one_equivalence_assumed: false
    join_by_row_position: forbidden
    join_by_any_key: forbidden

field_schema:
  source_column_count: { per_class: 39, merged: 40 }
  header_required: true
  header_must_be_identical_across_all_files_in_a_tree: true
  merged_header_extends_per_class_header_with: Label
  label_column_position: last
  identity_scheme:
    row_identity:
      derived_from_source: merged
      components: [merged_source_file_path, merged_source_row_index]
      index_scope: within_source_file
      preserved_through_materializations: true
    client_identity:
      source: file
      derived_from: merged_file_name
      semantics: file_defined_pseudo_client
      physical_device_identity: not_recoverable
    label_identity: { source: column, column: Label, present_in: merged_only }
    timestamp_field: none
    device_mac_ip_field: none
    chronological_ordering_basis: unavailable
    provenance_fields: [source_file_name]
  label_fields:
    multiclass_label: { column: Label, type: categorical_string, case: upper }
    binary_label: { derivation: label_equals_benign, benign_value: BENIGN }
  model_features:
    role: model_feature
    type: numeric_float
    order:
      - Header_Length
      - "Protocol Type"
      - Time_To_Live
      - Rate
      - fin_flag_number
      - syn_flag_number
      - rst_flag_number
      - psh_flag_number
      - ack_flag_number
      - ece_flag_number
      - cwr_flag_number
      - ack_count
      - syn_count
      - fin_count
      - rst_count
      - HTTP
      - HTTPS
      - DNS
      - Telnet
      - SMTP
      - SSH
      - IRC
      - TCP
      - UDP
      - DHCP
      - ARP
      - ICMP
      - IGMP
      - IPv
      - LLC
      - "Tot sum"
      - Min
      - Max
      - AVG
      - Std
      - "Tot size"
      - IAT
      - Number
      - Variance
  post_encoding_feature_order: same_as_model_features
  categorical_encoding: none
  leakage_exclusions: [Label]

source_contract:
  every_model_feature_present_in_merged_header: true
  per_class_schema_reference_check:
    scope: schema_only
    model_feature_count_equals_per_class_source_column_count: true
    asserts_row_equivalence: false
  # Truncated rows are a malformed-row defect, not empty-Label rows, and must not be coerced
  # into a label class.
  malformed_row: { detection: field_count_differs_from_header, handling: exclude_and_count }
  empty_label_row: { detection: label_is_null_or_blank, handling: exclude_and_count }
  reject_unparseable_numeric_model_feature: true

fingerprint_inputs:
  source: [source_layout.sources.merged.root, source_layout.sources.merged.file_pattern, field_schema.source_column_count]
  schema: [schema_id, field_schema.model_features.order]
  materialization:
    - materialization_id
    - preprocessing_sequence
    - row_exclusion
    - normalization
    - split
  client_assignment:
    - client_construction

eligibility_policy: primary_analysis

materializations:
  datp_core:
    materialization_id: ciciot2023_datp_core
    role: primary
    normalization: { strategy: min_max, scope: global_train }
    preprocessing_sequence:
      - exclude_malformed_rows
      - exclude_empty_label_rows
      - exclude_degenerate_window_rows
      - compute_global_exact_duplicate_equivalence_classes
      - assign_each_equivalence_class_to_one_split
      - drop_non_canonical_equivalence_class_members
      - random_fractional_split
      - min_max_normalization_fit_on_train
    row_exclusion:
      malformed_row: exclude
      empty_label_row: exclude
      degenerate_window: exclude_non_finite_rate_or_blank_or_non_finite_std_or_variance
      duplicate_equivalence_class_scope: global_across_all_merged_files
      duplicate_equivalence_class_definition: exact_row_content_hash_over_model_features
      duplicate_equivalence_class_split_assignment: whole_class_to_one_split_never_crosses_train_calibration_test
      canonical_row_selection: keep_first_by_source_file_path_then_source_row_index
      canonical_row_provenance_preserved: true
    split:
      method: random_fractional
      calibration_benign_only: true
      split_seed: 0
      ratios: { train: 0.70, calibration: 0.15, test: 0.15 }
    # The autoencoder is a benign-only detector, so train and calibration carry no attack rows.
    split_row_semantics:
      train_rows: benign_only
      calibration_rows: benign_only
      test_rows: benign_and_attack
      attack_rows: evaluation_only
      cross_split_duplicate_prevention: equivalence_class_never_spans_two_splits
    infeasibility_policy: typed_boundary_result_if_dedup_removes_experiment_feasibility

setups:
  file_pseudo_clients:
    materialization: datp_core
    client_construction:
      method: dataset_file_pseudo_clients
      client_source: source_layout.sources.merged.file_pattern
      client_semantics: file_defined_pseudo_client_not_physical_device
    provides_capabilities:
      - benign_calibration
      - benign_test_false_positive_metrics
      - per_client_attack_detection_metrics
      - attack_sensitive_threshold_tradeoff
