  post_encoding_feature_order: same_as_model_features
  categorical_encoding: none
  leakage_exclusions: []
  fingerprint_inputs:
    source: [source_layout.root, source_layout.device_dirs, field_schema.source_column_count]
    schema: [schema_id, field_schema.model_features.order]
observed_facts:
  device_count: 9
  model_feature_count: 115
  devices_without_mirai_family: [Ennio_Doorbell, Samsung_SNH_1011_N_Webcam]
  benign_exact_duplicate_rate: 0.07633
  attack_exact_duplicate_rate: 0.01773
  cold_start_first_row_present_in_every_source_file: true
readiness:
  source_schema_complete: true
  feature_schema_verified: true
  per_device_membership_recoverable: true
audits:
  - check: source_inspection
    inspection:
      expected_facts:
        - feature_schema_present
        - benign_and_attack_members_present
        - per_device_membership_recoverable
      source_row_identity_scheme: required
    feasibility:
      rule: source_schema_complete
      required_evidence: [feature_schema_manifest, per_device_counts]
    operations:
      execution: dataset_audit
      report: { table_type: source_inspection_report, output_formats: [markdown] }
eligibility:
  minimum_calibration_sample_count: 100
materializations:
  datp_core:
    materialization_id: nbaiot_datp_core
    normalization: { strategy: min_max, scope: global_train }
    preprocessing_sequence: [drop_cold_start_row, drop_exact_duplicate_rows, chronological_gapped_split, min_max_normalization_fit_on_train]
    row_exclusion:
      cold_start_row: drop_first_row_per_source_file
      duplicate_rows: drop_exact_duplicates_keep_first
    split:
      method: chronological_gapped
      calibration_benign_only: true
      ratios: { train: 0.60, gap_1: 0.01, calibration: 0.20, gap_2: 0.01 }
  datp_core_dirichlet:
    materialization_id: nbaiot_datp_core_dirichlet
    normalization: { strategy: min_max, scope: global_train }
    preprocessing_sequence: [drop_cold_start_row, drop_exact_duplicate_rows, random_fractional_split, min_max_normalization_fit_on_train]
    row_exclusion:
      cold_start_row: drop_first_row_per_source_file
      duplicate_rows: drop_exact_duplicates_keep_first
    split:
      method: random_fractional
      calibration_benign_only: true
      split_seed: 0
      ratios: { train: 0.70, calibration: 0.15, test: 0.15 }
  anchor:
    materialization_id: nbaiot_anchor_historical
    normalization: { strategy: standard, scope: global_train }
    preprocessing_sequence: [chronological_gapped_split, standard_normalization_fit_on_train]
    row_exclusion:
      cold_start_row: retain
      duplicate_rows: retain
    split:
      method: chronological_gapped
      calibration_benign_only: true
      ratios: { train: 0.60, gap_1: 0.01, calibration: 0.20, gap_2: 0.01 }
setups:
  natural_devices:
    materialization: datp_core
    client_construction: { method: physical_device_clients, device_count: 9 }
  anchor_natural_devices:
    materialization: anchor
    client_construction: { method: physical_device_clients, device_count: 9 }
  dirichlet_partitioned:
    materialization: datp_core_dirichlet
    client_construction:
      method: dirichlet_partitioned_clients
      client_count: 20
      alpha: { from_sweep: dirichlet_alpha }
      partition_seed: 0
