# N-BaIoT dataset contract.
#
# Declarative only: what to read, how to interpret it, which rows are eligible, and which
# transformations are configured. Measured counts, duplicate rates, category inventories,
# readiness verdicts and audit outcomes are generated evidence and are deliberately absent.
schema_version: 1
dataset: nbaiot
display_name: N-BaIoT
schema_id: nbaiot_kitsune_115

source_layout:
  root: N-BaIoT
  device_dirs:
    - Danmini_Doorbell
    - Ecobee_Thermostat
    - Ennio_Doorbell
    - Philips_B120N10_Baby_Monitor
    - Provision_PT_737E_Security_Camera
    - Provision_PT_838_Security_Camera
    - Samsung_SNH_1011_N_Webcam
    - SimpleHome_XCS7_1002_WHT_Security_Camera
    - SimpleHome_XCS7_1003_WHT_Security_Camera
  benign_file: benign_traffic.csv
  benign_file_required_per_device: true
  attack_family_dirs: [gafgyt_attacks, mirai_attacks]
  # Not every device was infected by every family; a missing family directory is a valid
  # source layout, not a source error.
  attack_family_required_per_device: false
  attack_file_pattern: "*.csv"
  # Compressed archives sit beside their extracted directories and the distribution ships
  # documentation and a structure sample at the root. Only the patterns above are ingested;
  # everything else is reported as unmatched and never read.
  ignored_source_suffixes: [".rar"]
  ignored_root_entries: [demonstrate_structure.csv, N_BaIoT_dataset_description_v1.txt]

field_schema:
  source_column_count: 115
  header_required: true
  header_must_be_identical_across_all_source_files: true
  identity_scheme:
    row_identity:
      components: [source_file_path, source_row_index]
      index_scope: within_source_file
      preserved_through_materializations: true
    client_identity: { source: path, derived_from: device_directory_name }
    label_identity:
      source: path
      benign_rule: file_is_benign_traffic_csv
      attack_rule: file_under_attack_family_dir
    attack_family_identity: { source: path, derived_from: attack_family_directory_name }
    attack_type_identity: { source: path, derived_from: attack_file_basename }
    timestamp_field: none
    chronological_ordering_basis: source_row_order
    provenance_fields:
      - source_file_path
      - device_directory_name
      - attack_family_directory_name
      - attack_file_basename
  label_fields:
    binary_label: { benign: benign_traffic, attack: [gafgyt, mirai] }
    # Configured scientific grouping for the family-scope threshold policy. This is a study
    # decision about device type, not a property recovered from the source artifact.
    family_taxonomy: device_type
    family_map:
      Danmini_Doorbell: doorbell
      Ennio_Doorbell: doorbell
      Ecobee_Thermostat: other
      Philips_B120N10_Baby_Monitor: other
      Provision_PT_737E_Security_Camera: camera
      Provision_PT_838_Security_Camera: camera
      Samsung_SNH_1011_N_Webcam: camera
      SimpleHome_XCS7_1002_WHT_Security_Camera: camera
      SimpleHome_XCS7_1003_WHT_Security_Camera: camera
  model_features:
    role: model_feature
    type: numeric_float
    order:
      - MI_dir_L5_weight
      - MI_dir_L5_mean
      - MI_dir_L5_variance
      - MI_dir_L3_weight
      - MI_dir_L3_mean
      - MI_dir_L3_variance
      - MI_dir_L1_weight
      - MI_dir_L1_mean
      - MI_dir_L1_variance
      - MI_dir_L0.1_weight
      - MI_dir_L0.1_mean
      - MI_dir_L0.1_variance
      - MI_dir_L0.01_weight
      - MI_dir_L0.01_mean
      - MI_dir_L0.01_variance
      - H_L5_weight
      - H_L5_mean
      - H_L5_variance
      - H_L3_weight
      - H_L3_mean
      - H_L3_variance
      - H_L1_weight
      - H_L1_mean
      - H_L1_variance
