schema_version: 1
dataset: nbaiot
display_name: N-BaIoT
schema_id: nbaiot_kitsune_115
source_layout:
  root: N-BaIoT
  device_dirs:
    - Danmini_Doorbell
    - Ecobee_Thermostat
    - Ennio_Doorbell
    - Philips_B120N10_Baby_Monitor
    - Provision_PT_737E_Security_Camera
    - Provision_PT_838_Security_Camera
    - Samsung_SNH_1011_N_Webcam
    - SimpleHome_XCS7_1002_WHT_Security_Camera
    - SimpleHome_XCS7_1003_WHT_Security_Camera
  benign_file: benign_traffic.csv
  attack_family_dirs: [gafgyt_attacks, mirai_attacks]
  attack_file_pattern: "*.csv"
field_schema:
  source_column_count: 115
  identity_scheme:
    row_identity: source_row_order
    client_identity: { source: path, derived_from: device_directory_name }
    label_identity:
      source: path
      benign_rule: file_is_benign_traffic_csv
      attack_rule: file_under_attack_family_dir
    attack_family_identity: { source: path, derived_from: attack_family_directory_name }
    attack_type_identity: { source: path, derived_from: attack_file_basename }
    timestamp_field: none
    provenance_fields: [source_file_path, device_directory_name, attack_family_directory_name, attack_file_basename]
  label_fields:
    binary_label: { benign: benign_traffic, attack: [gafgyt, mirai] }
    family_taxonomy: device_type
    family_map:
      Danmini_Doorbell: doorbell
      Ennio_Doorbell: doorbell
      Ecobee_Thermostat: other
      Philips_B120N10_Baby_Monitor: other
      Provision_PT_737E_Security_Camera: camera
      Provision_PT_838_Security_Camera: camera
      Samsung_SNH_1011_N_Webcam: camera
      SimpleHome_XCS7_1002_WHT_Security_Camera: camera
      SimpleHome_XCS7_1003_WHT_Security_Camera: camera
  model_features:
    role: model_feature
    type: numeric_float
    order:
      - MI_dir_L5_weight
      - MI_dir_L5_mean
      - MI_dir_L5_variance
      - MI_dir_L3_weight
      - MI_dir_L3_mean
      - MI_dir_L3_variance
