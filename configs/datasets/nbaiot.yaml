      - HpHp_L0.01_pcc
  post_encoding_feature_order: same_as_model_features
  categorical_encoding: none
  leakage_exclusions: []

# Expected invariants that are part of the executable contract. A source tree violating one
# is a typed contract failure, not a silently tolerated difference.
source_contract:
  every_model_feature_present_in_every_file: true
  model_feature_count_equals_source_column_count: true
  reject_row_with_field_count_other_than_header: true
  reject_unparseable_numeric_model_feature: true

# Provenance inputs for the dataset fingerprint. Every path below must resolve inside this
# document; no path may point at generated evidence.
fingerprint_inputs:
  source: [source_layout.root, source_layout.device_dirs, field_schema.source_column_count]
  schema: [schema_id, field_schema.model_features.order]

# Client eligibility uses the shared primary_analysis policy in protocols.yaml.
eligibility_policy: primary_analysis

materializations:
  datp_core:
    materialization_id: nbaiot_datp_core
    normalization: { strategy: min_max, scope: global_train }
    preprocessing_sequence:
      - drop_cold_start_row
      - drop_exact_duplicate_rows
      - chronological_gapped_split
      - min_max_normalization_fit_on_train
    row_exclusion:
      # The first row of every Kitsune source file carries uninitialised running statistics.
      cold_start_row: drop_first_row_per_source_file
      duplicate_rows: drop_exact_duplicates_keep_first
      duplicate_scope: within_source_file
    split:
      method: chronological_gapped
      calibration_benign_only: true
      ratios: { train: 0.60, gap_1: 0.01, calibration: 0.20, gap_2: 0.01, test: 0.18 }
      ordering_basis: source_row_order
      ordering_scope: per_client_per_source_file
      gap_handling: excluded_contiguous_band_between_splits
      attack_rows: evaluation_only
      attack_test_membership: all_attack_rows
      attack_ordering: source_row_order_per_source_file
      benign_attack_deduplication: independent_per_source_file

  datp_core_dirichlet:
    materialization_id: nbaiot_datp_core_dirichlet
    normalization: { strategy: min_max, scope: global_train }
    preprocessing_sequence:
      - drop_cold_start_row
      - drop_exact_duplicate_rows
      - random_fractional_split
      - min_max_normalization_fit_on_train
    row_exclusion:
      cold_start_row: drop_first_row_per_source_file
      duplicate_rows: drop_exact_duplicates_keep_first
      duplicate_scope: within_source_file
    split:
      method: random_fractional
      calibration_benign_only: true
      split_seed: 0
      ratios: { train: 0.70, calibration: 0.15, test: 0.15 }
      ordering_basis: random_seeded
      ordering_scope: per_client
      gap_handling: none
      attack_rows: evaluation_only
      attack_test_membership: all_attack_rows
      attack_ordering: random_seeded
      benign_attack_deduplication: independent_per_source_file

  anchor:
    materialization_id: nbaiot_anchor_historical
    normalization: { strategy: standard, scope: global_train }
    preprocessing_sequence:
      - chronological_gapped_split
      - standard_normalization_fit_on_train
    row_exclusion:
      # The anchor reproduces historical conference semantics and therefore retains rows the
      # datp-core materializations drop. This asymmetry is intentional and must not be aligned.
      cold_start_row: retain
      duplicate_rows: retain
    split:
      method: chronological_gapped
      calibration_benign_only: true
      ratios: { train: 0.60, gap_1: 0.01, calibration: 0.20, gap_2: 0.01, test: 0.18 }
      ordering_basis: source_row_order
      ordering_scope: per_client_per_source_file
      gap_handling: excluded_contiguous_band_between_splits
      attack_rows: evaluation_only
      attack_test_membership: all_attack_rows
      attack_ordering: source_row_order_per_source_file
      benign_attack_deduplication: not_applied_rows_retained

setups:
  natural_devices:
    materialization: datp_core
    client_construction: { method: physical_device_clients, client_source: source_layout.device_dirs }
    provides_capabilities:
      - benign_calibration
      - benign_test_false_positive_metrics
      - per_client_attack_detection_metrics
      - attack_sensitive_threshold_tradeoff
      - family_taxonomy

  anchor_natural_devices:
    materialization: anchor
    client_construction: { method: physical_device_clients, client_source: source_layout.device_dirs }
    provides_capabilities:
      - benign_calibration
      - benign_test_false_positive_metrics
      - per_client_attack_detection_metrics
      - family_taxonomy

  dirichlet_partitioned:
    materialization: datp_core_dirichlet
    client_construction:
      method: dirichlet_partitioned_clients
      client_count: 20
      # The partition condition (Dirichlet alpha values and the separate IID reference) is
      # supplied by the experiment sweep; it is never a mixed-type list here.
      partition_condition: { from_experiment_sweep: partition_condition }
      source_mixture_components: physical_device_domains
      label_field: physical_device_domain
      partition_seed: 0
      allocation_procedure: dirichlet_draw_per_synthetic_client_over_source_domain_proportions
      same_proportions_govern:
        - benign_train_rows
        - benign_calibration_rows
        - benign_test_rows
        - attack_evaluation_rows
      split_role_preservation: each_source_domain_row_keeps_its_pre_partition_split_role
      attack_row_assignment: allocated_by_same_per_client_source_domain_proportions_as_benign_rows
      attack_labels_used_in_partition_generation: false
      minimum_row_counts: { train: 100, calibration: 100, test: 50 }
      retry_policy:
        behavior: deterministic_reseed_retry
        max_retries: 10
        retry_seed_derivation: partition_seed_plus_attempt_index
      feasibility_failure: typed_infeasibility_outcome_if_minimum_row_counts_unmet_after_max_retries
      manifest_fields:
        - client_count
        - partition_condition
        - partition_seed
        - per_client_source_domain_proportions
        - per_client_row_counts
        - retry_attempts_used
        - feasibility_status
    provides_capabilities:
      - benign_calibration
      - benign_test_false_positive_metrics
      - per_client_attack_detection_metrics
