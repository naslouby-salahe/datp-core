# Edge-IIoTset dataset contract.
#
# Declarative only. Measured row counts, endpoint distributions, category inventories,
# coverage ratios and feasibility verdicts are generated evidence and are deliberately absent.
#
# Feature-count concepts are kept strictly separate and are never conflated:
#   raw source columns                 -> field_schema.source_column_count
#   retained numeric features          -> length of retained_numeric_features.order
#   selected categorical source columns-> length of categorical_encoding.columns
#   fitted encoded category count      -> resolved at materialization fit time, benign train only
#   post-encoding model feature count  -> retained numeric + fitted encoded, never static
schema_version: 1
dataset: edge_iiotset
display_name: Edge-IIoTset
schema_id: edge_iiotset_wireshark_63

source_layout:
  root: "Edge-IIoTset dataset"
  normal_traffic_root: "Edge-IIoTset dataset/Normal traffic"
  attack_traffic_root: "Edge-IIoTset dataset/Attack traffic"
  normal_file_pattern: "*/*.csv"
  attack_file_pattern: "*_attack.csv"
  # Every normal-traffic group folder present in the source tree.
  normal_group_folders:
    - Distance
    - Flame_Sensor
    - Heart_Rate
    - IR_Receiver
    - Modbus
    - Soil_Moisture
    - Sound_Sensor
    - Temperature_and_Humidity
    - Water_Level
    - phValue
  # Modbus is a source-integrity exclusion, not an experimental ablation: no row of
  # Modbus.csv satisfies the 63-column positional contract, because frame.time carries an
  # address literal in place of a timestamp in every row and the leading fields are
  # displaced accordingly. There is no valid Modbus sub-population to retain, so the group
  # contributes no rows to any executable materialization or client population.
  non_executable_group_folders:
    - group: Modbus
      reason: source_integrity_column_displacement
      displaced_field: frame.time
  # The group folders that define the executable client population.
  executable_group_folders:
    - Distance
    - Flame_Sensor
    - Heart_Rate
    - IR_Receiver
    - Soil_Moisture
    - Sound_Sensor
    - Temperature_and_Humidity
    - Water_Level
    - phValue
  attack_files:
    - Backdoor_attack.csv
    - DDoS_HTTP_Flood_attack.csv
    - DDoS_ICMP_Flood_attack.csv
    - DDoS_TCP_SYN_Flood_attack.csv
    - DDoS_UDP_Flood_attack.csv
    - MITM_attack.csv
    - OS_Fingerprinting_attack.csv
    - Password_attack.csv
    - Port_Scanning_attack.csv
    - Ransomware_attack.csv
    - SQL_injection_attack.csv
    - Uploading_attack.csv
    - Vulnerability_scanner_attack.csv
    - XSS_attack.csv
  # Packet captures ship beside every CSV, and the distribution also carries a pre-selected
  # ML/DL extract that this study does not use. Only the patterns above are ingested.
  ignored_source_suffixes: [".pcap"]
  ignored_subtrees: ["Edge-IIoTset dataset/Selected dataset for ML and DL"]

field_schema:
  source_column_count: 63
  header_required: true
  header_must_be_identical_across_all_source_files: true
  source_columns:
    - frame.time
    - ip.src_host
    - ip.dst_host
    - arp.dst.proto_ipv4
    - arp.opcode
    - arp.hw.size
    - arp.src.proto_ipv4
    - icmp.checksum
    - icmp.seq_le
    - icmp.transmit_timestamp
    - icmp.unused
    - http.file_data
    - http.content_length
    - http.request.uri.query
    - http.request.method
    - http.referer
    - http.request.full_uri
    - http.request.version
    - http.response
    - http.tls_port
    - tcp.ack
    - tcp.ack_raw
    - tcp.checksum
    - tcp.connection.fin
    - tcp.connection.rst
    - tcp.connection.syn
    - tcp.connection.synack
    - tcp.dstport
    - tcp.flags
    - tcp.flags.ack
    - tcp.len
    - tcp.options
    - tcp.payload
    - tcp.seq
    - tcp.srcport
    - udp.port
    - udp.stream
    - udp.time_delta
    - dns.qry.name
    - dns.qry.name.len
    - dns.qry.qu
    - dns.qry.type
    - dns.retransmission
    - dns.retransmit_request
    - dns.retransmit_request_in
    - mqtt.conack.flags
    - mqtt.conflag.cleansess
    - mqtt.conflags
    - mqtt.hdrflags
    - mqtt.len
    - mqtt.msg_decoded_as
    - mqtt.msg
    - mqtt.msgtype
    - mqtt.proto_len
    - mqtt.protoname
    - mqtt.topic
    - mqtt.topic_len
    - mqtt.ver
    - mbtcp.len
    - mbtcp.trans_id
    - mbtcp.unit_id
    - Attack_label
    - Attack_type

  identity_scheme:
    row_identity:
      components: [source_file_path, source_row_index]
      index_scope: within_source_file
      preserved_through_materializations: true
    benign_group_identity: { source: path, derived_from: normal_traffic_group_folder }
    # Attack rows carry no recoverable per-client group identity; see attack_row_group_policy.
    attack_row_group_identity: unavailable
    device_identity: { source: column, column: ip.src_host, usable: false, superseded_by: endpoint_identity }
    timestamp_field:
      column: frame.time
      # The exported field carries a year token and a time of day but no month or day, so an
      # absolute wall-clock instant cannot be reconstructed.
      semantics: year_and_time_of_day_without_month_or_day
      absolute_instant_recoverable: false
      within_client_ordering: time_of_day_with_midnight_rollover_correction
      cross_client_wall_clock_ordering: unavailable
    provenance_fields: [source_file_path, normal_traffic_group_folder, attack_file_basename]

  label_fields:
    binary_label: { column: Attack_label, values: [0, 1] }
    multiclass_label: { column: Attack_type }
    benign_value: { Attack_label: 0, Attack_type: Normal }
    family_taxonomy: unavailable

  # Endpoint resolution is the configured rule for deriving a client from an internal address.
  endpoint_identity:
    resolution: direction_normalized_internal_endpoint
    fields: [ip.src_host, ip.dst_host, arp.src.proto_ipv4, arp.dst.proto_ipv4]
    internal_prefix: "192.168"
    subnet_component: third_octet
    subnet_role_source: dataset_paper_table_vi
    # Modbus spanned subnets 0 and 7 in the source tree, but it is a non-executable group,
    # so it appears in no subnet mapping and can never be resolved as a client.
    subnet_to_group:
      0: Temperature_and_Humidity
      1: Distance
      2: phValue
      3: Heart_Rate
      4: Water_Level
      5: IR_Receiver
      6: Sound_Sensor
      7: Flame_Sensor
      8: Soil_Moisture
    excluded_endpoints:
      attacker: ["192.168.0.170", "192.168.0.152"]
      ambiguous_dual_role: ["192.168.0.101"]
      placeholder: ["0", "0.0", "0.0.0.0", ""]
      public_external: excluded_as_spoofed_flood_or_incidental_background
    direction_normalization: prefer_non_attacker_internal_endpoint_then_smallest_nonzero_subnet
    unresolved_row_policy: excluded_from_client_assignment

  # The attacker and every attack-generating host reside in a single subnet, so attack rows
  # cannot be attributed to sensor clients. This is a configured scope limitation: the dataset
  # supports benign operating-point equity only.
  attack_row_group_policy:
    per_client_attack_assignment: unavailable
    reason: attack_traffic_originates_from_a_single_internal_subnet
    consequence: benign_operating_point_equity_only

  retained_numeric_features:
    role: model_feature
    # The count is the length of this list and is never restated as a separate literal.
    order:
      - arp.opcode
      - arp.hw.size
      - icmp.checksum
      - icmp.seq_le
      - icmp.unused
      - http.content_length
      - http.response
      - http.tls_port
      - tcp.ack
      - tcp.ack_raw
      - tcp.checksum
      - tcp.connection.fin
      - tcp.connection.rst
      - tcp.connection.syn
      - tcp.connection.synack
      - tcp.flags
      - tcp.flags.ack
      - tcp.len
      - tcp.seq
      - udp.stream
      - udp.time_delta
      - dns.qry.qu
      - dns.qry.type
      - dns.retransmission
      - dns.retransmit_request
      - dns.retransmit_request_in
      - mqtt.conflag.cleansess
      - mqtt.conflags
      - mqtt.hdrflags
      - mqtt.len
      - mqtt.msg_decoded_as
      - mqtt.msgtype
      - mqtt.proto_len
      - mqtt.topic_len
      - mqtt.ver
      - mbtcp.len
      - mbtcp.trans_id
      - mbtcp.unit_id
    # Several retained columns are Wireshark flag/checksum fields exported as hexadecimal
    # strings ("0x0000000a") interleaved with decimal values, so a plain float parse is not a
    # valid contract. The coercion below is explicit and must not be replaced by a silent
    # default, and a value matching none of the accepted forms is a typed parse failure.
    numeric_parsing:
      accepted_forms: [decimal, hexadecimal_0x_prefixed]
      hexadecimal_interpretation: unsigned_integer
      on_unparseable_value: typed_parse_failure
    # A value that matches none of the accepted forms — including an address literal, which
    # is client-identifying information rather than a protocol measurement — makes the whole
    # row invalid. It is never coerced, and never mapped to zero, NaN, missing, unknown, or a
    # categorical token. See source_contract.row_integrity_exclusions.
    on_invalid_value: reject_row_as_invalid_retained_numeric_feature

  categorical_encoding:
    strategy: one_hot
    columns:
      - http.request.method
      - http.referer
      - http.request.version
      - dns.qry.name.len
      - mqtt.conack.flags
      - mqtt.protoname
      - mqtt.topic
    # The vocabulary is fitted from the configured benign training partition only. Attack-only
    # category values must never enter it. The fitted width, and therefore the post-encoding
    # model feature count, are resolved at fit time and are not declared here.
    vocabulary_scope: benign_training_rows_only
    vocabulary_artifact: frozen_at_materialization_fit_time
    vocabulary_fingerprint: derived_from_fitted_benign_train_categories
    category_order: ascending_string
    encoded_feature_naming: "{column}={category_value}"
    missing_category_policy: absent_value_maps_to_missing_indicator
    unknown_category_policy: unseen_value_maps_to_unknown_indicator
    unknown_indicator_distinct_from_missing_indicator: true
    feature_order: [retained_numeric_features, one_hot_encoded_columns]

  leakage_exclusions:
    role_basis: leakage_or_high_cardinality_or_client_identity_or_timestamp
    columns:
      - frame.time
      - ip.src_host
      - ip.dst_host
      - arp.src.proto_ipv4
      - arp.dst.proto_ipv4
      - http.file_data
      - http.request.full_uri
      - icmp.transmit_timestamp
      - http.request.uri.query
      - tcp.options
      - tcp.payload
      - tcp.srcport
      - tcp.dstport
      - udp.port
      - mqtt.msg
      - dns.qry.name

source_contract:
  # Every source column is accounted for exactly once by one of the four roles below.
  column_role_partition:
    roles: [retained_numeric_features, categorical_encoding.columns, leakage_exclusions.columns, label_fields]
    partition_must_be_disjoint: true
    partition_must_cover_every_source_column: true
  reject_row_with_field_count_other_than_header: true

  # A row must satisfy the positional contract as well as the field-count contract: a row
  # carrying the right number of fields whose leading fields hold the wrong kind of value is
  # displaced, not merely untidy.
  positional_contract:
    timestamp_field_must_match_declared_semantics: true
    label_fields_must_carry_declared_values: true
    trailing_label_validity_does_not_imply_row_validity: true

  # Deterministic row-integrity exclusions. Both are evaluated on the raw source row, and
  # both run before split assignment, client eligibility, endpoint resolution, categorical
  # vocabulary fitting, normalization, duplicate accounting, and model-feature construction.
  # A row failing either exclusion can therefore never reach training, calibration, testing,
  # the fitted vocabulary, or any metric. Reasons are mutually exclusive and evaluated in the
  # order listed, so a row is attributed to exactly one reason and never double counted.
  row_integrity_exclusions:
    evaluation_order: [displaced_source_row, invalid_retained_numeric_feature]
    applies_before:
      - split_assignment
      - client_eligibility_evaluation
      - endpoint_resolution
      - categorical_vocabulary_fitting
      - normalization
      - duplicate_accounting
      - model_feature_construction
    reasons:
      displaced_source_row:
        detection: row_violates_positional_contract
        handling: exclude_and_count
      invalid_retained_numeric_feature:
        detection: retained_numeric_value_matches_no_accepted_numeric_form
        handling: exclude_and_count
        coercion: forbidden
    # After these exclusions, every retained numeric value admitted into an executable
    # materialization is deterministically parseable under the declared numeric_parsing rule.
    guarantees_all_admitted_retained_numeric_values_parseable: true

fingerprint_inputs:
  source: [source_layout.root, field_schema.source_column_count]
  schema:
    - schema_id
    - field_schema.retained_numeric_features.order
    - field_schema.categorical_encoding.columns
    - field_schema.categorical_encoding.vocabulary_scope

eligibility_policy: primary_analysis

materializations:
  group_benign:
    materialization_id: edge_iiotset_group_benign
    normalization: { strategy: min_max, scope: global_train }
    vocabulary_fit_split: benign_train
    preprocessing_sequence:
      - exclude_non_executable_group_folders
      - exclude_displaced_source_rows
      - exclude_invalid_retained_numeric_rows
      - drop_row_with_null_in_retained_column
      - drop_exact_duplicate_rows
      - one_hot_encode_categoricals
      - min_max_normalization_fit_on_train
    row_exclusion:
      non_executable_group_folder: drop_row
      displaced_source_row: drop_row
      invalid_retained_numeric_feature: drop_row
      null_in_retained_column: drop_row
      duplicate_rows: drop_exact_duplicates_keep_first
      unresolved_endpoint: excluded_from_client_assignment
    split:
      method: random_fractional
      calibration_benign_only: true
      split_seed: 0
      ratios: { train: 0.70, calibration: 0.15, test: 0.15 }
    split_row_semantics:
      train_rows: benign_only
      calibration_rows: benign_only
      test_rows: benign_only
      attack_rows: not_assigned_to_clients

  group_chronological:
    materialization_id: edge_iiotset_group_chronological
    normalization: { strategy: min_max, scope: historical_train }
    vocabulary_fit_split: historical_benign_train
    preprocessing_sequence:
      - exclude_non_executable_group_folders
      - exclude_displaced_source_rows
      - exclude_invalid_retained_numeric_rows
      - drop_row_with_null_in_retained_column
      - drop_exact_duplicate_rows
      - resolve_within_client_time_order
      - chronological_split
      - one_hot_encode_categoricals
      - min_max_normalization_fit_on_historical_train
    row_exclusion:
      non_executable_group_folder: drop_row
      displaced_source_row: drop_row
      invalid_retained_numeric_feature: drop_row
      null_in_retained_column: drop_row
      duplicate_rows: drop_exact_duplicates_keep_first
      unresolved_endpoint: excluded_from_client_assignment
      duplicate_timestamp_policy: preserve_original_row_order_stable_sort
    split:
      method: within_client_chronological
      calibration_benign_only: true
      role_order: [historical_train, historical_calibration, future_recalibration, future_evaluation]
      historical_train_fraction: 0.55
      historical_calibration_fraction: 0.15
      future_recalibration_fraction: 0.10
      future_evaluation_fraction: 0.20
      ordering_field: frame.time
      ordering_scope: per_client
      rollover_policy: add_twenty_four_hours_on_time_decrease
      minimum_row_counts:
        historical_train: 100
        historical_calibration: 100
        future_recalibration: 50
        future_evaluation: 100
      missing_client_policy: exclude_client_report_reduced_client_count
      chronology_unverifiable_policy: typed_infeasibility_outcome
    split_row_semantics:
      train_rows: benign_only
      calibration_rows: benign_only
      test_rows: benign_only
      attack_rows: not_assigned_to_clients

setups:
  sensor_groups:
    materialization: group_benign
    client_construction:
      method: sensor_group_clients
      client_source: source_layout.executable_group_folders
    validation_scope: benign_operating_point_equity
    provides_capabilities:
      - benign_calibration
      - benign_test_false_positive_metrics

  chronological_sensor_groups:
    materialization: group_chronological
    client_construction:
      method: sensor_group_clients
      # Modbus is already absent from the executable group folders as a source-integrity
      # exclusion, so the temporal population needs no separate exclusion of its own.
      client_source: source_layout.executable_group_folders
    validation_scope: benign_temporal_operating_point_equity
    provides_capabilities:
      - benign_calibration
      - benign_test_false_positive_metrics
      - within_client_chronological_ordering
