schema_version: 1
dataset: edge_iiotset
display_name: Edge-IIoTset
schema_id: edge_iiotset_wireshark_63

source_layout:
  root: "Edge-IIoTset dataset"
  normal_traffic_root: "Edge-IIoTset dataset/Normal traffic"
  attack_traffic_root: "Edge-IIoTset dataset/Attack traffic"
  normal_file_pattern: "*/*.csv"
  attack_file_pattern: "*_attack.csv"
  normal_group_folders:
    - Distance
    - Flame_Sensor
    - Heart_Rate
    - IR_Receiver
    - Modbus
    - Soil_Moisture
    - Sound_Sensor
    - Temperature_and_Humidity
    - Water_Level
    - phValue
  executable_group_folders:
    - Distance
    - Flame_Sensor
    - Heart_Rate
    - IR_Receiver
    - Modbus
    - Soil_Moisture
    - Sound_Sensor
    - Temperature_and_Humidity
    - Water_Level
    - phValue
  attack_files:
    - Backdoor_attack.csv
    - DDoS_HTTP_Flood_attack.csv
    - DDoS_ICMP_Flood_attack.csv
    - DDoS_TCP_SYN_Flood_attack.csv
    - DDoS_UDP_Flood_attack.csv
    - MITM_attack.csv
    - OS_Fingerprinting_attack.csv
    - Password_attack.csv
    - Port_Scanning_attack.csv
    - Ransomware_attack.csv
    - SQL_injection_attack.csv
    - Uploading_attack.csv
    - Vulnerability_scanner_attack.csv
    - XSS_attack.csv
  ignored_source_suffixes: [".pcap"]
  ignored_subtrees: ["Edge-IIoTset dataset/Selected dataset for ML and DL"]

field_schema:
  source_column_count: 63
  header_required: true
  header_must_be_identical_across_all_source_files: true
  source_columns:
    - frame.time
    - ip.src_host
    - ip.dst_host
    - arp.dst.proto_ipv4
    - arp.opcode
    - arp.hw.size
    - arp.src.proto_ipv4
    - icmp.checksum
    - icmp.seq_le
    - icmp.transmit_timestamp
    - icmp.unused
    - http.file_data
    - http.content_length
    - http.request.uri.query
    - http.request.method
    - http.referer
    - http.request.full_uri
    - http.request.version
    - http.response
    - http.tls_port
    - tcp.ack
    - tcp.ack_raw
    - tcp.checksum
    - tcp.connection.fin
    - tcp.connection.rst
    - tcp.connection.syn
    - tcp.connection.synack
    - tcp.dstport
    - tcp.flags
    - tcp.flags.ack
    - tcp.len
    - tcp.options
    - tcp.payload
    - tcp.seq
    - tcp.srcport
    - udp.port
    - udp.stream
    - udp.time_delta
    - dns.qry.name
    - dns.qry.name.len
    - dns.qry.qu
    - dns.qry.type
    - dns.retransmission
    - dns.retransmit_request
    - dns.retransmit_request_in
    - mqtt.conack.flags
    - mqtt.conflag.cleansess
    - mqtt.conflags
    - mqtt.hdrflags
    - mqtt.len
    - mqtt.msg_decoded_as
    - mqtt.msg
    - mqtt.msgtype
    - mqtt.proto_len
    - mqtt.protoname
    - mqtt.topic
    - mqtt.topic_len
    - mqtt.ver
    - mbtcp.len
    - mbtcp.trans_id
    - mbtcp.unit_id
    - Attack_label
    - Attack_type

  identity_scheme:
    row_identity:
      components: [source_file_path, source_row_index]
      index_scope: within_source_file
      preserved_through_materializations: true
    benign_group_identity: { source: path, derived_from: normal_traffic_group_folder }
    attack_row_group_identity: unavailable
    device_identity: { source: column, column: ip.src_host, usable: false, superseded_by: endpoint_identity }
    timestamp_field:
      column: frame.time
      semantics: year_and_time_of_day_without_month_or_day
      absolute_instant_recoverable: false
      within_client_ordering: time_of_day_with_midnight_rollover_correction
      cross_client_wall_clock_ordering: unavailable
    provenance_fields: [source_file_path, normal_traffic_group_folder, attack_file_basename]

  label_fields:
    binary_label: { column: Attack_label, values: [0, 1] }
    multiclass_label: { column: Attack_type }
    benign_value: { Attack_label: 0, Attack_type: Normal }
    family_taxonomy: unavailable

  endpoint_identity:
    resolution: direction_normalized_internal_endpoint
    fields: [ip.src_host, ip.dst_host, arp.src.proto_ipv4, arp.dst.proto_ipv4]
    internal_prefix: "192.168"
    subnet_component: third_octet
    subnet_role_source: dataset_paper_table_vi
    subnet_to_group:
      0: Temperature_and_Humidity
      1: Distance
      2: phValue
      3: Heart_Rate
      4: Water_Level
      5: IR_Receiver
      6: Sound_Sensor
      7: Flame_Sensor
      8: Soil_Moisture
    excluded_endpoints:
      attacker: ["192.168.0.170", "192.168.0.152"]
      ambiguous_dual_role: ["192.168.0.101"]
      placeholder: ["0", "0.0", "0.0.0.0", ""]
      public_external: excluded_as_spoofed_flood_or_incidental_background
    direction_normalization: prefer_non_attacker_internal_endpoint_then_smallest_nonzero_subnet
    use: source_integrity_auditing_attack_assignment_diagnostics_and_provenance_only
    unresolved_row_policy: retained_for_folder_defined_benign_client_assignment_and_reported_for_provenance

  attack_row_group_policy:
    per_client_attack_assignment: unavailable
    reason: attack_traffic_originates_from_a_single_internal_subnet
    consequence: benign_operating_point_equity_only

  retained_numeric_features:
    role: model_feature
    order:
      - arp.opcode
      - arp.hw.size
      - icmp.checksum
      - icmp.seq_le
      - icmp.unused
      - http.content_length
      - http.response
      - http.tls_port
      - tcp.ack
      - tcp.ack_raw
      - tcp.checksum
      - tcp.connection.fin
      - tcp.connection.rst
      - tcp.connection.syn
      - tcp.connection.synack
      - tcp.flags
      - tcp.flags.ack
      - tcp.len
      - tcp.seq
      - udp.stream
      - udp.time_delta
      - dns.qry.qu
      - dns.qry.type
      - dns.retransmission
      - dns.retransmit_request
      - dns.retransmit_request_in
      - mqtt.conflag.cleansess
      - mqtt.conflags
      - mqtt.hdrflags
      - mqtt.len
      - mqtt.msg_decoded_as
      - mqtt.msgtype
      - mqtt.proto_len
      - mqtt.topic_len
      - mqtt.ver
      - mbtcp.len
      - mbtcp.trans_id
      - mbtcp.unit_id
    numeric_parsing:
      accepted_forms: [decimal, hexadecimal_0x_prefixed]
      hexadecimal_interpretation: unsigned_integer
      on_unparseable_value: typed_parse_failure
    on_invalid_value: reject_row_as_invalid_retained_numeric_feature

  categorical_encoding:
    strategy: one_hot
    columns:
      - http.request.method
      - http.referer
      - http.request.version
      - dns.qry.name.len
      - mqtt.conack.flags
      - mqtt.protoname
      - mqtt.topic
    vocabulary_scope: benign_training_rows_only
    vocabulary_artifact: frozen_at_materialization_fit_time
    vocabulary_fingerprint: derived_from_fitted_benign_train_categories
    category_order: ascending_string
    encoded_feature_naming: "{column}={category_value}"
    missing_category_policy: absent_value_maps_to_missing_indicator
    unknown_category_policy: unseen_value_maps_to_unknown_indicator
    unknown_indicator_distinct_from_missing_indicator: true
    feature_order: [retained_numeric_features, one_hot_encoded_columns]

  leakage_exclusions:
    role_basis: leakage_or_high_cardinality_or_client_identity_or_timestamp
    columns:
      - frame.time
      - ip.src_host
      - ip.dst_host
      - arp.src.proto_ipv4
      - arp.dst.proto_ipv4
      - http.file_data
      - http.request.full_uri
      - icmp.transmit_timestamp
      - http.request.uri.query
      - tcp.options
      - tcp.payload
      - tcp.srcport
      - tcp.dstport
      - udp.port
      - mqtt.msg
      - dns.qry.name

source_contract:
  column_role_partition:
    roles: [retained_numeric_features, categorical_encoding.columns, leakage_exclusions.columns, label_fields]
    partition_must_be_disjoint: true
    partition_must_cover_every_source_column: true
  reject_row_with_field_count_other_than_header: true

  positional_contract:
    timestamp_field_must_match_declared_semantics_for_temporal_materialization_only: true
    label_fields_must_carry_declared_values: true
    trailing_label_validity_does_not_imply_row_validity: true

  row_integrity_exclusions:
    evaluation_order: [invalid_retained_numeric_feature]
    applies_before:
      - split_assignment
      - client_eligibility_evaluation
      - endpoint_resolution
      - categorical_vocabulary_fitting
      - normalization
      - duplicate_accounting
      - model_feature_construction
    reasons:
      invalid_retained_numeric_feature:
        detection: retained_numeric_value_matches_no_accepted_numeric_form
        handling: exclude_and_count
        coercion: forbidden
    guarantees_all_admitted_retained_numeric_values_parseable: true

fingerprint_inputs:
  source: [source_layout.root, source_layout.executable_group_folders, field_schema.source_column_count]
  schema:
    - schema_id
    - field_schema.retained_numeric_features.order
    - field_schema.categorical_encoding.columns
    - field_schema.categorical_encoding.vocabulary_scope
    - field_schema.leakage_exclusions.columns
  materialization:
    - materialization_id
    - preprocessing_sequence
    - row_exclusion
    - normalization
    - vocabulary_fit_split
    - split
  client_assignment:
    - client_construction
    - field_schema.endpoint_identity.subnet_to_group
    - field_schema.endpoint_identity.excluded_endpoints
    - field_schema.endpoint_identity.direction_normalization

client_identity_contract:
  authoritative_client_definition: normal_traffic_group_folder
  valid_benign_row_assignment: every_source_integrity_valid_benign_row_is_assigned_to_its_folder_defined_sensor_group_client
  endpoint_resolution: may_not_exclude_or_reassign_a_source_integrity_valid_benign_row
  endpoint_permitted_uses: [source_integrity_auditing, attack_assignment_diagnostics, provenance]

eligibility_policy: primary_analysis

materializations:
  group_benign:
    materialization_id: edge_iiotset_group_benign
    normalization: { strategy: min_max, scope: global_train }
    vocabulary_fit_split: benign_train
    preprocessing_sequence:
      - exclude_invalid_retained_numeric_rows
      - drop_row_with_null_in_retained_column
      - drop_exact_duplicate_rows
      - one_hot_encode_categoricals
      - min_max_normalization_fit_on_train
    row_exclusion:
      invalid_retained_numeric_feature: drop_row
      null_in_retained_column: drop_row
      duplicate_rows: drop_exact_duplicates_keep_first
      unresolved_endpoint: retained_for_folder_defined_benign_client_assignment_and_reported_for_provenance
    split:
      method: random_fractional
      calibration_benign_only: true
      split_seed: 0
      ratios: { train: 0.70, calibration: 0.15, test: 0.15 }
    split_row_semantics:
      train_rows: benign_only
      calibration_rows: benign_only
      test_rows: benign_only
      attack_rows: not_assigned_to_clients

  group_chronological:
    materialization_id: edge_iiotset_group_chronological
    normalization: { strategy: min_max, scope: historical_train }
    vocabulary_fit_split: historical_benign_train
    preprocessing_sequence:
      - exclude_invalid_retained_numeric_rows
      - drop_row_with_null_in_retained_column
      - drop_exact_duplicate_rows
      - resolve_within_client_time_order
      - chronological_split
      - one_hot_encode_categoricals
      - min_max_normalization_fit_on_historical_train
    row_exclusion:
      invalid_retained_numeric_feature: drop_row
      null_in_retained_column: drop_row
      duplicate_rows: drop_exact_duplicates_keep_first
      unresolved_endpoint: retained_for_folder_defined_benign_client_assignment_and_reported_for_provenance
      duplicate_timestamp_policy: preserve_original_row_order_stable_sort
    split:
      method: within_client_chronological
      calibration_benign_only: true
      role_order: [historical_train, historical_calibration, future_recalibration, future_evaluation]
      excluded_client_folders: [Modbus]
      exclusion_reason: timestamp_field_contains_address_literals_not_temporal_values
      historical_train_fraction: 0.55
      historical_calibration_fraction: 0.15
      future_recalibration_fraction: 0.10
      future_evaluation_fraction: 0.20
      ordering_field: frame.time
      ordering_scope: per_client
      ordering_sort: stable_ascending_on_corrected_time_then_original_row_order
      rollover_policy: add_twenty_four_hours_on_time_decrease
      rollover_scope: per_client_cumulative_over_the_client_stable_source_order
      boundary_rule: contiguous_fractions_of_the_ordered_row_sequence_in_role_order
      boundary_index_formula: "role boundary index = floor(cumulative_fraction * n_client_rows)"
      gap_handling: none_roles_are_contiguous_and_disjoint
      future_leakage_check: every_future_role_row_index_must_exceed_every_historical_role_row_index
      minimum_row_counts:
        historical_train: 100
        historical_calibration: 100
        future_recalibration: 50
        future_evaluation: 100
      missing_client_policy: exclude_client_report_reduced_client_count
      chronology_unverifiable_policy: typed_infeasibility_outcome
    split_row_semantics:
      train_rows: benign_only
      calibration_rows: benign_only
      test_rows: benign_only
      attack_rows: not_assigned_to_clients

  group_chronological_static_reference:
    materialization_id: edge_iiotset_group_chronological_static_reference
    normalization: { strategy: min_max, scope: global_train }
    vocabulary_fit_split: benign_train
    preprocessing_sequence:
      - exclude_invalid_retained_numeric_rows
      - drop_row_with_null_in_retained_column
      - drop_exact_duplicate_rows
      - random_fractional_split
      - one_hot_encode_categoricals
      - min_max_normalization_fit_on_train
    row_exclusion:
      invalid_retained_numeric_feature: drop_row
      null_in_retained_column: drop_row
      duplicate_rows: drop_exact_duplicates_keep_first
      unresolved_endpoint: retained_for_folder_defined_benign_client_assignment_and_reported_for_provenance
    split:
      method: random_fractional
      calibration_benign_only: true
      split_seed: 0
      excluded_client_folders: [Modbus]
      exclusion_reason: static_reference_population_must_match_chronological_sensor_groups_and_modbus_has_no_usable_timestamp
      ratios: { train: 0.55, calibration: 0.15, recalibration_reference: 0.10, test: 0.20 }
    split_row_semantics:
      train_rows: benign_only
      calibration_rows: benign_only
      test_rows: benign_only
      attack_rows: not_assigned_to_clients

setups:
  sensor_groups:
    materialization: group_benign
    client_construction:
      method: sensor_group_clients
      client_source: source_layout.executable_group_folders
    validation_scope: benign_operating_point_equity
    eligibility_gate: edge_external_benign_coverage
    provides_capabilities:
      - benign_calibration
      - benign_test_false_positive_metrics

  chronological_sensor_groups:
    materialization: group_chronological
    client_construction:
      method: sensor_group_clients
      client_source: source_layout.executable_group_folders
      excluded_client_folders: [Modbus]
    validation_scope: benign_temporal_operating_point_equity
    eligibility_gate: edge_external_benign_coverage
    provides_capabilities:
      - benign_calibration
      - benign_test_false_positive_metrics
      - within_client_chronological_ordering

  chronological_static_reference_groups:
    materialization: group_chronological_static_reference
    client_construction:
      method: sensor_group_clients
      client_source: source_layout.executable_group_folders
      excluded_client_folders: [Modbus]
    client_population_must_equal_setup: chronological_sensor_groups
    validation_scope: benign_operating_point_equity
    eligibility_gate: edge_external_benign_coverage
    provides_capabilities:
      - benign_calibration
      - benign_test_false_positive_metrics
