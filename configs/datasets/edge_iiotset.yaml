schema_version: 1
dataset: edge_iiotset
display_name: Edge-IIoTset
schema_id: edge_iiotset_wireshark_63
source_layout:
  root: "Edge-IIoTset dataset"
  normal_traffic_root: "Edge-IIoTset dataset/Normal traffic"
  attack_traffic_root: "Edge-IIoTset dataset/Attack traffic"
  normal_file_pattern: "*/*.csv"
  attack_file_pattern: "*_attack.csv"
  normal_group_folders: [Distance, Flame_Sensor, Heart_Rate, IR_Receiver, Modbus, Soil_Moisture, Sound_Sensor, Temperature_and_Humidity, Water_Level, phValue]
  attack_files: [Backdoor_attack.csv, DDoS_HTTP_Flood_attack.csv, DDoS_ICMP_Flood_attack.csv, DDoS_TCP_SYN_Flood_attack.csv, DDoS_UDP_Flood_attack.csv, MITM_attack.csv, OS_Fingerprinting_attack.csv, Password_attack.csv, Port_Scanning_attack.csv, Ransomware_attack.csv, SQL_injection_attack.csv, Uploading_attack.csv, Vulnerability_scanner_attack.csv, XSS_attack.csv]
field_schema:
  source_column_count: 63
  source_columns:
    - frame.time
    - ip.src_host
    - ip.dst_host
    - arp.dst.proto_ipv4
    - arp.opcode
    - arp.hw.size
    - arp.src.proto_ipv4
    - icmp.checksum
    - icmp.seq_le
    - icmp.transmit_timestamp
    - icmp.unused
    - http.file_data
    - http.content_length
    - http.request.uri.query
    - http.request.method
    - http.referer
    - http.request.full_uri
    - http.request.version
    - http.response
    - http.tls_port
    - tcp.ack
    - tcp.ack_raw
    - tcp.checksum
    - tcp.connection.fin
    - tcp.connection.rst
    - tcp.connection.syn
    - tcp.connection.synack
    - tcp.dstport
    - tcp.flags
    - tcp.flags.ack
    - tcp.len
    - tcp.options
    - tcp.payload
    - tcp.seq
    - tcp.srcport
    - udp.port
    - udp.stream
    - udp.time_delta
    - dns.qry.name
    - dns.qry.name.len
    - dns.qry.qu
    - dns.qry.type
    - dns.retransmission
    - dns.retransmit_request
    - dns.retransmit_request_in
    - mqtt.conack.flags
    - mqtt.conflag.cleansess
    - mqtt.conflags
    - mqtt.hdrflags
    - mqtt.len
    - mqtt.msg_decoded_as
    - mqtt.msg
    - mqtt.msgtype
    - mqtt.proto_len
    - mqtt.protoname
    - mqtt.topic
    - mqtt.topic_len
    - mqtt.ver
    - mbtcp.len
    - mbtcp.trans_id
    - mbtcp.unit_id
    - Attack_label
    - Attack_type
  identity_scheme:
    row_identity:
      components: [source_file_path, source_row_index]
      index_scope: within_source_file
      preserved_through_materializations: true
    benign_group_identity: { source: path, derived_from: normal_traffic_group_folder }
    attack_row_group_identity: unavailable
    device_identity: { source: column, column: ip.src_host, usable: false, superseded_by: endpoint_identity }
    timestamp_field: { column: frame.time, semantics: time_of_day_no_month_day }
    provenance_fields: [source_file_path, normal_traffic_group_folder, attack_file_basename]
  label_fields:
    binary_label: { column: Attack_label, values: [0, 1] }
    multiclass_label: { column: Attack_type }
    family_taxonomy: unavailable
  attack_row_group_assignment:
    available: false
    reason: attack_traffic_confined_to_subnet_zero
    resolved_attack_subnets: [0]
    resolved_attack_fraction: 0.9995
    attack_rows_in_sensor_subnets_1_8: 0
    decision_ref: client_granularity_feasibility
    limits: attack_sensitive_per_client_metrics_only
  endpoint_identity:
    resolution: direction_normalized_internal_endpoint
    fields: [ip.src_host, ip.dst_host, arp.src.proto_ipv4, arp.dst.proto_ipv4]
    internal_prefix: "192.168"
    subnet_role_source: dataset_paper_table_vi
    subnet_to_group:
      0: [Temperature_and_Humidity, Modbus]   # shared /24; also hosts the attacker
      1: Distance
      2: phValue
      3: Heart_Rate
      4: Water_Level
      5: IR_Receiver
      6: Sound_Sensor
      7: [Flame_Sensor, Modbus]               # Modbus server row shares Flame_Sensor's /24
      8: Soil_Moisture
    excluded_endpoints:
      attacker: [192.168.0.170, 192.168.0.152]
      ambiguous_dual_role: [192.168.0.101]    # Temperature IoT node and attacker impersonation IP
      placeholder: ["0", "0.0.0.0"]
      public_external: spoofed_flood_or_incidental_background
    direction_normalization: prefer_non_attacker_internal_endpoint_then_smallest_nonzero_subnet
    unresolved_row_policy: excluded_from_client_assignment
    resolved_coverage:
      benign: { rows: 11209913, resolved_fraction: 0.975 }
      attack: { rows: 9729709, resolved_fraction: 0.9995, resolved_subnets: [0] }
      clients_with_benign_and_attack: 1
      required_client_coverage_ratio: 0.90
      joint_client_coverage_ratio: 0.11
    verdict: benign_group_identity_confirmed_attack_partition_infeasible
  retained_numeric_features:
    role: model_feature
    type: numeric_float
    count: 39
    order:
      - arp.opcode
      - arp.hw.size
      - icmp.checksum
      - icmp.seq_le
      - icmp.unused
      - http.content_length
      - http.response
      - http.tls_port
      - tcp.ack
      - tcp.ack_raw
      - tcp.checksum
      - tcp.connection.fin
      - tcp.connection.rst
      - tcp.connection.syn
      - tcp.connection.synack
      - tcp.flags
      - tcp.flags.ack
      - tcp.len
      - tcp.seq
      - udp.stream
      - udp.time_delta
      - dns.qry.name
      - dns.qry.qu
      - dns.qry.type
      - dns.retransmission
      - dns.retransmit_request
      - dns.retransmit_request_in
      - mqtt.conflag.cleansess
      - mqtt.conflags
      - mqtt.hdrflags
      - mqtt.len
      - mqtt.msg_decoded_as
      - mqtt.msgtype
      - mqtt.proto_len
      - mqtt.topic_len
      - mqtt.ver
      - mbtcp.len
      - mbtcp.trans_id
      - mbtcp.unit_id
  categorical_encoding:
    strategy: one_hot
    columns: [http.request.method, http.referer, http.request.version, dns.qry.name.len, mqtt.conack.flags, mqtt.protoname, mqtt.topic]
    retained_numeric_feature_count: 39
    vocabulary_scope: benign_training_rows_only
    vocabulary_fit_split: benign_train
    vocabulary_artifact: frozen_at_materialization_fit_time
    vocabulary_fingerprint: derived_from_fitted_benign_train_categories
    category_order: ascending_string
    encoded_feature_naming: "{column}={category_value}"
    missing_category_policy: absent_value_maps_to_missing_indicator
    unknown_category_policy: unseen_value_maps_to_unknown_indicator
    unknown_indicator_distinct_from_missing_indicator: true
    unknown_reporting: { unknown_counts_by_split: reported_at_fit_time, unknown_fractions_by_client: reported_at_fit_time }
    feature_order: [retained_numeric_features, one_hot_encoded_columns]
    full_corpus_audit_reference:
      note: >-
        The counts and category lists below were measured over the full corpus
        (benign and attack rows) during source inspection. They are audit
        observations only and are never fitted as the executable vocabulary.
        The executable vocabulary is fitted from benign_train rows only (static)
        or historical benign-training rows only (temporal, `vocabulary_fit_split:
        historical_benign_train`) by the `categorical_vocabulary_benign_fit_audit`
        check below at materialization time; encoded_feature_count and
        total_model_feature_count are re-derived then and may be narrower than
        the full-corpus reference values, since attack-only category values
        (e.g. injection-payload strings in http.referer/http.request.version)
        are excluded from a benign-only fit.
      encoded_feature_count: 76
      total_model_feature_count: 115
      per_column_measured_width: { http.request.method: 9, http.referer: 6, http.request.version: 14, dns.qry.name.len: 17, mqtt.conack.flags: 14, mqtt.protoname: 4, mqtt.topic: 12 }
      observed_source_categories:
        http.request.method:
        - '0'
        - '0.0'
        - GET
        - OPTIONS
        - POST
        - PROPFIND
        - PUT
        - SEARCH
        - TRACE
        http.referer:
        - '() { _; } >_[$($())] { echo 93e4r0-CVE-2014-6278: true; echo;echo; }'
        - '0'
        - '0.0'
        - '1.0'
        - 127.0.0.1
        - TESTING_PURPOSES_ONLY
        http.request.version:
        - -a HTTP/1.1
        - -al&ABSOLUTE_PATH_STUDIP=http://cirt.net/rfiinc.txt?? HTTP/1.1
        - -al&_PHPLIB[libdir]=http://cirt.net/rfiinc.txt?? HTTP/1.1
        - /etc/passwd|?data=Download HTTP/1.1
        - '0'
        - '0.0'
        - '0x0000511a'
        - '> HTTP/1.1'
        - By Dr HTTP/1.1
        - HTTP/1.0
        - HTTP/1.1
        - Src=javascript:alert('Vulnerable')><Img Src=\" HTTP/1.1
        - name=a><input name=i value=XSS>&lt;script>alert('Vulnerable')</script> HTTP/1.1
        - script>alert(1)/script><\" HTTP/1.1
        dns.qry.name.len:
        - '0'
        - '0.0'
        - 0.debian.pool.ntp.org
        - '1.0'
        - 1.debian.pool.ntp.org
        - '11.0'
        - '17.0'
        - 2.debian.pool.ntp.org
        - '21.0'
        - '245'
        - 3.debian.pool.ntp.org
        - _233637DE._sub._googlecast._tcp.local
        - _googlecast._tcp.local
        - _ipp._tcp.local
        - _ipps._tcp.local
        - null-null.local
        - raspberrypi.local
        mqtt.conack.flags:
        - '0'
        - '0.0'
        - '0x00000000'
        - '12'
        - '1461073'
        - '1461074'
        - '1461383'
        - '1461384'
        - '1461589'
        - '1461591'
        - '1471198'
        - '1471199'
        - '1574358'
        - '1574359'
        mqtt.protoname:
        - '0'
        - '0.0'
        - '3'
        - MQTT
        mqtt.topic:
        - '0'
        - '0.0'
        - '14'
        - Distance
        - Flame_Sensor
        - Heart_Rate
        - IR_Receiver
        - Soil_Moisture
        - Sound_Sensor
        - Temperature_and_Humidity
        - Water_Level
        - phValue
  leakage_exclusions:
    columns: [frame.time, ip.src_host, ip.dst_host, arp.src.proto_ipv4, arp.dst.proto_ipv4, http.file_data, http.request.full_uri, icmp.transmit_timestamp, http.request.uri.query, tcp.options, tcp.payload, tcp.srcport, tcp.dstport, udp.port, mqtt.msg]
    role_basis: leakage_or_high_cardinality_or_client_identity_or_timestamp
  fingerprint_inputs:
    source: [source_layout.root, field_schema.source_column_count]
    schema: [schema_id, field_schema.retained_numeric_features.order, field_schema.categorical_encoding.total_model_feature_count, field_schema.categorical_encoding.category_values]
observed_facts:
  normal_group_count: 10
  attack_file_count: 14
  total_model_feature_count: 115
  benign_group_row_counts: { Distance: 1143540, Flame_Sensor: 1070196, Heart_Rate: 165319, IR_Receiver: 1307778, Modbus: 159502, Soil_Moisture: 1192777, Sound_Sensor: 1512883, Temperature_and_Humidity: 1615722, Water_Level: 2295288, phValue: 746908 }
  device_granularity_rejected: true
  timestamp_unusable_files: [Modbus, DDoS_UDP_Flood_attack, MITM_attack]
  exact_duplicate_rate: 0.000125
  family_taxonomy_available: false
  temperature_subnet: 0                       # shared /24 with Modbus
  attack_resolved_subnets: [0]
  attack_rows_in_sensor_subnets_1_8: 0
  benign_subnet_consistency: one_subnet_per_folder_except_modbus_spans_0_and_7
readiness:
  source_schema_complete: true
  benign_group_partition_recoverable: true
  benign_endpoint_identity_recoverable: true
  eligible_benign_client_coverage_ratio: 1.0
  fpr_scope_evaluation_executable: true
  benign_temporal_fpr_evaluation_executable: true
  attack_sensitive_per_client_evaluation_executable: false
  attack_row_group_assignment_recoverable: false
  external_validation_mode: benign_operating_point_equity
evaluation_capabilities:
  benign_calibration:
    status: available
    readiness_evidence: benign_group_partition_recoverable
  benign_test_false_positive_metrics:
    status: available
    result_types: [fleet_dispersion_result, fleet_equity_result]
    supported_metrics: [fpr, cv_fpr, iqr_fpr, fpr_range, worst_client_fpr, jain_index, gini_coefficient]
    readiness_evidence: eligible_benign_client_coverage_ratio
  threshold_scope_dispersion:
    status: available
    result_type: confirmatory_analysis_result
  benign_score_distribution_analysis:
    status: available
    result_types: [cluster_dispersion_result, cluster_stability_result, metric_association_result]
  conformal_benign_coverage:
    status: available
    result_type: conformal_coverage_result
  per_client_attack_detection_metrics:
    status: unavailable
    reason: attack_traffic_confined_to_subnet_zero
    result_type: fleet_detection_result
    unsupported_metrics: [tpr, cv_tpr, recall, macro_f1, p10_macro_f1, balanced_accuracy, worst_client_ba, auroc]
  attack_sensitive_threshold_tradeoff:
    status: unavailable
    reason: attack_traffic_confined_to_subnet_zero
audits:
  - check: source_inspection
    inspection:
      expected_facts: [feature_schema_present, device_identity_recoverable, capture_timestamp_present_or_absent]
      source_row_identity_scheme: required
    feasibility:
      rule: source_schema_complete
      required_evidence: [feature_schema_manifest, per_device_counts, timestamp_evidence]
    operations: { execution: dataset_audit, report: { table_type: source_inspection_report, output_formats: [markdown] } }
  - check: client_granularity_feasibility
    inspection:
      expected_facts: [per_candidate_client_benign_counts, per_candidate_client_attack_counts]
      candidate_granularities: [device, resolved_endpoint, group]
      target_client_counts: [6, 15]
    feasibility:
      rule: eligibility_coverage_gate
      minimum_calibration_sample_count: 100
      minimum_client_coverage_ratio: 0.90
      required_evidence: [per_client_benign_counts, per_client_attack_counts]
    outcome:
      device_granularity: rejected
      resolved_endpoint_granularity: benign_only
      group_granularity: authorized_benign_only
      group_count: 10
      joint_benign_attack_partition: infeasible
      joint_client_coverage_ratio: 0.11
      benign_operating_point_equity_executable: true
      attack_sensitive_per_client_evaluation_executable: false
    operations: { execution: dataset_audit, report: { table_type: feasibility_report, output_formats: [markdown] } }
  - check: timestamp_semantics_verification
    inspection:
      expected_facts: [genuine_capture_time_field_present, per_client_temporal_ordering_recoverable]
    feasibility:
      rule: timestamp_semantics_verified
      required_evidence: [timestamp_evidence, per_client_time_span]
    outcome:
      within_client_ordering: time_of_day_with_midnight_rollover_correction
      cross_client_wall_clock_ordering: unavailable
      temporal_group_count: 9
      excluded_groups: [Modbus]
    operations: { execution: dataset_audit, report: { table_type: feasibility_report, output_formats: [markdown] } }
  - check: categorical_vocabulary_benign_fit_audit
    inspection:
      expected_facts: [per_column_benign_train_category_counts, unknown_counts_by_split, unknown_fractions_by_client]
      fit_split: { static: benign_train, temporal: historical_benign_train }
    feasibility:
      rule: benign_only_vocabulary_fit_verified
      required_evidence: [vocabulary_fit_split_identity, vocabulary_artifact, vocabulary_fingerprint]
    outcome:
      vocabulary_scope_verified: benign_training_rows_only
      encoded_feature_count: pending_benign_train_only_fit
      total_model_feature_count: pending_benign_train_only_fit
      note: >-
        Re-derives per_column_measured_width, encoded_feature_count, and
        total_model_feature_count from a benign-training-only fit at
        materialization time; supersedes the full_corpus_audit_reference
        values in field_schema.categorical_encoding for execution.
    operations: { execution: dataset_audit, report: { table_type: feasibility_report, output_formats: [markdown] } }
eligibility:
  minimum_calibration_sample_count: 100
materializations:
  group_benign:
    materialization_id: edge_iiotset_group_benign
    normalization: { strategy: min_max, scope: global_train }
    vocabulary_fit_split: benign_train
    preprocessing_sequence: [drop_row_with_null_in_retained_column, drop_exact_duplicate_rows, one_hot_encode_categoricals, min_max_normalization_fit_on_train]
    row_exclusion:
      null_in_retained_column: drop_row
      duplicate_rows: drop_exact_duplicates_keep_first
    split:
      method: random_fractional
      calibration_benign_only: true
      split_seed: 0
      ratios: { train: 0.70, calibration: 0.15, test: 0.15 }
  group_chronological:
    materialization_id: edge_iiotset_group_chronological
    normalization: { strategy: min_max, scope: historical_train }
    vocabulary_fit_split: historical_benign_train
    preprocessing_sequence: [drop_row_with_null_in_retained_column, drop_exact_duplicate_rows, resolve_within_client_time_order, chronological_split, one_hot_encode_categoricals, min_max_normalization_fit_on_historical_train]
    row_exclusion:
      null_in_retained_column: drop_row
      duplicate_rows: drop_exact_duplicates_keep_first
      unresolved_row_policy: excluded_from_client_assignment
      duplicate_timestamp_policy: preserve_original_row_order_stable_sort
    split:
      method: within_client_chronological
      calibration_benign_only: true
      role_order: [historical_train, historical_calibration, future_recalibration, future_evaluation]
      historical_train_fraction: 0.55
      historical_calibration_fraction: 0.15
      future_recalibration_fraction: 0.10
      future_evaluation_fraction: 0.20
      ordering_field: frame.time
      ordering_scope: per_client
      rollover_policy: add_twenty_four_hours_on_time_decrease
      minimum_row_counts: { historical_train: 100, historical_calibration: 100, future_recalibration: 50, future_evaluation: 100 }
      missing_client_policy: exclude_client_report_reduced_k
      chronology_unverifiable_policy: typed_infeasibility_outcome
    static_reference:
      note: matched static reference uses the same nine temporal groups (Modbus excluded) via the group_benign materialization, split random_fractional
      groups: [Distance, Flame_Sensor, Heart_Rate, IR_Receiver, Soil_Moisture, Sound_Sensor, Temperature_and_Humidity, Water_Level, phValue]
      materialization_ref: group_benign
    recovery_analysis:
      fields: [static_reference_cv, frozen_future_cv, recalibrated_future_cv, drift_excess, recovered_amount, recovery_ratio]
      drift_excess_formula: frozen_future_cv - static_reference_cv
      recovered_amount_formula: frozen_future_cv - recalibrated_future_cv
      recovery_ratio_formula: recovered_amount / drift_excess
      recovery_ratio_precondition: drift_excess_meaningfully_positive
      negative_recovery_policy: report_as_is_no_floor_clamp
      outcome_thresholds: { outcome_a_recovery_ratio_min: 0.50, outcome_b_recovery_ratio_max: 0.50, outcome_c_condition: no_meaningful_positive_drift_excess }
      seed_analysis: paired_seed_ci_over_locked_seed_cohort
      confidence_interval_procedure: bca_bootstrap_95
setups:
  external_group:
    materialization: group_benign
    client_construction: { method: external_group_clients, group_count: 10 }
    executable: true
    validation_scope: benign_operating_point_equity
    supported_capabilities: [benign_calibration, benign_test_false_positive_metrics, threshold_scope_dispersion, benign_score_distribution_analysis, conformal_benign_coverage]
    unsupported_capabilities: [per_client_attack_detection_metrics, attack_sensitive_threshold_tradeoff]
    limitation:
      capability: per_client_attack_detection_metrics
      status: unavailable
      reason: attack_traffic_confined_to_subnet_zero
  chronological:
    materialization: group_chronological
    client_construction: { method: external_group_clients, group_count: 9, excluded_groups: [Modbus] }
    executable: true
    validation_scope: benign_temporal_operating_point_equity
    cross_client_wall_clock_ordering: unavailable
    supported_scope: [historical_benign_training, historical_benign_calibration, future_benign_fpr_evaluation, frozen_vs_one_shot_recalibrated_thresholds, cv_fpr_drift_and_recovery]
    unsupported_scope: [per_client_temporal_tpr, temporal_macro_f1, temporal_balanced_accuracy, attack_sensitive_temporal_recovery]
    limitation:
      capability: per_client_attack_detection_metrics
      status: unavailable
      reason: attack_traffic_confined_to_subnet_zero
