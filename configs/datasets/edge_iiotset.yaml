schema_version: 1
dataset: edge_iiotset
display_name: Edge-IIoTset
schema_id: edge_iiotset_wireshark_63
source_layout:
  root: "Edge-IIoTset dataset"
  normal_traffic_root: "Edge-IIoTset dataset/Normal traffic"
  attack_traffic_root: "Edge-IIoTset dataset/Attack traffic"
  normal_file_pattern: "*/*.csv"
  attack_file_pattern: "*_attack.csv"
  normal_group_folders: [Distance, Flame_Sensor, Heart_Rate, IR_Receiver, Modbus, Soil_Moisture, Sound_Sensor, Temperature_and_Humidity, Water_Level, phValue]
  attack_files: [Backdoor_attack.csv, DDoS_HTTP_Flood_attack.csv, DDoS_ICMP_Flood_attack.csv, DDoS_TCP_SYN_Flood_attack.csv, DDoS_UDP_Flood_attack.csv, MITM_attack.csv, OS_Fingerprinting_attack.csv, Password_attack.csv, Port_Scanning_attack.csv, Ransomware_attack.csv, SQL_injection_attack.csv, Uploading_attack.csv, Vulnerability_scanner_attack.csv, XSS_attack.csv]
field_schema:
  source_column_count: 63
  source_columns:
    - frame.time
    - ip.src_host
    - ip.dst_host
    - arp.dst.proto_ipv4
    - arp.opcode
    - arp.hw.size
    - arp.src.proto_ipv4
    - icmp.checksum
    - icmp.seq_le
    - icmp.transmit_timestamp
    - icmp.unused
    - http.file_data
    - http.content_length
    - http.request.uri.query
    - http.request.method
    - http.referer
    - http.request.full_uri
    - http.request.version
    - http.response
    - http.tls_port
    - tcp.ack
    - tcp.ack_raw
    - tcp.checksum
    - tcp.connection.fin
    - tcp.connection.rst
    - tcp.connection.syn
    - tcp.connection.synack
    - tcp.dstport
    - tcp.flags
    - tcp.flags.ack
    - tcp.len
    - tcp.options
    - tcp.payload
    - tcp.seq
    - tcp.srcport
    - udp.port
    - udp.stream
    - udp.time_delta
    - dns.qry.name
    - dns.qry.name.len
    - dns.qry.qu
    - dns.qry.type
    - dns.retransmission
    - dns.retransmit_request
    - dns.retransmit_request_in
    - mqtt.conack.flags
    - mqtt.conflag.cleansess
    - mqtt.conflags
    - mqtt.hdrflags
    - mqtt.len
    - mqtt.msg_decoded_as
    - mqtt.msg
    - mqtt.msgtype
    - mqtt.proto_len
    - mqtt.protoname
    - mqtt.topic
    - mqtt.topic_len
    - mqtt.ver
    - mbtcp.len
    - mbtcp.trans_id
    - mbtcp.unit_id
    - Attack_label
    - Attack_type
  identity_scheme:
    row_identity: source_row_order
    benign_group_identity: { source: path, derived_from: normal_traffic_group_folder }
    attack_row_group_identity: unavailable
    device_identity: { source: column, column: ip.src_host, usable: false, superseded_by: endpoint_identity }
    timestamp_field: { column: frame.time, semantics: time_of_day_no_month_day }
    provenance_fields: [source_file_path, normal_traffic_group_folder, attack_file_basename]
  label_fields:
    binary_label: { column: Attack_label, values: [0, 1] }
    multiclass_label: { column: Attack_type }
    family_taxonomy: unavailable
  attack_row_group_assignment:
    available: false
    reason: attack_traffic_confined_to_attacker_subnet
    evidence: >-
      Direction-normalized internal-endpoint resolution over all four endpoint fields
      (ip.src_host, ip.dst_host, arp.src.proto_ipv4, arp.dst.proto_ipv4), keyed on the paper
      TABLE VI testbed topology (the third octet of 192.168.X.Y identifies the sensor /24),
      resolves 99.95% of the 9,729,709 attack rows to exactly one subnet: subnet 0
      (Temperature_and_Humidity / Modbus), the /24 that hosts both the Kali attacker
      (192.168.0.170) and its primary victim (192.168.0.128). No attack row carries any subnet
      1-8 endpoint in any field, so eight of the nine sensor clients receive zero attack rows.
      A per-client benign+attack evaluation across the B1-B4 ladder is therefore impossible
      without fabricating attack traffic for clients that have none. See endpoint_identity and
      CONFIGURATION_AND_EXPERIMENT_CATALOGUE.md §11.3.
  endpoint_identity:
    resolution: direction_normalized_internal_endpoint
    fields: [ip.src_host, ip.dst_host, arp.src.proto_ipv4, arp.dst.proto_ipv4]
    internal_prefix: "192.168"
    subnet_role_source: dataset_paper_table_vi
    subnet_to_group:
      0: [Temperature_and_Humidity, Modbus]   # shared /24; also hosts the attacker
      1: Distance
      2: phValue
      3: Heart_Rate
      4: Water_Level
      5: IR_Receiver
      6: Sound_Sensor
      7: [Flame_Sensor, Modbus]               # Modbus server row shares Flame_Sensor's /24
      8: Soil_Moisture
    excluded_endpoints:
      attacker: [192.168.0.170, 192.168.0.152]
      ambiguous_dual_role: [192.168.0.101]    # Temperature IoT node and attacker impersonation IP
      placeholder: ["0", "0.0.0.0"]
      public_external: spoofed_flood_or_incidental_background
    direction_normalization: prefer_non_attacker_internal_endpoint_then_smallest_nonzero_subnet
    unresolved_row_policy: excluded_from_client_assignment
    resolved_coverage:
      benign: { rows: 11209913, resolved_fraction: 0.975 }
      attack: { rows: 9729709, resolved_fraction: 0.9995, resolved_subnets: [0] }
      clients_with_benign_and_attack: 1
      required_client_coverage_ratio: 0.90
      joint_client_coverage_ratio: 0.11
    verdict: benign_group_identity_confirmed_attack_partition_infeasible
  retained_numeric_features:
    role: model_feature
    type: numeric_float
    count: 39
    order:
      - arp.opcode
      - arp.hw.size
      - icmp.checksum
      - icmp.seq_le
      - icmp.unused
      - http.content_length
      - http.response
      - http.tls_port
      - tcp.ack
      - tcp.ack_raw
      - tcp.checksum
      - tcp.connection.fin
      - tcp.connection.rst
      - tcp.connection.syn
      - tcp.connection.synack
      - tcp.flags
      - tcp.flags.ack
      - tcp.len
      - tcp.seq
      - udp.stream
      - udp.time_delta
      - dns.qry.name
      - dns.qry.qu
      - dns.qry.type
      - dns.retransmission
      - dns.retransmit_request
      - dns.retransmit_request_in
      - mqtt.conflag.cleansess
      - mqtt.conflags
      - mqtt.hdrflags
      - mqtt.len
      - mqtt.msg_decoded_as
      - mqtt.msgtype
      - mqtt.proto_len
      - mqtt.topic_len
      - mqtt.ver
      - mbtcp.len
      - mbtcp.trans_id
      - mbtcp.unit_id
  categorical_encoding:
    strategy: one_hot
    columns: [http.request.method, http.referer, http.request.version, dns.qry.name.len, mqtt.conack.flags, mqtt.protoname, mqtt.topic]
    per_column_measured_width: { http.request.method: 9, http.referer: 6, http.request.version: 14, dns.qry.name.len: 17, mqtt.conack.flags: 14, mqtt.protoname: 4, mqtt.topic: 12 }
    encoded_feature_count: 76
    retained_numeric_feature_count: 39
    total_model_feature_count: 115
    post_encoding_feature_names: runtime_captured
  leakage_exclusions:
    columns: [frame.time, ip.src_host, ip.dst_host, arp.src.proto_ipv4, arp.dst.proto_ipv4, http.file_data, http.request.full_uri, icmp.transmit_timestamp, http.request.uri.query, tcp.options, tcp.payload, tcp.srcport, tcp.dstport, udp.port, mqtt.msg]
    role_basis: leakage_or_high_cardinality_or_client_identity_or_timestamp
  fingerprint_inputs:
    source: [source_layout.root, field_schema.source_column_count]
    schema: [schema_id, field_schema.categorical_encoding.total_model_feature_count]
observed_facts:
  normal_group_count: 10
  attack_file_count: 14
  total_model_feature_count: 115
  benign_group_row_counts: { Distance: 1143540, Flame_Sensor: 1070196, Heart_Rate: 165319, IR_Receiver: 1307778, Modbus: 159502, Soil_Moisture: 1192777, Sound_Sensor: 1512883, Temperature_and_Humidity: 1615722, Water_Level: 2295288, phValue: 746908 }
  device_granularity_rejected: true
  timestamp_unusable_files: [Modbus, DDoS_UDP_Flood_attack, MITM_attack]
  exact_duplicate_rate: 0.000125
  family_taxonomy_available: false
  temperature_subnet: 0                       # corrected: shares subnet 0 with Modbus, not public-IP dominated
  attack_resolved_subnets: [0]
  attack_rows_in_sensor_subnets_1_8: 0
  benign_subnet_consistency: one_subnet_per_folder_except_modbus_spans_0_and_7
readiness:
  source_schema_complete: true
  benign_group_partition_recoverable: true
  benign_endpoint_identity_recoverable: true
  attack_row_group_assignment_recoverable: false
  external_validation_executable: false
audits:
  - check: source_inspection
    inspection:
      expected_facts: [feature_schema_present, device_identity_recoverable, capture_timestamp_present_or_absent]
      source_row_identity_scheme: required
    feasibility:
      rule: source_schema_complete
      required_evidence: [feature_schema_manifest, per_device_counts, timestamp_evidence]
    operations: { execution: dataset_audit, report: { table_type: source_inspection_report, output_formats: [markdown] } }
  - check: client_granularity_feasibility
    inspection:
      expected_facts: [per_candidate_client_benign_counts, per_candidate_client_attack_counts]
      candidate_granularities: [device, resolved_endpoint, group]
      target_client_counts: [6, 15]
    feasibility:
      rule: eligibility_coverage_gate
      minimum_calibration_sample_count: 100
      minimum_client_coverage_ratio: 0.90
      required_evidence: [per_client_benign_counts, per_client_attack_counts]
    outcome:
      device_granularity: rejected
      resolved_endpoint_granularity: benign_only
      group_granularity: authorized_benign_only
      group_count: 10
      joint_benign_attack_partition: infeasible
      joint_client_coverage_ratio: 0.11
    operations: { execution: dataset_audit, report: { table_type: feasibility_report, output_formats: [markdown] } }
  - check: timestamp_semantics_verification
    inspection:
      expected_facts: [genuine_capture_time_field_present, per_client_temporal_ordering_recoverable]
    feasibility:
      rule: timestamp_semantics_verified
      required_evidence: [timestamp_evidence, per_client_time_span]
    outcome:
      within_client_ordering: time_of_day_with_midnight_rollover_correction
      cross_client_wall_clock_ordering: unavailable
      temporal_group_count: 9
      excluded_groups: [Modbus]
    operations: { execution: dataset_audit, report: { table_type: feasibility_report, output_formats: [markdown] } }
eligibility:
  minimum_calibration_sample_count: 100
materializations:
  group_benign:
    materialization_id: edge_iiotset_group_benign
    normalization: { strategy: min_max, scope: global_train }
    preprocessing_sequence: [drop_row_with_null_in_retained_column, drop_exact_duplicate_rows, one_hot_encode_categoricals, min_max_normalization_fit_on_train]
    row_exclusion:
      null_in_retained_column: drop_row
      duplicate_rows: drop_exact_duplicates_keep_first
    split:
      method: random_fractional
      calibration_benign_only: true
      split_seed: 0
      ratios: { train: 0.70, calibration: 0.15, test: 0.15 }
setups:
  external_group:
    materialization: group_benign
    client_construction: { method: external_group_clients, group_count: 10 }
    executable: false
    suppression:
      reason: attack_row_client_assignment_unavailable
      evidence: >-
        The benign sensor-type group partition is recoverable and is now independently confirmed
        from endpoint IPs (field_schema.endpoint_identity), but every attack row resolves to a
        single subnet (subnet 0, Temperature/Modbus); eight of the nine sensor clients receive
        zero attack rows, so a per-client benign+attack external-validation evaluation cannot be
        constructed without fabricating attack traffic. The group partition alone is insufficient.
  chronological:
    materialization: group_benign
    client_construction: { method: external_group_clients, group_count: 9, excluded_groups: [Modbus] }
    temporal_window:
      role: temporal_evaluation
      historical_fraction: 0.70
      capture_time_field: frame.time
      ordering_derivation: time_of_day_with_midnight_rollover_correction
    executable: false
    suppression:
      reason: attack_row_client_assignment_unavailable
      evidence: >-
        Within-client benign time-of-day ordering is defensible, but the chronological evaluation
        still requires per-client attack rows at the temporal boundary; the same attack-row
        subnet-0 confinement that suppresses external_group (field_schema.endpoint_identity)
        applies here.
