      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
    outside_core_causal_ladder: true
    validation_scope: benign_operating_point_equity
    never_promoted_to_confirmatory: true
    sweeps:
      federated_proximal_mu:
        values: [0.001, 0.01, 0.1, 1.0]
    training_overrides:
      mu: { from_sweep: federated_proximal_mu }
    primary_coefficient_selection:
      rule: reuse_the_coefficient_selected_on_the_natural_device_regime
      external_dataset_may_select_the_coefficient: false
      complete_grid_reported: true
    evaluations:
      - { label: shared_mean, threshold_policy: shared_mean_p95 }
      - { label: local, threshold_policy: local_p95 }
      - { label: cluster_k3_mean, threshold_policy: cluster_k3_mean_p95 }
    analyses:
      - label: external_fedprox_scope_effect
        kind: paired_threshold_analysis
        result_type: stress_test_result
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        delta_interpretation: positive_favors_second_evaluation
        per_sweep_cell: federated_proximal_mu
        statistical_profile: paired_seed_bca
      - label: external_fedprox_absorption
        kind: absorption_analysis
        result_type: absorption_result
        reference_analysis: { experiment: external_sensor_group_validation, analysis: external_scope_effect }
        stress_test_analysis: external_fedprox_scope_effect
        absorption_metric: cv_fpr
        formula: "absorption_ratio_s = delta_stress_test_s / delta_reference_s"
        matching_requirement: identical_dataset_setup_training_seed_checkpoint_round_and_evaluation_pair_labels
        undefined_denominator_behavior: typed_undefined_ratio
        denominator_materiality_rule: absolute_denominator_at_least_1.0e-6
        outcome_bands:
          - { name: strong_retention, condition: "absorption_ratio >= 0.75" }
          - { name: partial_absorption, condition: "0.25 <= absorption_ratio < 0.75" }
          - { name: large_absorption, condition: "absorption_ratio < 0.25" }
        outcome_bands_are_mutually_exclusive_and_exhaustive: true
        band_interpretation: pre_specified_bands_never_generic_higher_is_better
        statistical_profile: seed_level_ratio
    reports: [interval_table]

