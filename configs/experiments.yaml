  # =========================================================================================
  # The static reference is a matched random-fractional arm over the same chronological client
  # population, not a restriction of a different experiment's result.
  - name: chronological_recalibration_evaluation
    display_name: Chronological Recalibration Evaluation
    evidence_role: boundary
    run_requirement: mandatory
    populations: [edge_iiotset_chronological_groups, edge_iiotset_static_reference_groups]
    population_roles:
      edge_iiotset_chronological_groups: temporal_arm
      edge_iiotset_static_reference_groups: matched_static_reference_arm
    population_equivalence_requirement: both_arms_must_resolve_to_the_identical_client_identifier_set
    training_profile: federated_averaging
    checkpoint_profile: datp_core_round_grid
    seed_cohort: datp_core_ten_seed
    eligibility_policy: primary_analysis
    prerequisites:
      - { experiment: anchor_reproduction, required_outcome: anchor_equivalence_passed }
    capability_requirements:
      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
      # The matched static reference arm is deliberately non-chronological, so the chronology
      # requirement applies only to the temporal arm.
      - { capability: within_client_chronological_ordering, when_unavailable: fail_experiment, applies_to_populations: [edge_iiotset_chronological_groups] }
    scope_constraint: one_shot_recalibration_never_described_as_concept_drift_handling
    unavailable_capability_reporting:
      - { capability: cross_client_wall_clock_ordering, status: unavailable_unsupported_regime }
      - { capability: per_client_attack_detection_metrics, status: unavailable_invalid_attack_assignment }
    temporal_procedure:
      calibration_source_window: historical_calibration
      frozen_evaluation_window: future_evaluation
      recalibration_source_window: future_recalibration
      recalibrated_evaluation_window: future_evaluation
      model_reuse: the_same_historically_trained_frozen_model_is_used_for_every_compared_state
      future_rows_forbidden_in_training_and_preprocessing_fit: true
    evaluations:
      - { label: shared_mean_frozen, threshold_policy: shared_mean_p95, population: edge_iiotset_chronological_groups, recalibration_mode: frozen }
      - { label: local_frozen, threshold_policy: local_p95, population: edge_iiotset_chronological_groups, recalibration_mode: frozen }
      - { label: cluster_k3_mean_frozen, threshold_policy: cluster_k3_mean_p95, population: edge_iiotset_chronological_groups, recalibration_mode: frozen }
      - { label: shared_mean_one_shot, threshold_policy: shared_mean_p95, population: edge_iiotset_chronological_groups, recalibration_mode: one_shot }
      - { label: local_one_shot, threshold_policy: local_p95, population: edge_iiotset_chronological_groups, recalibration_mode: one_shot }
      - { label: cluster_k3_mean_one_shot, threshold_policy: cluster_k3_mean_p95, population: edge_iiotset_chronological_groups, recalibration_mode: one_shot }
      - { label: shared_mean_static_reference, threshold_policy: shared_mean_p95, population: edge_iiotset_static_reference_groups, recalibration_mode: not_applicable }
      - { label: local_static_reference, threshold_policy: local_p95, population: edge_iiotset_static_reference_groups, recalibration_mode: not_applicable }
      - { label: cluster_k3_mean_static_reference, threshold_policy: cluster_k3_mean_p95, population: edge_iiotset_static_reference_groups, recalibration_mode: not_applicable }
    analyses:
      - label: local_temporal_recovery
        kind: temporal_recovery_analysis
        result_type: temporal_recovery_result
        static_reference_evaluation: local_static_reference
        frozen_evaluation: local_frozen
        recalibrated_evaluation: local_one_shot
        primary_metric: cv_fpr
        recovery_fields: [static_reference_cv, frozen_future_cv, recalibrated_future_cv, drift_excess, recovered_amount, recovery_ratio]
        drift_excess_formula: "drift_excess_s = frozen_future_cv_s - static_reference_cv_s"
        recovered_amount_formula: "recovered_amount_s = frozen_future_cv_s - recalibrated_future_cv_s"
        recovery_ratio_formula: "recovery_ratio_s = recovered_amount_s / drift_excess_s"
        recovery_ratio_precondition: drift_excess_meaningfully_positive
        meaningfully_positive_drift_excess_minimum: 0.05
        negative_recovery_policy: report_as_is_no_floor_clamp
        outcome_bands:
          - { name: no_meaningful_degradation, condition: "drift_excess < 0.05", recovery_ratio: undefined }
          - { name: meaningful_recovery, condition: "drift_excess >= 0.05 and recovery_ratio >= 0.50" }
          - { name: insufficient_recovery, condition: "drift_excess >= 0.05 and recovery_ratio < 0.50" }
        outcome_bands_are_mutually_exclusive_and_exhaustive: true
        recovery_ratio_direction: higher_is_better
        chronology_unverifiable_policy: typed_infeasibility_outcome
        statistical_profile: seed_level_ratio
      - label: shared_temporal_recovery
        kind: temporal_recovery_analysis
        result_type: temporal_recovery_result
        static_reference_evaluation: shared_mean_static_reference
        frozen_evaluation: shared_mean_frozen
        recalibrated_evaluation: shared_mean_one_shot
        primary_metric: cv_fpr
        recovery_fields: [static_reference_cv, frozen_future_cv, recalibrated_future_cv, drift_excess, recovered_amount, recovery_ratio]
        drift_excess_formula: "drift_excess_s = frozen_future_cv_s - static_reference_cv_s"
        recovered_amount_formula: "recovered_amount_s = frozen_future_cv_s - recalibrated_future_cv_s"
        recovery_ratio_formula: "recovery_ratio_s = recovered_amount_s / drift_excess_s"
        recovery_ratio_precondition: drift_excess_meaningfully_positive
        meaningfully_positive_drift_excess_minimum: 0.05
        negative_recovery_policy: report_as_is_no_floor_clamp
        outcome_bands:
          - { name: no_meaningful_degradation, condition: "drift_excess < 0.05", recovery_ratio: undefined }
          - { name: meaningful_recovery, condition: "drift_excess >= 0.05 and recovery_ratio >= 0.50" }
          - { name: insufficient_recovery, condition: "drift_excess >= 0.05 and recovery_ratio < 0.50" }
        outcome_bands_are_mutually_exclusive_and_exhaustive: true
        recovery_ratio_direction: higher_is_better
        chronology_unverifiable_policy: typed_infeasibility_outcome
        statistical_profile: seed_level_ratio
    reports: [recovery_curve_figure, dispersion_ladder_table]

