# Every experiment binds exactly one of each shared definition; those definitions live in
# protocols.yaml and are referenced by identifier, never restated.
#
# Roadmap shorthand (E-*, tier numbers, regime letters, publication placement, manuscript
# wording) is deliberately absent: traceability belongs to the roadmap documents, not to
# executable configuration.
schema_version: 1

# --- Study populations -------------------------------------------------------------------
# A population's metric bundle may not exceed what its audited capabilities support. One
# experiment binds one dataset population unless a second population is a declared reference
# arm of the same procedure, so a failure in one dataset can never suppress another.
study_populations:
  nbaiot_natural_devices:
    dataset: nbaiot
    setup: natural_devices
    metric_bundle: full_detection_and_operating_point
  nbaiot_anchor_natural_devices:
    dataset: nbaiot
    setup: anchor_natural_devices
    metric_bundle: full_detection_and_operating_point
  nbaiot_dirichlet_heterogeneity:
    dataset: nbaiot
    setup: dirichlet_partitioned
    metric_bundle: full_detection_and_operating_point
  ciciot2023_file_pseudo_clients:
    dataset: ciciot2023
    setup: file_pseudo_clients
    metric_bundle: full_detection_and_operating_point
  edge_iiotset_sensor_groups:
    dataset: edge_iiotset
    setup: sensor_groups
    metric_bundle: benign_operating_point_equity
  edge_iiotset_chronological_groups:
    dataset: edge_iiotset
    setup: chronological_sensor_groups
    metric_bundle: benign_operating_point_equity
  edge_iiotset_static_reference_groups:
    dataset: edge_iiotset
    setup: chronological_static_reference_groups
    metric_bundle: benign_operating_point_equity

# --- Capability vocabulary ---------------------------------------------------------------
# Closed set of capabilities an experiment may require of a population. A setup declares the
# capabilities it claims; the claim is verified against generated dataset-audit evidence
# before execution and never treated as evidence in itself.
capabilities:
  - benign_calibration
  - benign_test_false_positive_metrics
  - per_client_attack_detection_metrics
  - attack_sensitive_threshold_tradeoff
  - family_taxonomy
  - within_client_chronological_ordering
  - cross_client_wall_clock_ordering

# --- Suppression behaviors ---------------------------------------------------------------
suppression_behaviors:
  - suppress_dependent_metrics_and_report_reason
  - skip_population_and_report_reason
  - fail_experiment

# --- Population readiness ----------------------------------------------------------------
# A setup carrying an unresolved readiness blocker blocks only the experiments that bind it.
population_readiness_rule:
  blocked_population_outcome: blocked_by_dependency
  blocks_only_experiments_binding_that_population: true
  blocked_population_reporting: typed_readiness_blocker_record_with_blocker_identifier

# --- Analysis conventions ----------------------------------------------------------------
# `delta_interpretation` resolves every report column whose direction is `from_analysis`.
analysis_conventions:
  paired_delta_definition: "delta = metric(first_evaluation) - metric(second_evaluation)"
  delta_direction_resolution: from_the_binding_analysis_delta_interpretation_field
  raw_metric_direction_resolution: from_protocols_metric_definitions

# --- Experiment catalogue ----------------------------------------------------------------
experiments:

  # =========================================================================================
  - name: anchor_reproduction
    display_name: Anchor Reproduction
    evidence_role: anchor
    run_requirement: mandatory
    populations: [nbaiot_anchor_natural_devices]
    training_profile: federated_averaging_anchor
    checkpoint_profile: anchor_terminal_round
    seed_cohort: anchor_five_seed
    eligibility_policy: primary_analysis
    prerequisites: []
    capability_requirements:
      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
      - { capability: per_client_attack_detection_metrics, when_unavailable: fail_experiment }
    evaluations:
      - { label: shared_mean, threshold_policy: shared_mean_p95 }
      - { label: local, threshold_policy: local_p95 }
    analyses:
      - label: anchor_scope_effect
        kind: paired_threshold_analysis
        result_type: anchor_reproduction_result
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        delta_interpretation: positive_favors_second_evaluation
        statistical_profile: paired_seed_bca
        statistical_profile_overrides: { minimum_paired_units: 5 }
      - label: anchor_equivalence
        kind: anchor_equivalence_analysis
        result_type: anchor_reproduction_result
        source_analysis: anchor_scope_effect
        comparison_mode: statistical_fallback
        comparison_mode_rule: strict_artifact_comparison_requires_historical_per_seed_artifacts_which_do_not_exist
        statistical_fallback_requirements:
          - positive_reproduced_delta
          - reproduced_estimate_within_historical_interval
          - overlapping_confidence_intervals
          - no_material_movement_toward_zero
          - reproduced_interval_width_at_most_1.20x_historical_width
          - verified_configuration_and_provenance
        historical_reference:
          metric: cv_fpr_delta
          shared_threshold_cv_fpr: 1.017
          local_threshold_cv_fpr: 0.299
          delta: 0.718
          confidence_level: 0.95
          lower_bound: 0.647
          upper_bound: 0.769
          interval_width: 0.122
        interval_width_tolerance_multiplier: 1.20
        floating_point_tolerance: { absolute: 1.0e-9, relative: 1.0e-6 }
        failure_reasons: [material_movement_toward_zero, interval_too_wide, configuration_or_provenance_mismatch]
        downstream_blocking_behavior: blocks_every_experiment_except_dataset_audits_until_passed
        statistical_profile: descriptive_seed_summary
    reports: [interval_table]

  # =========================================================================================
  - name: confirmatory_threshold_scope_effect
    display_name: Confirmatory Threshold-Scope Effect
    evidence_role: confirmatory
    run_requirement: mandatory
    populations: [nbaiot_natural_devices]
    training_profile: federated_averaging
    checkpoint_profile: datp_core_round_grid
    seed_cohort: datp_core_ten_seed
    eligibility_policy: primary_analysis
    prerequisites:
      - { experiment: anchor_reproduction, required_outcome: anchor_equivalence_passed }
    capability_requirements:
      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
      - { capability: per_client_attack_detection_metrics, when_unavailable: fail_experiment }
    evaluations:
      - { label: shared_mean, threshold_policy: shared_mean_p95 }
      - { label: local, threshold_policy: local_p95 }
    analyses:
      - label: confirmatory_scope_effect
        kind: paired_threshold_analysis
        result_type: confirmatory_analysis_result
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        delta_interpretation: positive_favors_second_evaluation
        required_direction: positive
        statistical_profile: paired_seed_bca
        secondary_statistical_profile: rank_based_secondary
      - label: client_score_distribution_mechanism
        kind: distribution_mechanism_analysis
        result_type: distribution_mechanism_result
        source_evaluations: [shared_mean, local]
        produced_fields: [per_client_benign_score_cdf, per_client_attack_score_cdf, per_client_threshold_position, per_client_fpr, per_client_tpr, per_client_balanced_accuracy, per_client_macro_f1]
        statistical_profile: descriptive_seed_summary
      - label: threshold_shift_detection_tradeoff
        kind: distribution_mechanism_analysis
        result_type: distribution_mechanism_result
        source_evaluations: [shared_mean, local]
        produced_fields: [threshold_shift, fpr_delta, tpr_delta]
        field_formulas:
          threshold_shift: "tau_local_k - tau_shared"
          fpr_delta: "fpr_local_k - fpr_shared_k"
          tpr_delta: "tpr_local_k - tpr_shared_k"
        statistical_profile: monotone_association
    reports: [interval_table, score_geometry_figure, threshold_tradeoff_figure]

  # =========================================================================================
  - name: shared_threshold_construction_sensitivity
    display_name: Shared-Threshold Construction Sensitivity
    evidence_role: supportive
    run_requirement: mandatory
    populations: [nbaiot_natural_devices]
    training_profile: federated_averaging
    checkpoint_profile: datp_core_round_grid
    seed_cohort: datp_core_ten_seed
    eligibility_policy: primary_analysis
    prerequisites:
      - { experiment: anchor_reproduction, required_outcome: anchor_equivalence_passed }
    capability_requirements:
      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
    evaluations:
      - { label: shared_mean, threshold_policy: shared_mean_p95 }
      - { label: shared_pooled, threshold_policy: shared_pooled_p95 }
      - { label: shared_weighted, threshold_policy: shared_weighted_p95 }
      - { label: local, threshold_policy: local_p95 }
    analyses:
      - label: mean_vs_local_dispersion
        kind: paired_threshold_analysis
        result_type: supportive_analysis_result
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        delta_interpretation: positive_favors_second_evaluation
        statistical_profile: paired_seed_bca
      - label: pooled_vs_local_dispersion
        kind: paired_threshold_analysis
        result_type: supportive_analysis_result
        first_evaluation: shared_pooled
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: pooled_minus_local
        delta_interpretation: positive_favors_second_evaluation
        statistical_profile: paired_seed_bca
      - label: weighted_vs_local_dispersion
        kind: paired_threshold_analysis
        result_type: supportive_analysis_result
        first_evaluation: shared_weighted
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: weighted_minus_local
        delta_interpretation: positive_favors_second_evaluation
        statistical_profile: paired_seed_bca
    reports: [dispersion_ladder_table]

  # =========================================================================================
  - name: threshold_quantile_sensitivity
    display_name: Threshold Quantile Sensitivity
    evidence_role: supportive
    run_requirement: mandatory
    populations: [nbaiot_natural_devices]
    training_profile: federated_averaging
    checkpoint_profile: datp_core_round_grid
    seed_cohort: datp_core_ten_seed
    eligibility_policy: primary_analysis
    prerequisites:
      - { experiment: anchor_reproduction, required_outcome: anchor_equivalence_passed }
    capability_requirements:
      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
      - { capability: per_client_attack_detection_metrics, when_unavailable: fail_experiment }
    sweeps:
      threshold_quantile:
        values: [0.90, 0.95, 0.975, 0.99]
    evaluations:
      - label: shared_mean
        threshold_policy: shared_mean_p95
        overrides: { quantile: { from_sweep: threshold_quantile } }
      - label: local
        threshold_policy: local_p95
        overrides: { quantile: { from_sweep: threshold_quantile } }
      - label: cluster_k3_mean
        threshold_policy: cluster_k3_mean_p95
        overrides: { quantile: { from_sweep: threshold_quantile } }
    analyses:
      - label: quantile_scope_effect
        kind: paired_threshold_analysis
        result_type: supportive_analysis_result
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        delta_interpretation: positive_favors_second_evaluation
        per_sweep_cell: threshold_quantile
        ordering_inversion_reporting: required
        statistical_profile: paired_seed_bca
    reports: [sensitivity_grid_table]

  # =========================================================================================
  - name: external_threshold_quantile_sensitivity
    display_name: External Threshold Quantile Sensitivity
    evidence_role: external_validation
    run_requirement: mandatory
    populations: [edge_iiotset_sensor_groups]
    training_profile: federated_averaging
    checkpoint_profile: datp_core_round_grid
    seed_cohort: datp_core_ten_seed
    eligibility_policy: primary_analysis
    prerequisites:
      - { experiment: anchor_reproduction, required_outcome: anchor_equivalence_passed }
      - { experiment: external_sensor_group_validation, required_outcome: completed }
    capability_requirements:
      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
    validation_scope: benign_operating_point_equity
    never_promoted_to_confirmatory: true
    sweeps:
      threshold_quantile:
        values: [0.90, 0.95, 0.975, 0.99]
    evaluations:
      - label: shared_mean
        threshold_policy: shared_mean_p95
        overrides: { quantile: { from_sweep: threshold_quantile } }
      - label: local
        threshold_policy: local_p95
        overrides: { quantile: { from_sweep: threshold_quantile } }
      - label: cluster_k3_mean
        threshold_policy: cluster_k3_mean_p95
        overrides: { quantile: { from_sweep: threshold_quantile } }
    analyses:
      - label: external_quantile_scope_effect
        kind: paired_threshold_analysis
        result_type: external_validation_result
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        delta_interpretation: positive_favors_second_evaluation
        per_sweep_cell: threshold_quantile
        ordering_inversion_reporting: required
        statistical_profile: paired_seed_bca
    reports: [sensitivity_grid_table]

  # =========================================================================================
  # Controlled Dirichlet severity sweep on N-BaIoT only. External validation is a separate
  # dataset contract and must never enter this controlled comparison.
  - name: controlled_heterogeneity_response
    display_name: Controlled Heterogeneity Response
    evidence_role: supportive
    run_requirement: mandatory
    populations: [nbaiot_dirichlet_heterogeneity]
    training_profile: federated_averaging
    checkpoint_profile: datp_core_round_grid
    seed_cohort: datp_core_ten_seed
    eligibility_policy: primary_analysis
    prerequisites:
      - { experiment: anchor_reproduction, required_outcome: anchor_equivalence_passed }
    capability_requirements:
      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
      - { capability: per_client_attack_detection_metrics, when_unavailable: fail_experiment }
    # Partition conditions are a named closed set, not a mixed-type list. The IID reference is
    # a distinct named condition, never a string smuggled into a numeric alpha list.
    sweeps:
      partition_condition:
        conditions:
          - { name: dirichlet_alpha_0_1, allocation: dirichlet, dirichlet_alpha: 0.1 }
          - { name: dirichlet_alpha_0_3, allocation: dirichlet, dirichlet_alpha: 0.3 }
          - { name: dirichlet_alpha_0_5, allocation: dirichlet, dirichlet_alpha: 0.5 }
          - { name: dirichlet_alpha_1_0, allocation: dirichlet, dirichlet_alpha: 1.0 }
          - { name: dirichlet_alpha_10_0, allocation: dirichlet, dirichlet_alpha: 10.0 }
          - { name: iid_reference, allocation: equal_across_source_domains }
    evaluations:
      - { label: shared_mean, threshold_policy: shared_mean_p95 }
      - { label: local, threshold_policy: local_p95 }
      - { label: cluster_k3_mean, threshold_policy: cluster_k3_mean_p95 }
    analyses:
      - label: heterogeneity_scope_effect
        kind: paired_threshold_analysis
        result_type: supportive_analysis_result
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        delta_interpretation: positive_favors_second_evaluation
        per_sweep_cell: partition_condition
        monotonicity_required: false
        statistical_profile: paired_seed_bca
      - label: heterogeneity_threshold_benefit_association
        kind: metric_association_analysis
        result_type: metric_association_result
        predictor_metric: pairwise_js_divergence
        outcome_metric: cv_fpr_delta
        outcome_source_analysis: heterogeneity_scope_effect
        grouping_dimension: partition_condition
        statistical_profile: monotone_association
        secondary_statistical_profile: linear_association
        interpretation_constraint: association_not_causation
    reports: [dispersion_ladder_table, severity_trend_figure, association_scatter_figure]

  # =========================================================================================
  - name: cluster_and_family_threshold_mechanism
    display_name: Cluster and Family Threshold Mechanism
    evidence_role: mechanism
    run_requirement: mandatory
    populations: [nbaiot_natural_devices]
    training_profile: federated_averaging
    checkpoint_profile: datp_core_round_grid
    seed_cohort: datp_core_ten_seed
    eligibility_policy: primary_analysis
    prerequisites:
      - { experiment: anchor_reproduction, required_outcome: anchor_equivalence_passed }
    capability_requirements:
      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
      - { capability: family_taxonomy, when_unavailable: fail_experiment }
      - { capability: per_client_attack_detection_metrics, when_unavailable: fail_experiment }
    sweeps:
      fingerprint_feature_subset:
        values:
          - [mean_error]
          - [p95_error]
          - [mean_error, std_error]
          - [mean_error, std_error, skew_error, p95_error]
    evaluations:
      - { label: shared_mean, threshold_policy: shared_mean_p95 }
      - { label: local, threshold_policy: local_p95 }
      - { label: family, threshold_policy: family_p95 }
      - { label: cluster_k3_mean, threshold_policy: cluster_k3_mean_p95 }
      - { label: cluster_k9_mean, threshold_policy: cluster_k9_mean_p95, run_requirement: optional }
      - { label: cluster_k3_robust_median, threshold_policy: cluster_k3_robust_median_p95, run_requirement: optional }
      - label: cluster_k3_fingerprint_ablation
        threshold_policy: cluster_k3_mean_p95
        overrides: { fingerprint_features: { from_sweep: fingerprint_feature_subset } }
        run_requirement: optional
    analyses:
      - label: family_vs_local
        kind: paired_threshold_analysis
        result_type: mechanism_analysis_result
        first_evaluation: family
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: family_minus_local
        delta_interpretation: positive_favors_second_evaluation
        statistical_profile: paired_seed_bca
      - label: cluster_vs_local
        kind: paired_threshold_analysis
        result_type: mechanism_analysis_result
        first_evaluation: cluster_k3_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: cluster_minus_local
        delta_interpretation: positive_favors_second_evaluation
        statistical_profile: paired_seed_bca
      - label: shared_vs_cluster_recovery
        kind: paired_threshold_analysis
        result_type: mechanism_analysis_result
        first_evaluation: shared_mean
        second_evaluation: cluster_k3_mean
        primary_metric: cv_fpr
        delta_orientation: shared_minus_cluster
        delta_interpretation: positive_favors_second_evaluation
        statistical_profile: paired_seed_bca
      - label: cluster_recovery_fraction
        kind: recovery_fraction_analysis
        result_type: mechanism_analysis_result
        numerator_analysis: shared_vs_cluster_recovery
        denominator_analysis: cluster_vs_local
        denominator_composition: shared_minus_local_gap_of_the_same_seed
        formula: "recovery_fraction_s = (cv_fpr_shared_s - cv_fpr_cluster_s) / (cv_fpr_shared_s - cv_fpr_local_s)"
        undefined_denominator_behavior: typed_undefined_ratio
        denominator_materiality_rule: absolute_denominator_at_least_1.0e-6
        statistical_profile: seed_level_ratio
      - label: cluster_stability
        kind: cluster_stability_analysis
        result_type: cluster_stability_result
        source_evaluation: cluster_k3_mean
        comparison_unit: unordered_pair_of_training_seeds
        produced_fields: [adjusted_rand_index, cluster_membership_per_client, cluster_size, singleton_cluster_flag, empty_cluster_flag, within_cluster_dispersion, across_cluster_dispersion]
        statistical_profile: descriptive_seed_summary
      - label: fingerprint_ablation_stability
        kind: cluster_stability_analysis
        result_type: cluster_stability_result
        source_evaluation: cluster_k3_fingerprint_ablation
        reference_evaluation: cluster_k3_mean
        comparison_unit: ablated_subset_against_the_full_fingerprint_within_seed
        produced_fields: [adjusted_rand_index, cluster_membership_per_client, cluster_size]
        statistical_profile: descriptive_seed_summary
        run_requirement: optional
    reports: [cluster_stability_table, cluster_contingency_table]

  # =========================================================================================
  - name: external_cluster_threshold_mechanism
    display_name: External Cluster Threshold Mechanism
    evidence_role: external_validation
    run_requirement: mandatory
    populations: [edge_iiotset_sensor_groups]
    training_profile: federated_averaging
    checkpoint_profile: datp_core_round_grid
    seed_cohort: datp_core_ten_seed
    eligibility_policy: primary_analysis
    prerequisites:
      - { experiment: anchor_reproduction, required_outcome: anchor_equivalence_passed }
      - { experiment: external_sensor_group_validation, required_outcome: completed }
    capability_requirements:
      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
    # No defensible external family taxonomy exists, so the family scope is absent rather
    # than suppressed at run time.
    validation_scope: benign_operating_point_equity
    never_promoted_to_confirmatory: true
    evaluations:
      - { label: shared_mean, threshold_policy: shared_mean_p95 }
      - { label: local, threshold_policy: local_p95 }
      - { label: cluster_k3_mean, threshold_policy: cluster_k3_mean_p95 }
    analyses:
      - label: external_cluster_vs_local
        kind: paired_threshold_analysis
        result_type: external_validation_result
        first_evaluation: cluster_k3_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: cluster_minus_local
        delta_interpretation: positive_favors_second_evaluation
        statistical_profile: paired_seed_bca
      - label: external_cluster_stability
        kind: cluster_stability_analysis
        result_type: cluster_stability_result
        source_evaluation: cluster_k3_mean
        comparison_unit: unordered_pair_of_training_seeds
        produced_fields: [adjusted_rand_index, cluster_membership_per_client, cluster_size, singleton_cluster_flag, empty_cluster_flag, within_cluster_dispersion, across_cluster_dispersion]
        statistical_profile: descriptive_seed_summary
    reports: [cluster_stability_table, cluster_contingency_table]

  # =========================================================================================
  - name: calibration_window_size_stability
    display_name: Calibration-Window-Size Stability
    evidence_role: boundary
    run_requirement: mandatory
    populations: [nbaiot_natural_devices]
    training_profile: federated_averaging
    checkpoint_profile: datp_core_round_grid
    seed_cohort: datp_core_ten_seed
    eligibility_policy: primary_analysis
    prerequisites:
      - { experiment: anchor_reproduction, required_outcome: anchor_equivalence_passed }
    capability_requirements:
      - { capability: benign_calibration, when_unavailable: fail_experiment }
      - { capability: benign_test_false_positive_metrics, when_unavailable: fail_experiment }
      - { capability: per_client_attack_detection_metrics, when_unavailable: fail_experiment }
    sweeps:
      calibration_sample_count:
        values: [50, 100, 250, 500, 1000, 5000]
    calibration_subset:
      requested_sample_count: { from_sweep: calibration_sample_count }
      selection_strategy: deterministic_without_replacement
      nesting_policy: nested_by_size
      nesting_rule: the_subset_at_a_smaller_requested_size_is_a_prefix_of_the_subset_at_every_larger_requested_size_of_the_same_replicate
      selection_seed: 0
      replicate_count: 100
      replicate_seed_derivation: derived_seed_algorithm_with_namespace_calibration_subsample
      model_retraining: never_thresholds_only_recomputed
      client_eligibility_per_requested_size: client_participates_only_when_its_benign_calibration_row_count_is_at_least_the_requested_sample_count
      subminimum_eligibility_policy: experimental_subminimum
      subminimum_eligibility_policy_applies_to: requested_sample_counts_below_the_primary_analysis_minimum
      insufficient_row_policy: typed_unavailable_below_requested_sample_count
      replicate_aggregation_within_seed: arithmetic_mean_across_replicates
      seed_level_statistic: arithmetic_mean_across_replicates
      additional_seed_level_statistic: threshold_variance_across_replicates
      independent_inferential_unit: training_seed
      replicates_counted_as_seeds: false
      full_calibration_reference_condition: evaluated_as_a_separate_named_condition_outside_the_sweep_grid
    evaluations:
      - { label: shared_mean, threshold_policy: shared_mean_p95 }
      - { label: local, threshold_policy: local_p95 }
      - { label: cluster_k3_mean, threshold_policy: cluster_k3_mean_p95 }
      - { label: calibration_size_aware_fallback, threshold_policy: calibration_size_aware_fallback_p95 }
    analyses:
      - label: window_size_vs_local
        kind: paired_threshold_analysis
        result_type: boundary_result
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        delta_interpretation: positive_favors_second_evaluation
        per_sweep_cell: calibration_sample_count
        statistical_profile: paired_seed_bca
      - label: size_aware_fallback_vs_local
        kind: paired_threshold_analysis
        result_type: boundary_result
        first_evaluation: calibration_size_aware_fallback
