schema_version: 1
family: external_validation
experiments:
  - slug: external_device_dataset_validation
    display_name: External Device-Dataset Validation
    evidence_role: external_validation
    run_requirement: suppressed
    suppression:
      reason: attack_row_client_assignment_unavailable
      evidence: >-
        Edge-IIoTset benign rows partition deterministically into nine sensor clients by
        direction-normalized internal-endpoint identity (the third octet of 192.168.X.Y, paper
        TABLE VI), but every attack row resolves to a single subnet - subnet 0 (Temperature/
        Modbus), which hosts both the Kali attacker (192.168.0.170) and its victim
        (192.168.0.128). No attack row carries any subnet 1-8 endpoint, so eight of the nine
        sensor clients receive zero attack rows (joint coverage 1/9 = 11%, below the 90% gate).
        The Regime D per-client benign+attack external validation therefore cannot be executed
        without fabricating attack traffic. The roadmap Tier 3 scope (B1-B4 + B-FedStatsBenign +
        q-sensitivity on Edge-IIoTset) is preserved below as the intended, currently
        non-executable evaluation. See edge_iiotset.yaml field_schema.endpoint_identity.
    tier: tier_3
    roadmap_reference: E-X1
    data: { dataset: edge_iiotset, setup: external_group }
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_averaging
      parameters: {}
    sweep:
      parameters:
        threshold_quantile:
          values: [0.90, 0.95, 0.975, 0.99]
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: { from_sweep: threshold_quantile } }
      - label: local
        threshold: { policy: local_threshold, quantile: { from_sweep: threshold_quantile } }
      - label: cluster_k3_mean
        threshold:
          policy: cluster_threshold
          aggregation: mean
          cluster_count: 3
          fingerprint_features: [mean_error, std_error, skew_error, p95_error]
          quantile: { from_sweep: threshold_quantile }
          initialization: k_means_plus_plus
          initialization_runs: 10
          maximum_iterations: 300
          random_seed: 42
      - label: federated_summary_benign
        threshold: { policy: federated_summary_statistic_threshold, mode: matched_exceedance, matched_exceedance_k_grid_step: 0.05 }
        requested_metrics: [cv_fpr, between_ratio]
    analyses:
      - label: external_scope_effect
        kind: paired_threshold_analysis
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        secondary_procedures:
          - { method: wilcoxon_signed_rank }
          - { method: cliffs_delta }
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: confirmatory_interval
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
              - { name: delta, unit: ratio, direction: higher_is_better }
              - { name: bca_lower_bound, unit: ratio, direction: none }
              - { name: bca_upper_bound, unit: ratio, direction: none }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [confirmatory_analysis_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strong_positive, weak_positive, mixed, null, opposite, feasibility_rejection]

  - slug: chronological_recalibration_evaluation
    display_name: Chronological Recalibration Evaluation
    evidence_role: boundary
    run_requirement: suppressed
    suppression:
      reason: attack_row_client_assignment_unavailable
      evidence: >-
        Within-client benign time-of-day ordering (midnight-corrected, temporal_group_count = 9,
        Modbus excluded) is defensible, but the chronological recalibration evaluation still
        requires per-client attack rows at the temporal boundary. Edge-IIoTset attack rows resolve
        only to the attacker's subnet 0 (see external_device_dataset_validation), so the Regime
        D-temporal cell is preserved here as the intended, currently non-executable evaluation.
    tier: tier_6
    roadmap_reference: E-B1
    data: { dataset: edge_iiotset, setup: chronological }
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_averaging
      parameters: {}
    evaluations:
      - label: shared_mean_frozen
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
        recalibration_mode: frozen
      - label: local_frozen
        threshold: { policy: local_threshold, quantile: 0.95 }
        recalibration_mode: frozen
      - label: cluster_k3_mean_frozen
        threshold:
          policy: cluster_threshold
          aggregation: mean
          cluster_count: 3
          fingerprint_features: [mean_error, std_error, skew_error, p95_error]
          quantile: 0.95
          initialization: k_means_plus_plus
          initialization_runs: 10
          maximum_iterations: 300
          random_seed: 42
        recalibration_mode: frozen
      - label: shared_mean_one_shot
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
        recalibration_mode: one_shot
      - label: local_one_shot
        threshold: { policy: local_threshold, quantile: 0.95 }
        recalibration_mode: one_shot
      - label: cluster_k3_mean_one_shot
        threshold:
          policy: cluster_threshold
          aggregation: mean
          cluster_count: 3
          fingerprint_features: [mean_error, std_error, skew_error, p95_error]
          quantile: 0.95
          initialization: k_means_plus_plus
          initialization_runs: 10
          maximum_iterations: 300
          random_seed: 42
        recalibration_mode: one_shot
    analyses:
      - label: local_temporal_recovery
        kind: temporal_recovery_analysis
        frozen_evaluation: local_frozen
        recalibrated_evaluation: local_one_shot
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: figure
            figure_type: recovery_curve
            series:
              - { name: temporal_window, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [temporal_recovery_result]
            output_formats: [pdf, png]
        wording_outcomes: [recal_helps, recal_insufficient, no_meaningful_drift]
