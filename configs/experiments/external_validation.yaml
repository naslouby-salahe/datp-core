schema_version: 1
family: external_validation
experiments:
  - slug: external_sensor_group_validation
    display_name: External Sensor-Group Validation
    evidence_role: external_validation
    run_requirement: mandatory
    tier: tier_3
    roadmap_reference: E-X1
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_averaging
      parameters: {}
    regimes:
      - id: regime_d
        run_requirement: mandatory
        data: { dataset: edge_iiotset, setup: external_group }
        evaluation_scope: benign_operating_point_equity
        evaluation_refs: [shared_mean, local, cluster_k3_mean, federated_summary_benign]
        analysis_refs: [external_scope_effect]
        decision_ref: client_granularity_feasibility
        limitations:
          - capability: per_client_attack_detection_metrics
            status: unavailable
            unavailable_reason: attack_traffic_confined_to_subnet_zero
          - capability: attack_sensitive_threshold_tradeoff
            status: unavailable
            unavailable_reason: attack_traffic_confined_to_subnet_zero
        prerequisites:
          - requires: anchor_reproduction
            required_outcome: anchor_equivalence_passed
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: local
        threshold: { policy: local_threshold, quantile: 0.95 }
      - label: cluster_k3_mean
        threshold:
          policy: cluster_threshold
          aggregation: mean
          cluster_count: 3
          fingerprint_features: [mean_error, std_error, skew_error, p95_error]
          quantile: 0.95
          initialization: k_means_plus_plus
          initialization_runs: 10
          maximum_iterations: 300
          random_seed: 42
      - label: federated_summary_benign
        threshold: { policy: federated_summary_statistic_threshold, mode: matched_exceedance, matched_exceedance_k_grid_step: 0.01 }
    analyses:
      - label: external_scope_effect
        kind: paired_threshold_analysis
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        statistical_profile: { pairing_key: seed, resampling_unit: per_seed_paired_delta, analysis_seed_derivation: deterministic_from_experiment_seed_and_analysis_label, missing_pair_behavior: exclude_and_report_reduced_seed_count, zero_difference_behavior: retain_as_zero_delta_included_in_resample, finite_value_validation: reject_non_finite_delta_as_typed_error }
        secondary_procedures:
          - { method: wilcoxon_signed_rank }
          - { method: matched_pairs_rank_biserial_correlation }
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: external_validation_interval
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
              - { name: delta, unit: ratio, direction: higher_is_better }
              - { name: bca_lower_bound, unit: ratio, direction: none }
              - { name: bca_upper_bound, unit: ratio, direction: none }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [confirmatory_analysis_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strong_positive, weak_positive, mixed, null_result, opposite, feasibility_rejection]

  - slug: chronological_recalibration_evaluation
    display_name: Chronological Recalibration Evaluation
    evidence_role: boundary
    run_requirement: mandatory
    tier: tier_6
    roadmap_reference: E-B1
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_averaging
      parameters: {}
    regimes:
      - id: regime_d_temporal
        run_requirement: mandatory
        data: { dataset: edge_iiotset, setup: chronological }
        evaluation_scope: benign_temporal_operating_point_equity
        evaluation_refs: [shared_mean_frozen, local_frozen, cluster_k3_mean_frozen, shared_mean_one_shot, local_one_shot, cluster_k3_mean_one_shot]
        analysis_refs: [local_temporal_recovery]
        decision_ref: client_granularity_feasibility
        limitations:
          - capability: per_client_attack_detection_metrics
            status: unavailable
            unavailable_reason: attack_traffic_confined_to_subnet_zero
        prerequisites:
          - requires: anchor_reproduction
            required_outcome: anchor_equivalence_passed
    evaluations:
      - label: shared_mean_frozen
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
        recalibration_mode: frozen
      - label: local_frozen
        threshold: { policy: local_threshold, quantile: 0.95 }
        recalibration_mode: frozen
      - label: cluster_k3_mean_frozen
        threshold:
          policy: cluster_threshold
          aggregation: mean
          cluster_count: 3
          fingerprint_features: [mean_error, std_error, skew_error, p95_error]
          quantile: 0.95
          initialization: k_means_plus_plus
          initialization_runs: 10
          maximum_iterations: 300
          random_seed: 42
        recalibration_mode: frozen
      - label: shared_mean_one_shot
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
        recalibration_mode: one_shot
      - label: local_one_shot
        threshold: { policy: local_threshold, quantile: 0.95 }
        recalibration_mode: one_shot
      - label: cluster_k3_mean_one_shot
        threshold:
          policy: cluster_threshold
          aggregation: mean
          cluster_count: 3
          fingerprint_features: [mean_error, std_error, skew_error, p95_error]
          quantile: 0.95
          initialization: k_means_plus_plus
          initialization_runs: 10
          maximum_iterations: 300
          random_seed: 42
        recalibration_mode: one_shot
    analyses:
      - label: local_temporal_recovery
        kind: temporal_recovery_analysis
        frozen_evaluation: local_frozen
        recalibrated_evaluation: local_one_shot
        static_reference:
          source_experiment: external_sensor_group_validation
          source_evaluation: local
          group_restriction: nine_group_temporal_population
        recovery_fields: [static_reference_cv, frozen_future_cv, recalibrated_future_cv, drift_excess, recovered_amount, recovery_ratio]
        drift_excess_formula: frozen_future_cv - static_reference_cv
        recovered_amount_formula: frozen_future_cv - recalibrated_future_cv
        recovery_ratio_formula: recovered_amount / drift_excess
        recovery_ratio_precondition: drift_excess_meaningfully_positive
        negative_recovery_policy: report_as_is_no_floor_clamp
        outcome_bands: { outcome_a_recovery_ratio_min: 0.50, outcome_b_recovery_ratio_max: 0.50, outcome_c_condition: no_meaningful_positive_drift_excess }
        chronology_unverifiable_policy: typed_infeasibility_outcome
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        statistical_profile: { pairing_key: seed, resampling_unit: per_seed_paired_delta, analysis_seed_derivation: deterministic_from_experiment_seed_and_analysis_label, missing_pair_behavior: exclude_and_report_reduced_seed_count, zero_difference_behavior: retain_as_zero_delta_included_in_resample, finite_value_validation: reject_non_finite_delta_as_typed_error }
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: figure
            figure_type: recovery_curve
            series:
              - { name: temporal_window, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [temporal_recovery_result]
            output_formats: [pdf, png]
        wording_outcomes: [recal_helps, recal_insufficient, no_meaningful_drift]
