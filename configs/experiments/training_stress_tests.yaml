schema_version: 1
family: training_stress_tests
experiments:
  - slug: fedprox_aggregation_stress_test
    display_name: FedProx Aggregation Stress Test (N-BaIoT)
    evidence_role: stress_test
    run_requirement: mandatory
    tier: tier_4
    roadmap_reference: E-T1
    data: { dataset: nbaiot, setup: natural_devices }
    model: autoencoder
    training_profile: federated_proximal
    sweep:
      parameters:
        federated_proximal_mu:
          values: [0.001, 0.01, 0.1]
          # the pre-registered µ-grid (SCIENTIFIC_FOUNDATION.md §6; rejected by construction
          # outside this grid, CONFIGURATION_AND_EXPERIMENT_CATALOGUE.md §4). BLOCKED: no
          # worked example in the source documents shows the concrete binding from this sweep
          # coordinate onto `ModelDefinition.training_profile.mu` — unlike `threshold.quantile`,
          # `models/autoencoder.yaml`'s own `federated_proximal` profile authors a single literal
          # `mu: 0.001` (CONFIGURATION_AND_EXPERIMENT_CATALOGUE.md §12), and `training_profiles`
          # is a map of four named profiles, not one-per-grid-point. This sweep is declared here
          # for traceability and to preserve "a separate resolved profile per grid point" as
          # documented intent; the actual binding mechanism (a schema extension permitting a
          # per-experiment `mu` override, or three separately named model profiles) is a genuine
          # blocker for a statistical/operational authority to resolve, never invented here.
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: local
        threshold: { policy: local_threshold, quantile: 0.95 }
      - label: cluster_k3_mean
        threshold: { policy: cluster_threshold, aggregation: mean, cluster_count: 3, fingerprint_features: [mean_error, std_error, skew_error, p95_error], quantile: 0.95 }
      - label: family
        threshold: { policy: family_threshold, quantile: 0.95 }
    analyses:
      - label: fedprox_scope_effect
        kind: paired_threshold_analysis
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95 }
          # BLOCKED (statistical authority): bootstrap resample count required.
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      # BLOCKED (statistical/operational authority, ENGINEERING_DECISIONS_AND_CONFORMANCE.md §7):
      # experiment_seed required.
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
      - requires: confirmatory_threshold_scope_effect
        required_outcome: completed
        # the FedAvg-vs-FedProx comparison reads the confirmatory experiment's committed FedAvg
        # delta; convergence failure is reported non-retroactively — no post-hoc µ search
        # (roadmap §12.8, SB-22).
    operations:
      execution: scientific
      report: { table_type: stress_test, source_result_types: [confirmatory_analysis_result], output_formats: [markdown, latex], wording_outcomes: [strong_positive, weak_positive, mixed, null, opposite] }

