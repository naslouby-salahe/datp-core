  - slug: model_personalization_absorption_test
    display_name: Model-Personalization Absorption Test (N-BaIoT)
    evidence_role: stress_test
    run_requirement: mandatory
    tier: tier_4
    roadmap_reference: E-T2
    data: { dataset: nbaiot, setup: natural_devices }
    model: autoencoder
    training_profile: federated_averaging_personalized
    # BLOCKED (documented pre-training decision, ENGINEERING_DECISIONS_AND_CONFORMANCE.md §7):
    # this experiment cannot resolve until `models/autoencoder.yaml`'s
    # `federated_averaging_personalized` profile's comparator choice and hyperparameters are
    # supplied; never labeled "Ditto" unless the genuine Ditto algorithm is implemented (SB-24).
    evaluations:
      - label: shared_mean_personalized
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: local_personalized
        threshold: { policy: local_threshold, quantile: 0.95 }
    analyses:
      - label: personalized_scope_effect
        kind: paired_threshold_analysis
        first_evaluation: shared_mean_personalized
        second_evaluation: local_personalized
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95 }
          # BLOCKED (statistical authority): bootstrap resample count required.
        secondary_procedures: []
      - label: absorption
        kind: absorption_analysis
        core_analysis: { experiment: confirmatory_threshold_scope_effect, analysis: confirmatory_scope_effect }
        personalized_analysis: personalized_scope_effect
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95 }
          # BLOCKED (statistical authority): bootstrap resample count required.
        secondary_procedures: []
        # the four pre-specified absorption bands (EVALUATION_REPORTING_AND_PROVENANCE.md §6.4)
        # apply exactly as locked; all four outcomes are reportable, none hidden.
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      # BLOCKED (statistical/operational authority): experiment_seed required.
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
      - requires: confirmatory_threshold_scope_effect
        required_outcome: completed
    operations:
      execution: scientific
      report: { table_type: stress_test, source_result_types: [confirmatory_analysis_result, absorption_result], output_formats: [markdown, latex], wording_outcomes: [strongly_useful, partial, largely_absorbed, alternative_path] }

