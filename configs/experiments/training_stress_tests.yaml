schema_version: 1
family: training_stress_tests
experiments:
  - slug: fedprox_aggregation_stress_test
    display_name: FedProx Aggregation Stress Test
    evidence_role: stress_test
    run_requirement: mandatory
    tier: tier_4
    roadmap_reference: E-T1
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_proximal
      parameters:
        mu: { from_sweep: federated_proximal_mu }
    sweep:
      parameters:
        federated_proximal_mu:
          values: [0.001, 0.01, 0.1]
    regimes:
      - id: regime_a
        run_requirement: mandatory
        data: { dataset: nbaiot, setup: natural_devices }
      - id: regime_d
        run_requirement: suppressed
        suppression:
          reason: attack_row_client_assignment_unavailable
          evidence: >-
            The roadmap requires E-T1 on Regime A + D. The Regime A cell runs on N-BaIoT. The
            Regime D cell on Edge-IIoTset is suppressed because attack rows resolve only to the
            attacker's subnet 0 (see external_device_dataset_validation), leaving eight of nine
            sensor clients with no attack rows; the FedProx-under-Regime-D scope is preserved as
            intended but non-executable.
        data: { dataset: edge_iiotset, setup: external_group }
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: local
        threshold: { policy: local_threshold, quantile: 0.95 }
      - label: cluster_k3_mean
        threshold: { policy: cluster_threshold, aggregation: mean, cluster_count: 3, fingerprint_features: [mean_error, std_error, skew_error, p95_error], quantile: 0.95, initialization: k_means_plus_plus, initialization_runs: 10, maximum_iterations: 300, random_seed: 42 }
      - label: family
        threshold: { policy: family_threshold, quantile: 0.95 }
    analyses:
      - label: fedprox_scope_effect
        kind: paired_threshold_analysis
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
      - requires: confirmatory_threshold_scope_effect
        required_outcome: completed
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: stress_test
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
              - { name: delta, unit: ratio, direction: higher_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [confirmatory_analysis_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strong_positive, weak_positive, mixed, null, opposite]

  - slug: model_personalization_absorption_test
    display_name: Model-Personalization Absorption Test
    evidence_role: stress_test
    run_requirement: mandatory
    tier: tier_4
    roadmap_reference: E-T2
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_averaging_personalized
      parameters: {}
    regimes:
      - id: regime_a
        run_requirement: mandatory
        data: { dataset: nbaiot, setup: natural_devices }
      - id: regime_d
        run_requirement: suppressed
        suppression:
          reason: attack_row_client_assignment_unavailable
          evidence: >-
            The roadmap requires E-T2 on Regime A + D. The Regime A cell runs on N-BaIoT. The
            Regime D cell on Edge-IIoTset is suppressed because attack rows resolve only to the
            attacker's subnet 0 (see external_device_dataset_validation), leaving eight of nine
            sensor clients with no attack rows; the absorption scope under Regime D is preserved
            as intended but non-executable.
        data: { dataset: edge_iiotset, setup: external_group }
    evaluations:
      - label: shared_mean_personalized
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: local_personalized
        threshold: { policy: local_threshold, quantile: 0.95 }
    analyses:
      - label: personalized_scope_effect
        kind: paired_threshold_analysis
        first_evaluation: shared_mean_personalized
        second_evaluation: local_personalized
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        secondary_procedures: []
      - label: absorption
        kind: absorption_analysis
        core_analysis: { experiment: confirmatory_threshold_scope_effect, analysis: confirmatory_scope_effect }
        personalized_analysis: personalized_scope_effect
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
      - requires: confirmatory_threshold_scope_effect
        required_outcome: completed
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: stress_test
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
              - { name: delta, unit: ratio, direction: higher_is_better }
              - { name: absorption_ratio, unit: ratio, direction: none }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [confirmatory_analysis_result, absorption_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strongly_useful, partial, largely_absorbed, alternative_path]
