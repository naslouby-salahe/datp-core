schema_version: 1
family: references_and_boundaries
experiments:
  - slug: centralized_pooled_reference
    display_name: Centralized Pooled Reference
    evidence_role: supportive
    run_requirement: mandatory
    roadmap_reference: B0
    regimes:
      - id: regime_a
        run_requirement: mandatory
        data: { dataset: nbaiot, setup: natural_devices }
        evaluation_scope: full_detection_and_operating_point
        evaluation_refs: [centralized_pooled]
        analysis_refs: []
        prerequisites: []
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: centralized_pooled
      parameters: {}
    evaluations:
      - label: centralized_pooled
        threshold: { policy: centralized_pooled_threshold, quantile: 0.95 }
    analyses: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: dispersion_ladder
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [policy_evaluation_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strong_positive, weak_positive, mixed, null_result]

  - slug: federated_summary_comparator
    display_name: Federated Summary-Statistic Comparator
    evidence_role: stress_test
    run_requirement: mandatory
    tier: tier_4
    roadmap_reference: [E-T3, E-Q1, E-Q5]
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_averaging
      parameters: {}
    sweep:
      parameters:
        federated_summary_fixed_k:
          values: [2.0, 2.5, 3.0]
    regimes:
      - id: regime_a
        run_requirement: mandatory
        data: { dataset: nbaiot, setup: natural_devices }
        evaluation_scope: full_detection_and_operating_point
        evaluation_refs: [shared_mean, shared_pooled, shared_weighted, local, federated_summary_matched, federated_summary_fixed_k]
        analysis_refs: [matched_comparator_vs_local, matched_comparator_vs_shared, quantile_estimation_backbone]
        prerequisites:
          - requires: anchor_reproduction
            required_outcome: anchor_equivalence_passed
      - id: regime_d
        run_requirement: mandatory
        data: { dataset: edge_iiotset, setup: external_group }
        evaluation_scope: benign_operating_point_equity
        evaluation_refs: [shared_mean, shared_pooled, shared_weighted, local, federated_summary_matched]
        analysis_refs: [matched_comparator_vs_local, matched_comparator_vs_shared, quantile_estimation_backbone]
        limitations:
          - capability: per_client_attack_detection_metrics
            status: unavailable
            unavailable_reason: attack_traffic_confined_to_subnet_zero
        prerequisites:
          - requires: anchor_reproduction
            required_outcome: anchor_equivalence_passed
          - requires: external_sensor_group_validation
            required_outcome: completed
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: shared_pooled
        threshold: { policy: shared_threshold, construction: pooled, quantile: 0.95 }
      - label: shared_weighted
        threshold: { policy: shared_threshold, construction: weighted, quantile: 0.95 }
      - label: local
        threshold: { policy: local_threshold, quantile: 0.95 }
      - label: federated_summary_matched
        threshold: { policy: federated_summary_statistic_threshold, mode: matched_exceedance, matched_exceedance_k_grid_step: 0.01 }
        requested_metrics: [cv_fpr, between_ratio]
      - label: federated_summary_fixed_k
        threshold: { policy: federated_summary_statistic_threshold, mode: fixed_k, fixed_k: { from_sweep: federated_summary_fixed_k } }
        execution_requirement: optional
        publication_placement: supplementary
    analyses:
      - label: matched_comparator_vs_local
        kind: paired_threshold_analysis
        first_evaluation: local
        second_evaluation: federated_summary_matched
        primary_metric: cv_fpr
        delta_orientation: local_minus_federated_summary
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        statistical_profile: { pairing_key: seed, resampling_unit: per_seed_paired_delta, analysis_seed_derivation: deterministic_from_experiment_seed_and_analysis_label, missing_pair_behavior: exclude_and_report_reduced_seed_count, zero_difference_behavior: retain_as_zero_delta_included_in_resample, finite_value_validation: reject_non_finite_delta_as_typed_error }
        secondary_procedures: []
      - label: matched_comparator_vs_shared
        kind: paired_threshold_analysis
        first_evaluation: shared_mean
        second_evaluation: federated_summary_matched
        primary_metric: cv_fpr
        delta_orientation: shared_minus_federated_summary
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        statistical_profile: { pairing_key: seed, resampling_unit: per_seed_paired_delta, analysis_seed_derivation: deterministic_from_experiment_seed_and_analysis_label, missing_pair_behavior: exclude_and_report_reduced_seed_count, zero_difference_behavior: retain_as_zero_delta_included_in_resample, finite_value_validation: reject_non_finite_delta_as_typed_error }
        secondary_procedures: []
      - label: quantile_estimation_backbone
        kind: quantile_estimation_analysis
        roadmap_reference: E-Q1
        execution_requirement: optional
        publication_placement: supplementary
        source_evaluations: [shared_mean, shared_pooled, shared_weighted, local, federated_summary_matched]
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        statistical_profile: { pairing_key: seed, resampling_unit: per_seed_paired_delta, analysis_seed_derivation: deterministic_from_experiment_seed_and_analysis_label, missing_pair_behavior: exclude_and_report_reduced_seed_count, zero_difference_behavior: retain_as_zero_delta_included_in_resample, finite_value_validation: reject_non_finite_delta_as_typed_error }
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: comparator
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
              - { name: between_ratio, unit: ratio, direction: none }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [confirmatory_analysis_result, quantile_estimation_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strong_positive, weak_positive, mixed, null_result]

  - slug: file_pseudo_client_applicability_boundary
    display_name: File-Pseudo-Client Applicability Boundary
    evidence_role: boundary
    run_requirement: mandatory
    tier: tier_6
    roadmap_reference: B_A_APPLICABILITY_BOUNDARY
    regimes:
      - id: regime_b_a
        run_requirement: mandatory
        data: { dataset: ciciot2023, setup: file_pseudo_clients }
        evaluation_scope: full_detection_and_operating_point
        evaluation_refs: [shared_mean, local, cluster_k3_mean]
        analysis_refs: [pseudo_client_scope_effect]
        prerequisites:
          - requires: anchor_reproduction
            required_outcome: anchor_equivalence_passed
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_averaging
      parameters: {}
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: local
        threshold: { policy: local_threshold, quantile: 0.95 }
      - label: cluster_k3_mean
        threshold: { policy: cluster_threshold, aggregation: mean, cluster_count: 3, fingerprint_features: [mean_error, std_error, skew_error, p95_error], quantile: 0.95, initialization: k_means_plus_plus, initialization_runs: 10, maximum_iterations: 300, random_seed: 42 }
    analyses:
      - label: pseudo_client_scope_effect
        kind: paired_threshold_analysis
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        statistical_profile: { pairing_key: seed, resampling_unit: per_seed_paired_delta, analysis_seed_derivation: deterministic_from_experiment_seed_and_analysis_label, missing_pair_behavior: exclude_and_report_reduced_seed_count, zero_difference_behavior: retain_as_zero_delta_included_in_resample, finite_value_validation: reject_non_finite_delta_as_typed_error }
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: boundary_null
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [confirmatory_analysis_result]
            output_formats: [markdown, latex]
        wording_outcomes: [null_result, feasibility_rejection]

  - slug: operational_alert_burden
    display_name: Operational Alert Burden
    evidence_role: supportive
    run_requirement: mandatory
    tier: tier_5
    roadmap_reference: E-O1
    execution_condition: requires_valid_cited_traffic_rate
    cited_traffic_rate:
      status: not_configured
      contract_fields: [value, unit, citation_identifier, source_title, source_metadata, applicability_statement]
      finite_value_validation: reject_non_finite_rate
      non_negative_validation: reject_negative_rate
      outcome_if_not_configured: omitted
    regimes:
      - id: regime_a
        run_requirement: mandatory
        data: { dataset: nbaiot, setup: natural_devices }
        evaluation_scope: full_detection_and_operating_point
        evaluation_refs: [shared_mean, local]
        analysis_refs: [alert_burden_per_device]
        prerequisites:
          - requires: anchor_reproduction
            required_outcome: anchor_equivalence_passed
      - id: regime_d
        run_requirement: mandatory
        data: { dataset: edge_iiotset, setup: external_group }
        evaluation_scope: benign_operating_point_equity
        evaluation_refs: [shared_mean, local]
        analysis_refs: [alert_burden_per_device]
        limitations:
          - capability: per_client_attack_detection_metrics
            status: unavailable
            unavailable_reason: attack_traffic_confined_to_subnet_zero
        prerequisites:
          - requires: anchor_reproduction
            required_outcome: anchor_equivalence_passed
          - requires: external_sensor_group_validation
            required_outcome: completed
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_averaging
      parameters: {}
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: local
        threshold: { policy: local_threshold, quantile: 0.95 }
    analyses:
      - label: alert_burden_per_device
        kind: alert_burden_analysis
        source_evaluations: [shared_mean, local]
        requires: cited_traffic_rate
        unavailable_behavior: typed_omitted_outcome_if_cited_traffic_rate_not_configured
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        statistical_profile: { pairing_key: seed, resampling_unit: per_seed_paired_delta, analysis_seed_derivation: deterministic_from_experiment_seed_and_analysis_label, missing_pair_behavior: exclude_and_report_reduced_seed_count, zero_difference_behavior: retain_as_zero_delta_included_in_resample, finite_value_validation: reject_non_finite_delta_as_typed_error }
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: alert_burden
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: alerts_per_device_per_day, unit: count, direction: lower_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [policy_evaluation_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strong_positive, weak_positive, mixed, null_result, omitted]
