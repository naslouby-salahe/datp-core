schema_version: 1
family: references_and_boundaries
experiments:
  - slug: centralized_pooled_reference
    display_name: Centralized Pooled Reference
    evidence_role: supportive
    run_requirement: mandatory
    roadmap_reference: B0
    data: { dataset: nbaiot, setup: natural_devices }
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: centralized_pooled
      parameters: {}
    evaluations:
      - label: centralized_pooled
        threshold: { policy: centralized_pooled_threshold, quantile: 0.95 }
    analyses: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    prerequisites: []
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: dispersion_ladder
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [policy_evaluation_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strong_positive, weak_positive, mixed, null]

  - slug: federated_summary_comparator
    display_name: Federated Summary-Statistic Comparator
    evidence_role: stress_test
    run_requirement: mandatory
    tier: tier_4
    roadmap_reference: [E-T3, E-Q1, E-Q5]
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_averaging
      parameters: {}
    sweep:
      parameters:
        federated_summary_fixed_k:
          values: [2.0, 2.5, 3.0]
    regimes:
      - id: regime_a
        run_requirement: mandatory
        data: { dataset: nbaiot, setup: natural_devices }
      - id: regime_d
        run_requirement: suppressed
        suppression:
          reason: attack_row_client_assignment_unavailable
          evidence: >-
            The roadmap requires E-T3 on Regime A + D. The Regime A cell runs on N-BaIoT. The
            Regime D cell on Edge-IIoTset is suppressed because attack rows resolve only to the
            attacker's subnet 0 (see external_device_dataset_validation), leaving eight of nine
            sensor clients with no attack rows; the matched-comparator scope under Regime D is
            preserved as intended but non-executable.
        data: { dataset: edge_iiotset, setup: external_group }
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: shared_pooled
        threshold: { policy: shared_threshold, construction: pooled, quantile: 0.95 }
      - label: shared_weighted
        threshold: { policy: shared_threshold, construction: weighted, quantile: 0.95 }
      - label: local
        threshold: { policy: local_threshold, quantile: 0.95 }
      - label: federated_summary_matched
        threshold: { policy: federated_summary_statistic_threshold, mode: matched_exceedance, matched_exceedance_k_grid_step: 0.05 }
        requested_metrics: [cv_fpr, between_ratio]
      - label: federated_summary_fixed_k
        threshold: { policy: federated_summary_statistic_threshold, mode: fixed_k, fixed_k: { from_sweep: federated_summary_fixed_k } }
        execution_requirement: optional
        publication_placement: supplementary
    analyses:
      - label: matched_comparator_vs_local
        kind: paired_threshold_analysis
        first_evaluation: local
        second_evaluation: federated_summary_matched
        primary_metric: cv_fpr
        delta_orientation: local_minus_federated_summary
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        secondary_procedures: []
      - label: matched_comparator_vs_shared
        kind: paired_threshold_analysis
        first_evaluation: shared_mean
        second_evaluation: federated_summary_matched
        primary_metric: cv_fpr
        delta_orientation: shared_minus_federated_summary
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        secondary_procedures: []
      - label: quantile_estimation_backbone
        kind: quantile_estimation_analysis
        source_evaluations: [shared_mean, shared_pooled, shared_weighted, local, federated_summary_matched]
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: comparator
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
              - { name: between_ratio, unit: ratio, direction: none }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [confirmatory_analysis_result, quantile_estimation_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strong_positive, weak_positive, mixed, null]

  - slug: file_pseudo_client_applicability_boundary
    display_name: File-Pseudo-Client Applicability Boundary
    evidence_role: boundary
    run_requirement: mandatory
    tier: tier_6
    roadmap_reference: B_A_APPLICABILITY_BOUNDARY
    data: { dataset: ciciot2023, setup: file_pseudo_clients }
    model: autoencoder
    checkpoint_profile: datp_core
    training:
      profile: federated_averaging
      parameters: {}
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: local
        threshold: { policy: local_threshold, quantile: 0.95 }
      - label: cluster_k3_mean
        threshold: { policy: cluster_threshold, aggregation: mean, cluster_count: 3, fingerprint_features: [mean_error, std_error, skew_error, p95_error], quantile: 0.95, initialization: k_means_plus_plus, initialization_runs: 10, maximum_iterations: 300, random_seed: 42 }
    analyses:
      - label: pseudo_client_scope_effect
        kind: paired_threshold_analysis
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        primary_procedure: { method: bca_bootstrap, confidence_level: 0.95, resample_count: 10000 }
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: boundary_null
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [confirmatory_analysis_result]
            output_formats: [markdown, latex]
        wording_outcomes: [null, feasibility_rejection]
