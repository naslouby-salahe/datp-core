schema_version: 1
family: threshold_scope
experiments:
  - slug: confirmatory_threshold_scope_effect
    display_name: Confirmatory Threshold-Scope Effect
    evidence_role: confirmatory
    run_requirement: mandatory
    tier: tier_1
    roadmap_reference: E-C1
    data: { dataset: nbaiot, setup: natural_devices }
    model: autoencoder
    training:
      profile: federated_averaging
      parameters: {}
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
        requested_metrics: [cv_fpr, fpr, tpr, iqr_fpr, fpr_range, worst_client_fpr, auroc, macro_f1, p10_macro_f1, balanced_accuracy, worst_client_ba, jain_index, gini_coefficient]
      - label: local
        threshold: { policy: local_threshold, quantile: 0.95 }
        requested_metrics: [cv_fpr, fpr, tpr, iqr_fpr, fpr_range, worst_client_fpr, auroc, macro_f1, p10_macro_f1, balanced_accuracy, worst_client_ba, jain_index, gini_coefficient]
        # jain_index / gini_coefficient realize the optional operating-point equity suite (E-Q3,
        # `operating_point_equity_suite`), attached as additional requested metrics per
        # `EVALUATION_REPORTING_AND_PROVENANCE.md` §7.4 — never replacing cv_fpr as the primary
        # endpoint.
    analyses:
      - label: confirmatory_scope_effect
        kind: paired_threshold_analysis
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        primary_procedure:
          method: bca_bootstrap
          confidence_level: 0.95
          resample_count: 10000
        secondary_procedures:
          - { method: wilcoxon_signed_rank }
          - { method: cliffs_delta }
          # E-Q4 (`secondary_confidence_intervals_and_effect_sizes`) — descriptive only, never a
          # second bootstrap definition.
      - label: client_score_distribution_mechanism
        kind: distribution_mechanism_analysis
        # E-M3 (`client_score_distribution_mechanism_analysis`): reuses this experiment's
        # committed SCORE_SET artifacts, no separate source inspection, partitioning, training,
        # scoring, or threshold construction.
        source_evaluations: [shared_mean, local]
        primary_procedure: { method: spearman_correlation }
        secondary_procedures: []
      - label: threshold_shift_detection_tradeoff
        kind: distribution_mechanism_analysis
        # E-M5 (`threshold_shift_detection_tradeoff`): per-client (Δτ, ΔFPR, ΔTPR) shift table
        # across all nine devices, no device filtering.
        source_evaluations: [shared_mean, local]
        primary_procedure: { method: spearman_correlation }
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: confirmatory_interval
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
              - { name: delta, unit: ratio, direction: higher_is_better }
              - { name: bca_lower_bound, unit: ratio, direction: none }
              - { name: bca_upper_bound, unit: ratio, direction: none }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [confirmatory_analysis_result]
            output_formats: [markdown, latex]
          - artifact_type: figure
            figure_type: cdf_overlay
            series:
              - { name: benign_score_density, unit: none, direction: none }
              - { name: attack_score_density, unit: none, direction: none }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [distribution_mechanism_result]
            output_formats: [markdown, latex]
          - artifact_type: figure
            figure_type: scatter
            series:
              - { name: threshold_shift, unit: ratio, direction: none }
              - { name: fpr_delta, unit: ratio, direction: lower_is_better }
              - { name: tpr_delta, unit: ratio, direction: higher_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [distribution_mechanism_result]
            output_formats: [markdown, latex]
          - artifact_type: supplementary_table
            table_type: communication_storage_cost
            # optional RESOURCE_COST stage (E-Q6, `communication_storage_cost_analysis`); MEASURED
            # or ESTIMATED values, never conflated, covering SharedThreshold/LocalThreshold.
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: communication_bytes_per_round, unit: bytes, direction: lower_is_better }
              - { name: threshold_message_bytes, unit: bytes, direction: lower_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [resource_cost_result]
            output_formats: [markdown]
        wording_outcomes: [strong_positive, weak_positive, mixed, null, opposite]

  - slug: shared_threshold_construction_sensitivity
    display_name: Shared-Threshold Construction Sensitivity
    evidence_role: supportive
    run_requirement: mandatory
    tier: tier_2
    roadmap_reference: E-S1
    data: { dataset: nbaiot, setup: natural_devices }
    model: autoencoder
    training:
      profile: federated_averaging
      parameters: {}
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: 0.95 }
      - label: shared_pooled
        threshold: { policy: shared_threshold, construction: pooled, quantile: 0.95 }
      - label: shared_weighted
        threshold: { policy: shared_threshold, construction: weighted, quantile: 0.95 }
      - label: local
        threshold: { policy: local_threshold, quantile: 0.95 }
    analyses:
      - label: mean_vs_local_dispersion
        kind: paired_threshold_analysis
        first_evaluation: shared_mean
        second_evaluation: local
        primary_metric: cv_fpr
        delta_orientation: shared_minus_local
        primary_procedure:
          method: bca_bootstrap
          confidence_level: 0.95
          resample_count: 10000
        secondary_procedures: []
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: dispersion_ladder
            columns:
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
              - { name: iqr_fpr, unit: ratio, direction: lower_is_better }
              - { name: fpr_range, unit: ratio, direction: lower_is_better }
              - { name: worst_client_fpr, unit: ratio, direction: lower_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [policy_evaluation_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strong_positive, weak_positive, mixed, null, opposite]

  - slug: threshold_quantile_sensitivity
    display_name: Threshold Quantile Sensitivity
    evidence_role: supportive
    run_requirement: mandatory
    tier: tier_2
    roadmap_reference: E-S2
    data: { dataset: nbaiot, setup: natural_devices }
    model: autoencoder
    training:
      profile: federated_averaging
      parameters: {}
    sweep:
      parameters:
        threshold_quantile:
          values: [0.90, 0.95, 0.975, 0.99]
    evaluations:
      - label: shared_mean
        threshold: { policy: shared_threshold, construction: mean, quantile: { from_sweep: threshold_quantile } }
      - label: local
        threshold: { policy: local_threshold, quantile: { from_sweep: threshold_quantile } }
      - label: cluster_k3_mean
        threshold:
          policy: cluster_threshold
          aggregation: mean
          cluster_count: 3
          fingerprint_features: [mean_error, std_error, skew_error, p95_error]
          quantile: { from_sweep: threshold_quantile }
          initialization: k_means_plus_plus
          initialization_runs: 10
          maximum_iterations: 300
          random_seed: 42
    seed_cohort:
      paired_seed_count: 10
      derivation: deterministic_from_experiment_seed
      experiment_seed: 0
    prerequisites:
      - requires: anchor_reproduction
        required_outcome: anchor_equivalence_passed
    operations:
      execution: scientific
      report:
        report_artifacts:
          - artifact_type: main_table
            table_type: sensitivity_grid
            columns:
              - { name: threshold_quantile, unit: none, direction: none }
              - { name: threshold_construction, unit: none, direction: none }
              - { name: cv_fpr, unit: ratio, direction: lower_is_better }
            ordering: deterministic_by_threshold_construction
            missing_value_policy: render_typed_unavailable
            source_result_types: [policy_evaluation_result]
            output_formats: [markdown, latex]
        wording_outcomes: [strong_positive, weak_positive, mixed, null, opposite]
