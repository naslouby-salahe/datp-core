evaluation_result_contract:
  per_evaluation_result_type: policy_evaluation_result
  per_evaluation_eligibility_result_type: eligibility_coverage_result
  per_evaluation_required_records:
    - threshold_record
    - per_client_metric_record
    - seed_level_metric_record
    - eligibility_manifest

artifact_identity:
  hash_function: blake2b
  digest_bytes: 32
  canonical_serialization: sorted_keys_utf_8_json_without_comments_or_whitespace_variation
  absolute_paths_excluded_from_identity: true
  fingerprints:
    source: [dataset_identifier, dataset_fingerprint_inputs_source, source_inventory_hash]
    schema: [dataset_identifier, dataset_fingerprint_inputs_schema]
    materialization:
      - source_fingerprint
      - schema_fingerprint
      - materialization_identifier
      - preprocessing_sequence
      - row_exclusion_rules
      - duplicate_policy
      - categorical_encoding_vocabulary_fingerprint
      - post_encoding_feature_order
      - normalization_strategy
      - normalization_fit_scope
      - split_definition
      - split_seed
    client_assignment: [materialization_fingerprint, setup_identifier, client_construction, partition_condition, partition_seed]
    model: [resolved_model_architecture, resolved_input_dimension]
    training:
      - client_assignment_fingerprint
      - model_fingerprint
      - resolved_training_profile
      - resolved_optimizer_contract
      - resolved_batching_contract
      - training_seed
      - resolved_training_overrides
    checkpoint: [training_fingerprint, checkpoint_profile, round_or_epoch, resolved_checkpoint_selection_contract]
    score: [checkpoint_fingerprint, split_role, score_orientation]
    threshold: [score_fingerprint, resolved_threshold_policy_contract, resolved_policy_overrides, eligibility_policy]
    metric: [threshold_fingerprint, metric_bundle, resolved_metric_definitions, metric_definition_version]
    analysis: [metric_fingerprint, analysis_label, analysis_formulae, score_orientation, reference_analysis, outcome_bands, sweep_coordinates, resolved_statistical_profile, analysis_seed]
  lineage_validation_before_reuse:
    - checksum_match
    - schema_version_match
    - parent_fingerprint_match
    - completion_status_completed
    - non_stale_status
  reuse_rejected_when_any_changes:
    - dataset
    - materialization
    - client_assignment
    - split
    - preprocessing
    - model
    - training_algorithm
    - training_seed
    - checkpoint
    - threshold_policy
    - policy_parameters
    - metric_definition
    - analysis_formula
    - outcome_bands
    - statistical_profile

communication_estimation_contract:
  estimate_basis: analytical_payload_estimate_never_measured_network_traffic
  field_encodings:
    float64: { bytes_per_field: 8, byte_order: little_endian }
    uint64: { bytes_per_field: 8, byte_order: little_endian }
    uint32: { bytes_per_field: 4, byte_order: little_endian }
  threshold_exchange:
    direction: client_to_server_then_server_to_clients
    b1: { uplink_fields_per_client: [local_quantile_float64], downlink_fields_per_client: [shared_threshold_float64] }
    b2: { uplink_fields_per_client: [], downlink_fields_per_client: [local_threshold_float64] }
    b4: { uplink_fields_per_client: [mean_error_float64, std_error_float64, skew_error_float64, p95_error_float64], downlink_fields_per_client: [cluster_identifier_uint32, cluster_threshold_float64] }
    federated_summary: { uplink_fields_per_client: [benign_calibration_count_uint64, benign_local_mean_float64, benign_local_variance_float64], candidate_grid_downlink_fields_per_client: [candidate_coefficient_float64], candidate_grid_uplink_fields_per_client_per_candidate: [benign_exceedance_count_uint64] }
  candidate_grid_payload: count_every_candidate_downlink_and_every_client_candidate_uplink_without_compression
  model_exchange:
    field_width: float32_4_bytes
    directions: [server_to_each_participating_client, each_participating_client_to_server]
    bytes_per_round_formula: "2 * participating_client_count * resolved_model_parameter_count * 4"
  checkpoint_storage:
    contents: [model_parameters_float32, selected_round_uint32, training_seed_uint32, optimizer_state_if_required_for_resumption, training_and_checkpoint_fingerprints]
    model_parameter_bytes_formula: "resolved_model_parameter_count * 4"
  filename_match_is_not_lineage_evidence: true
  frozen_artifacts_immutable: true
  ambiguous_latest_reference: forbidden

report_defaults:
  ordering: deterministic_by_threshold_construction
  missing_value_policy: render_typed_unavailable
  table_output_formats: [markdown, latex]
  figure_output_formats: [pdf, png]
  provenance_required_per_artifact: true
  analysis_defined_direction_token: from_analysis

report_profiles:
  interval_table:
    artifact_type: main_table
    table_type: estimate_with_interval
    columns:
      - { name: threshold_construction, unit: none, direction: none }
      - { name: cv_fpr, unit: ratio, direction: lower_is_better }
      - { name: delta, unit: ratio, direction: from_analysis }
      - { name: bca_lower_bound, unit: ratio, direction: none }
      - { name: bca_upper_bound, unit: ratio, direction: none }
      - { name: sign_consistency, unit: ratio, direction: none }
  dispersion_ladder_table:
    artifact_type: main_table
    table_type: dispersion_ladder
    columns:
      - { name: threshold_construction, unit: none, direction: none }
      - { name: cv_fpr, unit: ratio, direction: lower_is_better }
      - { name: iqr_fpr, unit: ratio, direction: lower_is_better }
      - { name: fpr_range, unit: ratio, direction: lower_is_better }
      - { name: worst_client_fpr, unit: ratio, direction: lower_is_better }
  minimal_dispersion_table:
    artifact_type: main_table
    table_type: dispersion_ladder
    columns:
      - { name: threshold_construction, unit: none, direction: none }
      - { name: cv_fpr, unit: ratio, direction: lower_is_better }
  sensitivity_grid_table:
    artifact_type: main_table
    table_type: sensitivity_grid
    columns:
      - { name: threshold_construction, unit: none, direction: none }
      - { name: sweep_condition, unit: none, direction: none }
      - { name: cv_fpr, unit: ratio, direction: lower_is_better }
      - { name: worst_client_fpr, unit: ratio, direction: lower_is_better }
      - { name: absolute_attainment_error, unit: ratio, direction: lower_is_better }
  coverage_table:
    artifact_type: main_table
    table_type: conformal_coverage
    columns:
      - { name: threshold_construction, unit: none, direction: none }
      - { name: target_coverage, unit: ratio, direction: none }
      - { name: achieved_marginal_coverage, unit: ratio, direction: none }
      - { name: achieved_macro_client_coverage, unit: ratio, direction: none }
      - { name: absolute_coverage_error, unit: ratio, direction: lower_is_better }
      - { name: cv_fpr, unit: ratio, direction: lower_is_better }
  cluster_stability_table:
    artifact_type: main_table
    table_type: cluster_stability
    columns:
      - { name: threshold_construction, unit: none, direction: none }
      - { name: cv_fpr, unit: ratio, direction: lower_is_better }
      - { name: worst_client_fpr, unit: ratio, direction: lower_is_better }
      - { name: within_cluster_threshold_dispersion, unit: score, direction: lower_is_better }
      - { name: within_cluster_fpr_dispersion, unit: ratio, direction: lower_is_better }
      - { name: across_cluster_threshold_dispersion, unit: score, direction: none }
      - { name: across_cluster_mean_fpr_dispersion, unit: ratio, direction: none }
      - { name: adjusted_rand_index, unit: none, direction: higher_is_better }
      - { name: cluster_size, unit: count, direction: none }
  cluster_contingency_table:
    artifact_type: supplementary_table
    table_type: contingency
    columns:
      - { name: cluster_assignment, unit: none, direction: none }
      - { name: client_identifier, unit: none, direction: none }
  communication_storage_table:
    artifact_type: supplementary_table
    table_type: communication_storage_cost
    estimate_basis: analytical_payload_estimate_never_measured_network_traffic
    columns:
      - { name: threshold_construction, unit: none, direction: none }
      - { name: transmitted_field_list, unit: none, direction: none }
      - { name: estimated_threshold_message_bytes, unit: bytes, direction: lower_is_better }
      - { name: estimated_model_exchange_bytes_per_round, unit: bytes, direction: lower_is_better }
      - { name: estimated_checkpoint_storage_bytes, unit: bytes, direction: lower_is_better }
  alert_burden_table:
    artifact_type: main_table
    table_type: alert_burden
    estimate_basis: estimated_from_a_cited_or_measured_benign_decision_rate_never_a_deployment_measurement
    columns:
      - { name: threshold_construction, unit: none, direction: none }
      - { name: alerts_per_client_per_day, unit: count, direction: lower_is_better }
      - { name: benign_decision_rate_source, unit: none, direction: none }
  comparator_table:
    artifact_type: main_table
    table_type: comparator
    columns:
      - { name: threshold_construction, unit: none, direction: none }
      - { name: cv_fpr, unit: ratio, direction: lower_is_better }
      - { name: absolute_threshold_error, unit: score, direction: lower_is_better }
      - { name: achieved_exceedance, unit: ratio, direction: none }
      - { name: absolute_attainment_error, unit: ratio, direction: lower_is_better }
      - { name: within_term, unit: score_squared, direction: none }
      - { name: between_term, unit: score_squared, direction: none }
      - { name: between_ratio, unit: ratio, direction: none }
  score_geometry_figure:
    artifact_type: figure
    figure_type: cdf_overlay
    series:
      - { name: per_client_benign_score_cdf, unit: none, direction: none }
      - { name: per_client_attack_score_cdf, unit: none, direction: none }
      - { name: per_client_threshold_position, unit: score, direction: none }
  threshold_tradeoff_figure:
    artifact_type: figure
    figure_type: scatter
    series:
      - { name: threshold_shift, unit: score, direction: none }
      - { name: fpr_delta, unit: ratio, direction: lower_is_better }
      - { name: tpr_delta, unit: ratio, direction: higher_is_better }
  severity_trend_figure:
    artifact_type: figure
    figure_type: severity_trend
    series:
      - { name: partition_condition, unit: none, direction: none }
      - { name: cv_fpr_delta, unit: ratio, direction: from_analysis }
  association_scatter_figure:
    artifact_type: figure
    figure_type: scatter
    series:
      - { name: pairwise_js_divergence, unit: none, direction: none }
      - { name: cv_fpr_delta, unit: ratio, direction: from_analysis }
  shrinkage_curve_figure:
    artifact_type: figure
    figure_type: lambda_curve
    series:
      - { name: shrinkage_weight, unit: none, direction: none }
      - { name: cv_fpr, unit: ratio, direction: lower_is_better }
      - { name: p10_macro_f1, unit: ratio, direction: higher_is_better }
  recovery_curve_figure:
    artifact_type: figure
    figure_type: recovery_curve
    series:
      - { name: temporal_window, unit: none, direction: none }
      - { name: cv_fpr, unit: ratio, direction: lower_is_better }
      - { name: recovery_ratio, unit: ratio, direction: from_analysis }
  temporal_recovery_table:
    artifact_type: main_table
    table_type: temporal_recovery
    columns:
      - { name: threshold_construction, unit: none, direction: none }
      - { name: static_reference_cv, unit: ratio, direction: lower_is_better }
      - { name: frozen_future_cv, unit: ratio, direction: lower_is_better }
      - { name: recalibrated_future_cv, unit: ratio, direction: lower_is_better }
      - { name: drift_excess, unit: ratio, direction: from_analysis }
      - { name: recovered_amount, unit: ratio, direction: from_analysis }
      - { name: recovery_ratio, unit: ratio, direction: from_analysis }

operational_inputs:
  benign_decision_rate:
    configured: false
    value: null
    required_fields: [value, unit, citation_identifier, source_title, source_metadata, applicability_statement]
    finite_value_validation: reject_non_finite_rate
    non_negative_validation: reject_negative_rate
    unavailable_behavior: typed_unavailable_result
    invented_rate_forbidden: true
