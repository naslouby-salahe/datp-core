# Tier 1 confirmatory suite (docs/protocol/claim_hierarchy.md, regimes.md
# Regime A). Trains the shared FedAvg AE once per seed, then runs the B0-B4
# core ladder plus the confirmatory-tier mechanism modules.
name: confirmatory_regime_a
status: ready_for_smoke
regimes: [A]
experiment_ids: [E-C1, E-S1, E-M1, E-M2, E-M3, E-M4, E-M5, E-O1]
training_enabled: true
requires_score_reuse: false
allow_training_override: false
dataset_config: nbaiot.yaml
training_config: fedavg_nbaiot.yaml
model_config: base_autoencoder.yaml
thresholding_config: anchor_b1_b2.yaml
mini_seed_count: 2
expected_client_count: 9
artifact_layout:
  run_root_prefix: anchor
  seed_directory_prefix: seed
  preprocessing_id_prefix: scaler
  client_map_filename: client-map.json
  split_manifest_filename: split.json
  checkpoint_filename: checkpoint.npz
  score_filename: scores.npz
  summary_filename: summary.json
  threshold_filename: thresholds.json
