[importlinter]
root_packages =
    datp_core
include_external_packages = True

[importlinter:contract:domain-no-upward-or-framework-imports]
name = domain imports only the standard library and domain
type = forbidden
source_modules =
    datp_core.domain
forbidden_modules =
    datp_core.application
    datp_core.config
    datp_core.analysis
    datp_core.infrastructure
    datp_core.composition
    datp_core.cli
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy
    pydantic

[importlinter:contract:application-imports-domain-only]
name = application imports domain only, except the framework-free reporting contract
type = forbidden
source_modules =
    datp_core.application
forbidden_modules =
    datp_core.config
    datp_core.infrastructure
    datp_core.composition
    datp_core.cli
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy
    pydantic

[importlinter:contract:config-imports-domain-only]
name = config imports domain only, never application/analysis/infrastructure/cli or a scientific framework
type = forbidden
source_modules =
    datp_core.config
forbidden_modules =
    datp_core.application
    datp_core.analysis
    datp_core.infrastructure
    datp_core.composition
    datp_core.cli
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy

[importlinter:contract:analysis-imports-domain-and-application-only]
name = analysis imports domain (and narrowly application) only, never config/infrastructure/cli or a framework
type = forbidden
source_modules =
    datp_core.analysis
forbidden_modules =
    datp_core.config
    datp_core.infrastructure
    datp_core.composition
    datp_core.cli
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy
    pydantic

[importlinter:contract:infrastructure-no-config-cli-or-composition-imports]
name = infrastructure imports application/domain/analysis only, never config/cli/composition
type = forbidden
source_modules =
    datp_core.infrastructure
forbidden_modules =
    datp_core.config
    datp_core.composition
    datp_core.cli

[importlinter:contract:composition-no-direct-framework-imports]
name = composition wires adapters but never imports a framework directly
type = forbidden
allow_indirect_imports = true
source_modules =
    datp_core.composition
forbidden_modules =
    datp_core.cli
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy
    pydantic

[importlinter:contract:cli-imports-composition-only]
name = cli imports composition only, never a layer it wires or a framework directly
type = forbidden
allow_indirect_imports = true
source_modules =
    datp_core.cli
forbidden_modules =
    datp_core.config
    datp_core.application
    datp_core.analysis
    datp_core.infrastructure
    datp_core.domain
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy
    pydantic
