[importlinter]
root_packages =
    datp_core
include_external_packages = True

[importlinter:contract:kernel-is-framework-free]
name = kernel imports no project capability or framework
type = forbidden
source_modules =
    datp_core.kernel
forbidden_modules =
    datp_core.catalogue
    datp_core.orchestration
    datp_core.datasets
    datp_core.learning
    datp_core.thresholding
    datp_core.evaluation
    datp_core.analysis
    datp_core.reporting
    datp_core.artifacts
    datp_core.runtime
    datp_core.interfaces
    datp_core.composition
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy
    pydantic

[importlinter:contract:orchestration-no-config-models]
name = orchestration consumes only resolved catalogue records
type = forbidden
source_modules =
    datp_core.orchestration
forbidden_modules =
    datp_core.catalogue.config
    datp_core.composition
    datp_core.interfaces
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy
    pydantic

[importlinter:contract:config-no-execution]
name = configuration parsing has no execution imports
type = forbidden
source_modules =
    datp_core.catalogue.config
forbidden_modules =
    datp_core.orchestration
    datp_core.artifacts
    datp_core.datasets
    datp_core.learning
    datp_core.thresholding
    datp_core.evaluation
    datp_core.analysis
    datp_core.reporting
    datp_core.composition
    datp_core.cli
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy

[importlinter:contract:interfaces-use-composition]
name = interfaces do not traverse configuration directly
type = forbidden
allow_indirect_imports = true
source_modules =
    datp_core.interfaces
forbidden_modules =
    datp_core.catalogue.config
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy
    pydantic

[importlinter:contract:composition-no-direct-framework-imports]
name = composition wires adapters but never imports a framework directly
type = forbidden
allow_indirect_imports = true
source_modules =
    datp_core.composition
forbidden_modules =
    datp_core.interfaces
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy
    pydantic
