[importlinter]
root_packages =
    datp_core
include_external_packages = True

[importlinter:contract:domain-is-framework-free]
name = domain imports no external framework
type = forbidden
source_modules =
    datp_core.domain
forbidden_modules =
    datp_core.application
    datp_core.config
    datp_core.planning
    datp_core.orchestration
    datp_core.infrastructure
    datp_core.composition
    datp_core.interfaces
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy
    pydantic

[importlinter:contract:config-has-no-infrastructure-execution]
name = configuration models and loaders do not import infrastructure execution
type = forbidden
source_modules =
    datp_core.config
forbidden_modules =
    datp_core.orchestration
    datp_core.infrastructure
    datp_core.composition
    datp_core.interfaces
    torch
    flwr
    sklearn
    scipy

[importlinter:contract:planning-is-framework-free]
name = planning layer is free of ML and infrastructure imports
type = forbidden
source_modules =
    datp_core.planning
forbidden_modules =
    datp_core.infrastructure
    datp_core.orchestration
    datp_core.composition
    datp_core.interfaces
    torch
    flwr
    sklearn
    scipy
    pandas
    numpy

[importlinter:contract:application-layer-boundaries]
name = application layer does not import orchestration or interfaces
type = forbidden
source_modules =
    datp_core.application
forbidden_modules =
    datp_core.orchestration
    datp_core.interfaces
