[importlinter]
root_packages =
    datp_core
include_external_packages = True

# Rewritten for the scientific-pipeline architecture (core/contracts/config/artifacts/data/
# experiments/learning/thresholding/evaluation/analysis/reporting/pipeline + app.py/cli.py),
# replacing the horizontal-layer contracts (domain/application/infrastructure/interfaces/
# composition/planning/config) that no longer exist after the file-tree refactor.

[importlinter:contract:core-is-bottom]
name = core imports nothing else in datp_core
type = forbidden
source_modules =
    datp_core.core
forbidden_modules =
    datp_core.contracts
    datp_core.config
    datp_core.experiments
    datp_core.data
    datp_core.learning
    datp_core.thresholding
    datp_core.evaluation
    datp_core.analysis
    datp_core.reporting
    datp_core.artifacts
    datp_core.pipeline
    datp_core.app
    datp_core.cli

[importlinter:contract:contracts-imports-only-core]
name = contracts may import only core and third-party schema libraries
type = forbidden
source_modules =
    datp_core.contracts
forbidden_modules =
    datp_core.config
    datp_core.experiments
    datp_core.data
    datp_core.learning
    datp_core.thresholding
    datp_core.evaluation
    datp_core.analysis
    datp_core.reporting
    datp_core.artifacts
    datp_core.pipeline
    datp_core.app
    datp_core.cli

# Renamed from "feature-models-are-pure-data": import-linter only checks import direction, and
# several of these modules (e.g. thresholding.models, evaluation.models, analysis.statistics)
# legitimately hold numeric primitives (quantile computation, FPR dispersion, BCa/Wilcoxon) rather
# than pure data -- "pure" here means side-effect-free and config-independent, not data-only.
[importlinter:contract:feature-models-are-config-independent]
name = feature models modules do not import resolved configuration or execution
type = forbidden
source_modules =
    datp_core.experiments.models
    datp_core.data.contracts
    datp_core.learning.models
    datp_core.thresholding.models
    datp_core.evaluation.models
    datp_core.analysis.results
    datp_core.analysis.statistics
    datp_core.artifacts.models
forbidden_modules =
    datp_core.config.project
    datp_core.app
    datp_core.cli

[importlinter:contract:only-cli-and-tests-import-app]
name = app is the composition root; only cli.py wires it (tests may also import it directly)
type = forbidden
source_modules =
    datp_core.config
    datp_core.experiments
    datp_core.data
    datp_core.learning
    datp_core.thresholding
    datp_core.evaluation
    datp_core.analysis
    datp_core.reporting
    datp_core.artifacts
    datp_core.pipeline
forbidden_modules =
    datp_core.app
    datp_core.cli

[importlinter:contract:analysis-does-not-import-reporting]
name = analysis produces typed results; reporting consumes them, never the reverse
type = forbidden
source_modules =
    datp_core.analysis
forbidden_modules =
    datp_core.reporting

[importlinter:contract:data-thresholding-evaluation-do-not-import-downstream-features]
name = data/learning/thresholding/evaluation do not import the analysis/reporting features built on top of them
type = forbidden
source_modules =
    datp_core.data
    datp_core.learning
    datp_core.thresholding
    datp_core.evaluation
forbidden_modules =
    datp_core.analysis
    datp_core.reporting

[importlinter:contract:no-flower-dependency]
name = flwr was removed as a dead dependency (infrastructure/federation/flower_adapter.py deleted)
type = forbidden
source_modules =
    datp_core
forbidden_modules =
    flwr

# Closes the gap the architecture audit flagged: data.materialization and experiments.planning
# (execution-tier modules) legitimately cross into each other's pure-data tier (data.contracts,
# experiments.models) today, and no contract governed that pair. That crossing is safe as long as
# the pure-data tiers themselves never import each other -- this is the actual cycle risk, and the
# only one import-linter can mechanically catch here. It does not force a one-way layering between
# data and experiments (a real cycle-free two-way relationship exists today), only that a future
# edit can never make it a real cycle by importing across at the model tier. Scoped to this one
# pair (not every feature-model module) because siblings within one package -- e.g.
# analysis.results building on analysis.statistics -- are normal intra-package structure, not the
# cross-package coupling this contract guards against.
[importlinter:contract:data-and-experiments-models-are-mutually-independent]
name = data.contracts and experiments.models never import each other, even indirectly
type = independence
modules =
    datp_core.experiments.models
    datp_core.data.contracts
