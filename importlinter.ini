[importlinter]
root_packages =
    datp_core
include_external_packages = True

# Rewritten for the feature-oriented architecture (configuration/experiments/datasets/learning/
# thresholding/evaluation/analysis/reporting/artifacts/pipeline + bootstrap.py/cli.py), replacing
# the horizontal-layer contracts (domain/application/infrastructure/interfaces/composition/
# planning/config) that no longer exist after the file-tree refactor.

[importlinter:contract:pipeline-foundation-is-bottom]
name = pipeline's foundational identifier/value/fingerprint modules import nothing upward
type = forbidden
source_modules =
    datp_core.pipeline.identifiers
    datp_core.pipeline.values
    datp_core.pipeline.fingerprints
forbidden_modules =
    datp_core.configuration
    datp_core.experiments
    datp_core.datasets
    datp_core.learning
    datp_core.thresholding
    datp_core.evaluation
    datp_core.analysis
    datp_core.reporting
    datp_core.artifacts
    datp_core.bootstrap
    datp_core.cli

[importlinter:contract:feature-models-are-pure-data]
name = feature models modules hold pure data and do not import resolved configuration or execution
type = forbidden
source_modules =
    datp_core.experiments.models
    datp_core.datasets.models
    datp_core.learning.models
    datp_core.thresholding.models
    datp_core.evaluation.models
    datp_core.analysis.models
    datp_core.reporting.models
    datp_core.artifacts.models
forbidden_modules =
    datp_core.configuration.resolution
    datp_core.configuration.project
    datp_core.bootstrap
    datp_core.cli

[importlinter:contract:only-cli-and-tests-import-bootstrap]
name = bootstrap is the composition root; only cli.py wires it (tests may also import it directly)
type = forbidden
source_modules =
    datp_core.configuration
    datp_core.experiments
    datp_core.datasets
    datp_core.learning
    datp_core.thresholding
    datp_core.evaluation
    datp_core.analysis
    datp_core.reporting
    datp_core.artifacts
    datp_core.pipeline
forbidden_modules =
    datp_core.bootstrap
    datp_core.cli

[importlinter:contract:analysis-does-not-import-reporting]
name = analysis produces typed results; reporting consumes them, never the reverse
type = forbidden
source_modules =
    datp_core.analysis
forbidden_modules =
    datp_core.reporting

[importlinter:contract:datasets-thresholding-evaluation-do-not-import-downstream-features]
name = datasets/learning/thresholding/evaluation do not import the analysis/reporting features built on top of them
type = forbidden
source_modules =
    datp_core.datasets
    datp_core.learning
    datp_core.thresholding
    datp_core.evaluation
forbidden_modules =
    datp_core.analysis
    datp_core.reporting

[importlinter:contract:no-flower-dependency]
name = flwr was removed as a dead dependency (infrastructure/federation/flower_adapter.py deleted)
type = forbidden
source_modules =
    datp_core
forbidden_modules =
    flwr
