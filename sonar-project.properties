sonar.organization=naslouby-salahe
sonar.projectKey=naslouby-salahe_datp-core
sonar.projectName=datp-core
sonar.sources=src,ai
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12
sonar.exclusions=**/__pycache__/**,data/**,outputs/**,checkpoints/**,results/**,.runtime/**,.venv/**,.nox/**,.pytest_cache/**,.ruff_cache/**,.import_linter_cache/**
sonar.python.coverage.reportPaths=coverage.xml
# Golden snapshot fixtures are intentionally repetitive recoverable test evidence, not duplicated
# logic; excluded from duplication analysis only, still fully analyzed for every other check.
sonar.cpd.exclusions=tests/golden/__snapshots__/**

# Quality gate conditions (explicit, applied server-side once an authenticated analysis exists):
#   - 0 open Blocker-severity issues.
#   - 0 open Critical-severity issues.
#   - 0 open Major-severity issue without a recorded, reviewed justification.
#   - Line coverage on new code >= 80%.
#   - Duplicated lines on new code <= 3%.
#   - 0 open security hotspots left in "to review" status.
# These thresholds are fixed values, not "review issues" left vague; none may be lowered to force
# a pass. Server-side quality-gate attachment itself requires an authenticated analysis run.
